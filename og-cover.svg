<?xml version="1.0" encoding="UTF-8"?>
<!-- Open Graph cover 1200×630 for social sharing (KakaoTalk/Facebook/Twitter).
     Can be used as-is (SVG) or converted to PNG via any SVG→PNG exporter
     (e.g. browser dev-tools, svgexport, or online tools). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Terra Nova English OG 커버">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0B0A2E"/>
      <stop offset="55%"  stop-color="#0A0A14"/>
      <stop offset="100%" stop-color="#050512"/>
    </linearGradient>
    <!-- Infinity ribbon gradient -->
    <linearGradient id="infLine" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#6D28D9"/>
      <stop offset="35%"  stop-color="#8B5CF6"/>
      <stop offset="55%"  stop-color="#C084FC"/>
      <stop offset="80%"  stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#A78BFA"/>
      <stop offset="60%"  stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- Subtle glow -->
    <radialGradient id="glow" cx="25%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(139,92,246,.22)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(34,211,238,.18)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0)"/>
    </radialGradient>
  </defs>

  <!-- Background + glow halos -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Stars (subtle) -->
  <g fill="#ffffff" opacity=".45">
    <circle cx="120" cy="90" r="1.4"/>
    <circle cx="260" cy="60" r="1"/>
    <circle cx="440" cy="120" r="1.2"/>
    <circle cx="960" cy="80" r="1.4"/>
    <circle cx="1080" cy="160" r="1"/>
    <circle cx="1140" cy="40" r="1.2"/>
    <circle cx="90" cy="540" r="1"/>
    <circle cx="310" cy="580" r="1.3"/>
    <circle cx="900" cy="560" r="1"/>
    <circle cx="1100" cy="520" r="1.4"/>
  </g>

  <!-- Left area: infinity logo -->
  <g transform="translate(220,315)">
    <path d="M -150,0
             C -150,-80 -70,-80 0,0
             C 70,80 150,80 150,0
             C 150,-80 70,-80 0,0
             C -70,80 -150,80 -150,0 Z"
          fill="none"
          stroke="url(#infLine)"
          stroke-width="40"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <!-- Highlight stripe -->
    <path d="M -140,-12
             C -130,-62 -60,-62 -10,-12
             C 42,40 110,40 135,10"
          fill="none"
          stroke="rgba(255,255,255,.38)"
          stroke-width="8"
          stroke-linecap="round"/>
  </g>

  <!-- Vertical divider -->
  <line x1="420" y1="160" x2="420" y2="470" stroke="rgba(255,255,255,.12)" stroke-width="1"/>

  <!-- Right: Title + subtitle + tagline + CTA -->
  <g>
    <!-- Eyebrow -->
    <text x="470" y="200"
          font-family="'Noto Sans KR','Arial',sans-serif"
          font-weight="700"
          font-size="20"
          letter-spacing="6"
          fill="#22D3EE">✦ REAL GRADE CHANGE</text>

    <!-- Main title -->
    <text x="470" y="280"
          font-family="'Bebas Neue','Arial Black',sans-serif"
          font-weight="700"
          font-size="88"
          letter-spacing="4"
          fill="url(#title)">TERRA NOVA</text>
    <text x="470" y="328"
          font-family="'Noto Sans KR','Arial',sans-serif"
          font-weight="500"
          font-size="28"
          letter-spacing="16"
          fill="rgba(200,200,230,.72)">ENGLISH</text>

    <!-- Korean tagline -->
    <text x="470" y="398"
          font-family="'Noto Sans KR','Arial',sans-serif"
          font-weight="800"
          font-size="30"
          fill="#F0F0F0">수능영어 + 전과목 동시 학습</text>
    <text x="470" y="436"
          font-family="'Noto Sans KR','Arial',sans-serif"
          font-weight="400"
          font-size="22"
          fill="rgba(240,240,240,.72)">교과 연계 독해로 읽는 동안 두 배가 쌓입니다</text>

    <!-- CTA pill -->
    <g transform="translate(470,472)">
      <rect width="300" height="58" rx="29" fill="#22D3EE"/>
      <text x="150" y="38"
            text-anchor="middle"
            font-family="'Noto Sans KR','Arial',sans-serif"
            font-weight="900"
            font-size="22"
            fill="#0A0A14">월 14,900원부터 시작 →</text>
    </g>

    <!-- Domain -->
    <text x="470" y="576"
          font-family="'Noto Sans KR','Arial',sans-serif"
          font-weight="600"
          font-size="18"
          letter-spacing="4"
          fill="rgba(180,180,220,.6)">terra-nova.kr</text>
  </g>
</svg>
