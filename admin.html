<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>관리자 · Terra Nova</title>
<link rel="stylesheet" href="shared.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --dark:#0A0A0A; --mid:#111111; --card:#1C1C1C; --card2:#222222;
    --accent:#2DD4BF; --txt:#F0F0F0; --dim:rgba(240,240,240,.72);
    --line:rgba(255,255,255,.07); --warn:#F59E0B; --danger:#F87171; --ok:#4ADE80;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--txt);font-family:'Noto Sans KR',sans-serif;}

  .admin-nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);padding:14px 5vw;display:flex;justify-content:space-between;align-items:center;}
  .admin-brand{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:4px;color:#fff;text-decoration:none;}
  .admin-brand span{color:var(--warn);margin-left:6px;font-size:.7rem;letter-spacing:2px;}
  .admin-user{font-size:.78rem;color:var(--dim);display:flex;gap:12px;align-items:center;}
  .admin-user a{color:var(--accent);text-decoration:none;}

  main{max-width:1200px;margin:0 auto;padding:32px 5vw 80px;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;color:#fff;margin-bottom:6px;}
  .page-sub{font-size:.85rem;color:var(--dim);margin-bottom:28px;}

  .tab-row{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--line);}
  .tab-btn{padding:12px 22px;font-size:.82rem;font-weight:600;color:var(--dim);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-btn:hover{color:#fff;}
  .tab-view{display:none;}
  .tab-view.active{display:block;}

  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px;}
  .stat-label{font-size:.7rem;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .stat-value{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#fff;letter-spacing:2px;}
  .stat-value.accent{color:var(--accent);}
  .stat-value.warn{color:var(--warn);}

  .section{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:22px;margin-bottom:18px;}
  .section-title{font-size:.7rem;font-weight:700;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .section-title .count{font-size:.7rem;color:var(--dim);font-weight:500;letter-spacing:1px;}

  .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .filter-btn{padding:7px 14px;font-size:.72rem;font-weight:600;color:var(--dim);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:4px;cursor:pointer;transition:all .15s;}
  .filter-btn.active{color:var(--accent);border-color:rgba(45,212,191,.4);background:rgba(45,212,191,.08);}
  .filter-btn:hover{color:#fff;}

  .review-item{padding:16px;background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:8px;margin-bottom:10px;}
  .review-meta{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .review-stars{color:#FFC857;font-size:.95rem;letter-spacing:2px;}
  .review-author{font-size:.76rem;color:var(--dim);}
  .review-status{font-size:.62rem;padding:3px 9px;border-radius:3px;font-weight:700;letter-spacing:.5px;}
  .review-status.pending{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);color:#FDE68A;}
  .review-status.published{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:var(--ok);}
  .review-title{font-weight:700;color:#fff;font-size:.95rem;margin-bottom:6px;}
  .review-content{font-size:.82rem;color:rgba(255,255,255,.8);line-height:1.7;white-space:pre-wrap;margin-bottom:12px;}
  .review-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn-admin{padding:7px 14px;font-size:.72rem;font-weight:700;border:none;border-radius:4px;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
  .btn-approve{background:var(--accent);color:#0A0A0A;}
  .btn-approve:hover{opacity:.88;}
  .btn-unpublish{background:transparent;color:var(--warn);border:1px solid rgba(245,158,11,.4);}
  .btn-unpublish:hover{background:rgba(245,158,11,.08);}
  .btn-verify{background:transparent;color:var(--accent);border:1px solid rgba(45,212,191,.4);}
  .btn-verify:hover{background:rgba(45,212,191,.08);}
  .btn-delete{background:transparent;color:var(--danger);border:1px solid rgba(248,113,113,.3);}
  .btn-delete:hover{background:rgba(248,113,113,.08);}

  .newsletter-table{width:100%;border-collapse:collapse;font-size:.82rem;}
  .newsletter-table th{text-align:left;padding:10px 14px;font-size:.68rem;font-weight:700;letter-spacing:1px;color:var(--dim);border-bottom:1px solid var(--line);background:rgba(255,255,255,.02);}
  .newsletter-table td{padding:12px 14px;border-bottom:1px solid var(--line);}
  .newsletter-table tr:hover td{background:rgba(255,255,255,.02);}
  .newsletter-empty{text-align:center;padding:40px;color:var(--dim);}

  .gate{max-width:440px;margin:80px auto;padding:36px 32px;background:var(--card);border:1px solid var(--line);border-radius:12px;text-align:center;}
  .gate-icon{font-size:2.4rem;margin-bottom:12px;}
  .gate-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:#fff;margin-bottom:10px;}
  .gate-msg{font-size:.85rem;color:var(--dim);line-height:1.7;margin-bottom:18px;}
  .gate a{color:var(--accent);text-decoration:none;font-weight:700;}

  .empty{text-align:center;padding:48px 20px;color:var(--dim);font-size:.88rem;line-height:1.7;}
</style>
</head>
<body>

<nav class="admin-nav">
  <a href="/" class="admin-brand">TERRA NOVA<span>ADMIN</span></a>
  <div class="admin-user">
    <span id="admin-email">—</span>
    <a href="#" id="logout-link">로그아웃</a>
  </div>
</nav>

<main>

  <!-- 권한 체크 실패 시 표시 -->
  <div id="gate" style="display:none;">
    <div class="gate">
      <div class="gate-icon">🔒</div>
      <div class="gate-title">ADMIN ONLY</div>
      <div class="gate-msg" id="gate-msg">관리자 권한이 필요한 페이지입니다.</div>
      <a href="/login.html">로그인 페이지로 →</a>
    </div>
  </div>

  <!-- 관리자 대시보드 -->
  <div id="admin-body" style="display:none;">
    <h1 class="page-title">ADMIN DASHBOARD</h1>
    <p class="page-sub">리뷰 승인 · 뉴스레터 구독자 · 주문 모니터링</p>

    <!-- 요약 통계 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">검토 대기 리뷰</div>
        <div class="stat-value warn" id="stat-pending">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">공개 중 리뷰</div>
        <div class="stat-value accent" id="stat-published">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">뉴스레터 구독자</div>
        <div class="stat-value" id="stat-newsletter">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">가입 사용자</div>
        <div class="stat-value" id="stat-users">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">활성 구독</div>
        <div class="stat-value" id="stat-subs">-</div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchAdminTab('reviews',this)">⭐ 리뷰 관리</button>
      <button class="tab-btn" onclick="switchAdminTab('newsletter',this)">📧 뉴스레터</button>
      <button class="tab-btn" onclick="switchAdminTab('orders',this)">💳 최근 주문</button>
    </div>

    <!-- 리뷰 관리 -->
    <div class="tab-view active" id="tab-reviews">
      <div class="section">
        <div class="section-title">
          <span>리뷰 목록</span>
          <span class="count" id="reviews-count">—</span>
        </div>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="pending" onclick="filterReviews(this,'pending')">검토 대기</button>
          <button class="filter-btn" data-filter="published" onclick="filterReviews(this,'published')">공개 중</button>
          <button class="filter-btn" data-filter="all" onclick="filterReviews(this,'all')">전체</button>
        </div>
        <div id="reviews-list">
          <div class="empty" id="reviews-empty">불러오는 중…</div>
        </div>
      </div>
    </div>

    <!-- 뉴스레터 -->
    <div class="tab-view" id="tab-newsletter">
      <div class="section">
        <div class="section-title">
          <span>뉴스레터 구독자</span>
          <span class="count" id="newsletter-count">—</span>
        </div>
        <div id="newsletter-table-wrap">
          <div class="empty" id="newsletter-empty">불러오는 중…</div>
        </div>
      </div>
    </div>

    <!-- 최근 주문 -->
    <div class="tab-view" id="tab-orders">
      <div class="section">
        <div class="section-title">
          <span>최근 20개 주문</span>
          <span class="count" id="orders-count">—</span>
        </div>
        <div id="orders-table-wrap">
          <div class="empty">불러오는 중…</div>
        </div>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import { supabase, signOut } from './supabase-client.js';

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  const ymd = (iso) => iso ? new Date(iso).toLocaleDateString('ko-KR') : '-';
  const ymdhm = (iso) => iso ? new Date(iso).toLocaleString('ko-KR', { dateStyle:'short', timeStyle:'short' }) : '-';
  const won = (n) => (n ?? 0).toLocaleString('ko-KR') + '원';

  let allReviews = [];
  let currentFilter = 'pending';

  // ── 권한 체크 ─────────────────────────
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    $('gate-msg').textContent = '로그인이 필요합니다.';
    $('gate').style.display = 'block';
    $('admin-body').style.display = 'none';
  } else {
    $('admin-email').textContent = user.email;
    const { data: profile } = await supabase
      .from('profiles').select('is_admin').eq('id', user.id).single();
    if (!profile || !profile.is_admin) {
      $('gate-msg').innerHTML = '관리자 권한이 없는 계정입니다.<br><small style="opacity:.7;">' + esc(user.email) + '</small>';
      $('gate').style.display = 'block';
      $('admin-body').style.display = 'none';
    } else {
      $('admin-body').style.display = 'block';
      $('gate').style.display = 'none';
      await loadAll();
    }
  }

  $('logout-link')?.addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut();
  });

  // ── 전체 로드 ─────────────────────────
  async function loadAll() {
    await Promise.all([
      loadReviews(),
      loadNewsletter(),
      loadOrders(),
      loadStats()
    ]);
  }

  async function loadStats() {
    const [{ count: pending }, { count: published }, { count: news }, { count: subs }] = await Promise.all([
      supabase.from('reviews').select('*', { count:'exact', head:true }).eq('is_published', false),
      supabase.from('reviews').select('*', { count:'exact', head:true }).eq('is_published', true),
      supabase.from('newsletter_subscribers').select('*', { count:'exact', head:true }).is('unsubscribed_at', null),
      supabase.from('subscriptions').select('*', { count:'exact', head:true }).eq('status', 'active')
    ]);
    $('stat-pending').textContent = pending ?? 0;
    $('stat-published').textContent = published ?? 0;
    $('stat-newsletter').textContent = news ?? 0;
    $('stat-subs').textContent = subs ?? 0;
    // auth.users 카운트는 profiles로 근사
    const { count: users } = await supabase.from('profiles').select('*', { count:'exact', head:true });
    $('stat-users').textContent = users ?? 0;
  }

  // ── 리뷰 ─────────────────────────────
  async function loadReviews() {
    const { data, error } = await supabase
      .from('reviews')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) {
      $('reviews-list').innerHTML = '<div class="empty">불러오기 실패: ' + esc(error.message) + '</div>';
      return;
    }
    allReviews = data || [];
    renderReviews();
  }

  function renderReviews() {
    const list = $('reviews-list');
    const filtered = allReviews.filter(r => {
      if (currentFilter === 'pending') return !r.is_published;
      if (currentFilter === 'published') return r.is_published;
      return true;
    });
    $('reviews-count').textContent = filtered.length + ' / ' + allReviews.length;
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">해당 필터에 리뷰가 없습니다.</div>';
      return;
    }
    list.innerHTML = filtered.map(r => `
      <div class="review-item" data-id="${r.id}">
        <div class="review-meta">
          <div>
            <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
            <span class="review-author" style="margin-left:10px;">${esc(r.author_name)} · ${esc(r.author_grade || '')} · ${esc(r.level || '')} · ${ymdhm(r.created_at)}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            ${r.is_verified ? '<span style="font-size:.62rem;padding:3px 8px;background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.3);border-radius:3px;color:var(--accent);font-weight:700;">✓ 인증</span>' : ''}
            <span class="review-status ${r.is_published ? 'published' : 'pending'}">${r.is_published ? '공개 중' : '검토 중'}</span>
          </div>
        </div>
        <div class="review-title">${esc(r.title)}</div>
        <div class="review-content">${esc(r.content)}</div>
        <div class="review-actions">
          ${r.is_published
            ? `<button class="btn-admin btn-unpublish" data-act="unpublish" data-id="${r.id}">비공개 처리</button>`
            : `<button class="btn-admin btn-approve" data-act="approve" data-id="${r.id}">승인 · 공개</button>`}
          <button class="btn-admin btn-verify" data-act="toggle-verify" data-id="${r.id}" data-verified="${r.is_verified}">
            ${r.is_verified ? '인증 해제' : '구독 인증'}
          </button>
          <button class="btn-admin btn-delete" data-act="delete" data-id="${r.id}">삭제</button>
        </div>
      </div>
    `).join('');

    list.querySelectorAll('[data-act]').forEach(btn => {
      btn.addEventListener('click', onReviewAction);
    });
  }

  async function onReviewAction(e) {
    const btn = e.currentTarget;
    const id = btn.dataset.id;
    const act = btn.dataset.act;
    btn.disabled = true;
    try {
      if (act === 'approve') {
        await supabase.from('reviews').update({ is_published: true }).eq('id', id);
      } else if (act === 'unpublish') {
        await supabase.from('reviews').update({ is_published: false }).eq('id', id);
      } else if (act === 'toggle-verify') {
        const cur = btn.dataset.verified === 'true';
        await supabase.from('reviews').update({ is_verified: !cur }).eq('id', id);
      } else if (act === 'delete') {
        if (!confirm('리뷰를 영구 삭제하시겠습니까?')) { btn.disabled = false; return; }
        await supabase.from('reviews').delete().eq('id', id);
      }
      await loadReviews();
      await loadStats();
    } catch (err) {
      alert('작업 실패: ' + err.message);
      btn.disabled = false;
    }
  }

  window.filterReviews = function(btn, filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderReviews();
  };

  // ── 뉴스레터 ─────────────────────────
  async function loadNewsletter() {
    const { data, error } = await supabase
      .from('newsletter_subscribers')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(200);
    const wrap = $('newsletter-table-wrap');
    if (error) {
      wrap.innerHTML = '<div class="empty">불러오기 실패: ' + esc(error.message) + '</div>';
      return;
    }
    $('newsletter-count').textContent = (data?.length || 0) + '명';
    if (!data || data.length === 0) {
      wrap.innerHTML = '<div class="empty">아직 가입자가 없습니다.</div>';
      return;
    }
    wrap.innerHTML = `
      <table class="newsletter-table">
        <thead>
          <tr><th>이메일</th><th>출처</th><th>가입일</th><th>구독 해지일</th></tr>
        </thead>
        <tbody>
          ${data.map(r => `
            <tr>
              <td>${esc(r.email)}</td>
              <td style="color:var(--dim);">${esc(r.source || '-')}</td>
              <td style="color:var(--dim);font-size:.78rem;">${ymdhm(r.consented_at || r.created_at)}</td>
              <td>${r.unsubscribed_at ? '<span style="color:var(--danger);font-size:.78rem;">' + ymdhm(r.unsubscribed_at) + '</span>' : '<span style="color:var(--ok);font-size:.78rem;">구독 중</span>'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  // ── 최근 주문 ────────────────────────
  async function loadOrders() {
    const { data, error } = await supabase
      .from('orders')
      .select('*, order_items(product_snapshot, quantity, subtotal)')
      .order('created_at', { ascending: false })
      .limit(20);
    const wrap = $('orders-table-wrap');
    if (error) {
      wrap.innerHTML = '<div class="empty">불러오기 실패: ' + esc(error.message) + '</div>';
      return;
    }
    $('orders-count').textContent = (data?.length || 0) + '건';
    if (!data || data.length === 0) {
      wrap.innerHTML = '<div class="empty">아직 주문이 없습니다.</div>';
      return;
    }
    wrap.innerHTML = `
      <table class="newsletter-table">
        <thead>
          <tr><th>주문번호</th><th>상태</th><th>금액</th><th>구매자</th><th>주문일</th></tr>
        </thead>
        <tbody>
          ${data.map(o => `
            <tr>
              <td style="font-family:monospace;font-size:.78rem;">${esc(o.order_number || o.id.slice(0,8))}</td>
              <td><span style="font-size:.7rem;padding:3px 8px;border-radius:3px;background:${o.status==='paid'?'rgba(74,222,128,.12)':'rgba(234,179,8,.1)'};color:${o.status==='paid'?'var(--ok)':'var(--warn)'};">${esc(o.status)}</span></td>
              <td style="font-weight:700;">${won(o.total_amount)}</td>
              <td style="font-size:.78rem;color:var(--dim);">${esc(o.shipping_name || (o.user_id ? o.user_id.slice(0,8) : '-'))}</td>
              <td style="color:var(--dim);font-size:.78rem;">${ymdhm(o.created_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  window.switchAdminTab = function(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    $('tab-' + tab).classList.add('active');
  };
</script>
</body>
</html>
