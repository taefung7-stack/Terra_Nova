<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terra Nova Cover</title>
<link rel="stylesheet" href="styles/tokens.css" />
<link rel="stylesheet" href="styles/cover.css" />
<link rel="stylesheet" href="styles/print.css" />
</head>
<body>

<!-- TOC: TWO consecutive A4 pages (left = weeks 1-2, right = weeks 3-4)
     The right page has an invisible title placeholder so its toc-list starts
     at the same Y as the left page — making WEEK 01↔03 and WEEK 02↔04 line up. -->
<template id="tpl-toc">
  <section class="cover toc toc-left">
    <h1 class="toc-title">목차 <span class="toc-title-en">CONTENTS</span></h1>
    <div class="toc-list" data-slot="toc-rows-left"></div>
  </section>
  <section class="cover toc toc-right">
    <h1 class="toc-title toc-title-placeholder" aria-hidden="true">&nbsp;</h1>
    <div class="toc-list" data-slot="toc-rows-right"></div>
  </section>
</template>

<!-- WEEK divider: TWO consecutive A4 pages, single solid color -->
<template id="tpl-week">
  <section class="cover week-left" data-slot="week-page-left">
    <div class="week-left-inner">
      <span class="week-label">WEEK</span>
      <span class="week-num" data-slot="week-num"></span>
      <span class="week-meta" data-slot="week-meta"></span>
    </div>
  </section>
  <section class="cover week-right" data-slot="week-page-right">
    <header class="cover-head light">
      <span class="brand light">TERRA·NOVA</span>
    </header>
    <h2 class="week-right-h">이번 주 학습할 5지문</h2>
    <div class="week-passages" data-slot="week-passages"></div>
  </section>
</template>

<main id="stage"></main>
<script type="module" src="scripts/cover-render.js"></script>
</body>
</html>
