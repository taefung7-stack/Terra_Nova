<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" role="img" aria-label="Crystal lattice structure on the left transitioning to a DNA double helix on the right">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2D1C7F"/>
      <stop offset="55%" stop-color="#4A2EAB"/>
      <stop offset="100%" stop-color="#7546E8"/>
    </linearGradient>
    <linearGradient id="helixGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#C8B3F6" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="latticeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#C8B3F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg8)"/>

  <!-- Subtle star scatter -->
  <g fill="#FFFFFF" opacity="0.15">
    <circle cx="50"  cy="30"  r="1"/>
    <circle cx="130" cy="55"  r="0.8"/>
    <circle cx="220" cy="25"  r="1.1"/>
    <circle cx="680" cy="40"  r="0.9"/>
    <circle cx="750" cy="70"  r="1"/>
    <circle cx="780" cy="20"  r="0.7"/>
  </g>

  <!-- === LEFT SIDE: Crystal Lattice === -->
  <!-- lattice nodes arranged in hexagonal/grid pattern -->
  <!-- Row 1 -->
  <g fill="#C8B3F6" filter="url(#glow8)">
    <circle cx="80"  cy="100" r="5"/>
    <circle cx="150" cy="100" r="5"/>
    <circle cx="220" cy="100" r="5"/>
    <circle cx="290" cy="100" r="5"/>
    <!-- Row 2 offset -->
    <circle cx="115" cy="158" r="5"/>
    <circle cx="185" cy="158" r="5"/>
    <circle cx="255" cy="158" r="5"/>
    <circle cx="325" cy="158" r="5"/>
    <!-- Row 3 -->
    <circle cx="80"  cy="216" r="5"/>
    <circle cx="150" cy="216" r="5"/>
    <circle cx="220" cy="216" r="5"/>
    <circle cx="290" cy="216" r="5"/>
    <!-- Row 4 offset -->
    <circle cx="115" cy="274" r="5"/>
    <circle cx="185" cy="274" r="5"/>
    <circle cx="255" cy="274" r="5"/>
    <circle cx="325" cy="274" r="5"/>
  </g>

  <!-- Lattice bonds - horizontal -->
  <g stroke="#C8B3F6" stroke-width="1.5" stroke-opacity="0.6">
    <!-- Row 1 horizontals -->
    <line x1="85"  y1="100" x2="145" y2="100"/>
    <line x1="155" y1="100" x2="215" y2="100"/>
    <line x1="225" y1="100" x2="285" y2="100"/>
    <!-- Row 2 horizontals -->
    <line x1="120" y1="158" x2="180" y2="158"/>
    <line x1="190" y1="158" x2="250" y2="158"/>
    <line x1="260" y1="158" x2="320" y2="158"/>
    <!-- Row 3 horizontals -->
    <line x1="85"  y1="216" x2="145" y2="216"/>
    <line x1="155" y1="216" x2="215" y2="216"/>
    <line x1="225" y1="216" x2="285" y2="216"/>
    <!-- Row 4 horizontals -->
    <line x1="120" y1="274" x2="180" y2="274"/>
    <line x1="190" y1="274" x2="250" y2="274"/>
    <line x1="260" y1="274" x2="320" y2="274"/>
  </g>

  <!-- Lattice bonds - diagonal (hexagonal connectivity) -->
  <g stroke="#C8B3F6" stroke-width="1.2" stroke-opacity="0.45">
    <!-- Row1 to Row2 diagonals -->
    <line x1="80"  y1="100" x2="115" y2="158"/>
    <line x1="150" y1="100" x2="115" y2="158"/>
    <line x1="150" y1="100" x2="185" y2="158"/>
    <line x1="220" y1="100" x2="185" y2="158"/>
    <line x1="220" y1="100" x2="255" y2="158"/>
    <line x1="290" y1="100" x2="255" y2="158"/>
    <line x1="290" y1="100" x2="325" y2="158"/>
    <!-- Row2 to Row3 diagonals -->
    <line x1="115" y1="158" x2="80"  y2="216"/>
    <line x1="115" y1="158" x2="150" y2="216"/>
    <line x1="185" y1="158" x2="150" y2="216"/>
    <line x1="185" y1="158" x2="220" y2="216"/>
    <line x1="255" y1="158" x2="220" y2="216"/>
    <line x1="255" y1="158" x2="290" y2="216"/>
    <line x1="325" y1="158" x2="290" y2="216"/>
    <!-- Row3 to Row4 diagonals -->
    <line x1="80"  y1="216" x2="115" y2="274"/>
    <line x1="150" y1="216" x2="115" y2="274"/>
    <line x1="150" y1="216" x2="185" y2="274"/>
    <line x1="220" y1="216" x2="185" y2="274"/>
    <line x1="220" y1="216" x2="255" y2="274"/>
    <line x1="290" y1="216" x2="255" y2="274"/>
    <line x1="290" y1="216" x2="325" y2="274"/>
  </g>

  <!-- Highlighted node (origin marker) -->
  <circle cx="185" cy="158" r="8" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.9" filter="url(#glow8)"/>

  <!-- Lattice label -->
  <text x="185" y="320" text-anchor="middle" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="11" opacity="0.9">Crystal Lattice</text>
  <text x="185" y="335" text-anchor="middle" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="9" opacity="0.7">repeating geometric order</text>

  <!-- === TRANSITION ARROW === -->
  <g filter="url(#glow8)">
    <path d="M 370 175 L 420 175" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <polygon points="420,170 432,175 420,180" fill="#FFFFFF" opacity="0.8"/>
  </g>
  <text x="401" y="165" text-anchor="middle" fill="#FFFFFF" font-family="Axiforma, sans-serif" font-size="9" opacity="0.7">order →</text>
  <text x="401" y="153" text-anchor="middle" fill="#FFFFFF" font-family="Axiforma, sans-serif" font-size="9" opacity="0.7">information</text>

  <!-- === RIGHT SIDE: DNA Double Helix === -->
  <!-- Strand 1 (front, white) - sinusoidal wave -->
  <path d="M 470 80 C 500 100 540 140 540 175 C 540 210 500 250 470 270 C 500 290 540 310 560 320"
        stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow8)" opacity="0.95"/>

  <!-- Strand 2 (back, purple) - opposite phase sinusoidal -->
  <path d="M 560 80 C 530 100 490 140 490 175 C 490 210 530 250 560 270 C 530 290 490 310 470 320"
        stroke="#C8B3F6" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow8)" opacity="0.85"/>

  <!-- Base pairs (rungs) connecting the two strands -->
  <g stroke="#FFFFFF" stroke-width="1.8" stroke-opacity="0.7" stroke-linecap="round">
    <line x1="480" y1="100" x2="550" y2="100"/>
    <line x1="472" y1="120" x2="558" y2="120"/>
    <line x1="475" y1="140" x2="555" y2="140"/>
    <line x1="488" y1="158" x2="542" y2="158"/>
    <line x1="510" y1="175" x2="520" y2="175"/>
    <line x1="532" y1="192" x2="498" y2="192"/>
    <line x1="545" y1="210" x2="485" y2="210"/>
    <line x1="548" y1="230" x2="482" y2="230"/>
    <line x1="540" y1="250" x2="490" y2="250"/>
    <line x1="522" y1="268" x2="508" y2="268"/>
    <line x1="500" y1="285" x2="530" y2="285"/>
    <line x1="480" y1="302" x2="550" y2="302"/>
  </g>

  <!-- Base pair dots (A, T, G, C indicators) -->
  <g fill="#7546E8">
    <circle cx="495" cy="100" r="3.5"/>
    <circle cx="478" cy="140" r="3.5"/>
    <circle cx="537" cy="158" r="3.5"/>
    <circle cx="493" cy="192" r="3.5"/>
    <circle cx="542" cy="230" r="3.5"/>
    <circle cx="488" cy="268" r="3.5"/>
  </g>
  <g fill="#FFFFFF">
    <circle cx="535" cy="100" r="3.5"/>
    <circle cx="552" cy="140" r="3.5"/>
    <circle cx="484" cy="158" r="3.5"/>
    <circle cx="538" cy="192" r="3.5"/>
    <circle cx="488" cy="230" r="3.5"/>
    <circle cx="544" cy="268" r="3.5"/>
  </g>

  <!-- Base labels (A, T, G, C) -->
  <g fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="9" font-weight="bold">
    <text x="510" y="98"  text-anchor="middle">A</text>
    <text x="510" y="138" text-anchor="middle">G</text>
    <text x="510" y="156" text-anchor="middle">T</text>
    <text x="510" y="190" text-anchor="middle">C</text>
    <text x="510" y="228" text-anchor="middle">A</text>
    <text x="510" y="266" text-anchor="middle">G</text>
  </g>

  <!-- DNA label -->
  <text x="515" y="340" text-anchor="middle" fill="#FFFFFF" font-family="Axiforma, sans-serif" font-size="11" opacity="0.9">DNA Double Helix</text>
  <text x="515" y="353" text-anchor="middle" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="9" opacity="0.7">sequence as information</text>

  <!-- Extended annotation area: base sequence detail -->
  <rect x="600" y="90" width="170" height="180" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#C8B3F6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="685" y="112" text-anchor="middle" fill="#FFFFFF" font-family="Axiforma, sans-serif" font-size="10" font-weight="bold" opacity="0.9">Base Sequence</text>
  <g fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="10" opacity="0.9">
    <text x="625" y="135">5'— A — T — G — C —3'</text>
    <text x="625" y="155">    |   |   |   |</text>
    <text x="625" y="175">3'— T — A — C — G —5'</text>
  </g>
  <line x1="615" y1="188" x2="755" y2="188" stroke="#C8B3F6" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="685" y="205" text-anchor="middle" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="9" opacity="0.8">Order encodes</text>
  <text x="685" y="220" text-anchor="middle" fill="#FFFFFF" font-family="Axiforma, sans-serif" font-size="9" opacity="0.85">biological meaning</text>
  <text x="685" y="240" text-anchor="middle" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="9" opacity="0.7">~3 billion base pairs</text>
  <text x="685" y="255" text-anchor="middle" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="9" opacity="0.7">per human genome</text>

  <!-- Caption ribbon at top -->
  <rect x="0" y="0" width="800" height="30" fill="#0D0E20" opacity="0.45"/>
  <text x="400" y="20" fill="#FFFFFF" font-family="Playfair Display, serif" font-size="13" font-style="italic" text-anchor="middle" opacity="0.95">
    From mineral lattice to living helix — order is how the universe stores meaning.
  </text>
</svg>
