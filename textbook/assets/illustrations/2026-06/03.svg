<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" role="img" aria-label="Three figures holding hands in a circle, surrounded by a glowing network of connections suggesting social bonds and longevity">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1A0A6B"/>
      <stop offset="50%" stop-color="#4222A8"/>
      <stop offset="100%" stop-color="#6A3DD0"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="55%" r="42%">
      <stop offset="0%"  stop-color="#9B72EF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1A0A6B" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="heartglow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg3)"/>
  <rect width="800" height="350" fill="url(#glow3)"/>

  <!-- Faint star scatter -->
  <g fill="#FFFFFF" opacity="0.22">
    <circle cx="55"  cy="45"  r="1"/>
    <circle cx="130" cy="75"  r="0.8"/>
    <circle cx="210" cy="35"  r="1.1"/>
    <circle cx="670" cy="50"  r="0.9"/>
    <circle cx="745" cy="30"  r="1"/>
    <circle cx="780" cy="80"  r="0.8"/>
    <circle cx="90"  cy="290" r="0.9"/>
    <circle cx="720" cy="300" r="1"/>
  </g>

  <!-- Connection web lines (background network) -->
  <g stroke="#C8B3F6" stroke-opacity="0.18" stroke-width="0.8">
    <line x1="400" y1="175" x2="160" y2="110"/>
    <line x1="400" y1="175" x2="640" y2="110"/>
    <line x1="400" y1="175" x2="110" y2="240"/>
    <line x1="400" y1="175" x2="690" y2="240"/>
    <line x1="400" y1="175" x2="300" y2="300"/>
    <line x1="400" y1="175" x2="500" y2="300"/>
    <line x1="160" y1="110" x2="110" y2="240"/>
    <line x1="640" y1="110" x2="690" y2="240"/>
    <line x1="110" y1="240" x2="300" y2="300"/>
    <line x1="690" y1="240" x2="500" y2="300"/>
    <line x1="160" y1="110" x2="640" y2="110"/>
    <line x1="300" y1="300" x2="500" y2="300"/>
  </g>

  <!-- Network nodes (outer) -->
  <g fill="#B09AE8" stroke="#C8B3F6" stroke-width="1.2" filter="url(#softglow)">
    <circle cx="160" cy="110" r="6"/>
    <circle cx="640" cy="110" r="6"/>
    <circle cx="110" cy="240" r="6"/>
    <circle cx="690" cy="240" r="6"/>
    <circle cx="300" cy="300" r="6"/>
    <circle cx="500" cy="300" r="6"/>
  </g>

  <!-- === Left figure (elderly, seated posture) === -->
  <!-- Head -->
  <circle cx="280" cy="148" r="22" fill="#D4B8FF" stroke="#C8B3F6" stroke-width="1.5" filter="url(#softglow)"/>
  <!-- Body -->
  <rect x="263" y="170" width="34" height="50" rx="10" fill="#B09AE8" stroke="#C8B3F6" stroke-width="1"/>
  <!-- Arms reaching right -->
  <line x1="297" y1="185" x2="338" y2="205" stroke="#C8B3F6" stroke-width="6" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="272" y1="220" x2="265" y2="255" stroke="#B09AE8" stroke-width="5" stroke-linecap="round"/>
  <line x1="286" y1="220" x2="285" y2="255" stroke="#B09AE8" stroke-width="5" stroke-linecap="round"/>
  <!-- Walking stick -->
  <line x1="263" y1="222" x2="248" y2="260" stroke="#9B72EF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- === Center figure (child, smaller) === -->
  <!-- Head -->
  <circle cx="400" cy="155" r="19" fill="#E8D5FF" stroke="#C8B3F6" stroke-width="1.5" filter="url(#softglow)"/>
  <!-- Body -->
  <rect x="386" y="174" width="28" height="44" rx="9" fill="#C8B3F6" stroke="#B09AE8" stroke-width="1"/>
  <!-- Arms reaching both sides -->
  <line x1="386" y1="185" x2="346" y2="205" stroke="#C8B3F6" stroke-width="5" stroke-linecap="round"/>
  <line x1="414" y1="185" x2="454" y2="205" stroke="#C8B3F6" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="393" y1="218" x2="387" y2="252" stroke="#C8B3F6" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="407" y1="218" x2="412" y2="252" stroke="#C8B3F6" stroke-width="4.5" stroke-linecap="round"/>

  <!-- === Right figure (adult) === -->
  <!-- Head -->
  <circle cx="520" cy="148" r="22" fill="#D4B8FF" stroke="#C8B3F6" stroke-width="1.5" filter="url(#softglow)"/>
  <!-- Body -->
  <rect x="503" y="170" width="34" height="50" rx="10" fill="#B09AE8" stroke="#C8B3F6" stroke-width="1"/>
  <!-- Arms reaching left -->
  <line x1="503" y1="185" x2="462" y2="205" stroke="#C8B3F6" stroke-width="6" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="512" y1="220" x2="506" y2="255" stroke="#B09AE8" stroke-width="5" stroke-linecap="round"/>
  <line x1="526" y1="220" x2="527" y2="255" stroke="#B09AE8" stroke-width="5" stroke-linecap="round"/>

  <!-- Clasped hands glow spots -->
  <circle cx="340" cy="206" r="7" fill="#FFFFFF" opacity="0.75" filter="url(#softglow)"/>
  <circle cx="460" cy="206" r="7" fill="#FFFFFF" opacity="0.75" filter="url(#softglow)"/>

  <!-- Heart icon above center figure -->
  <g transform="translate(390,112)" filter="url(#heartglow)">
    <path d="M10 6 C10 3 8 1 6 1 C4 1 2 3 2 5 C2 8 6 11 10 15 C14 11 18 8 18 5 C18 3 16 1 14 1 C12 1 10 3 10 6 Z"
          fill="#FF9EDB" stroke="#FFFFFF" stroke-width="0.8" opacity="0.92"/>
  </g>

  <!-- Longevity arc label -->
  <g font-family="Playfair Display, serif" font-style="italic" font-size="14" fill="#FFFFFF" filter="url(#softglow)">
    <text x="400" y="295" text-anchor="middle" opacity="0.90">Together longer — the biology of belonging.</text>
  </g>

  <!-- Small pulse ring around center figure (suggests health/heartbeat) -->
  <circle cx="400" cy="165" r="45" fill="none" stroke="#C8B3F6" stroke-width="1" stroke-dasharray="4 6" opacity="0.40"/>
  <circle cx="400" cy="165" r="62" fill="none" stroke="#9B72EF" stroke-width="0.7" stroke-dasharray="3 8" opacity="0.28"/>

  <!-- Caption ribbon -->
  <rect x="0" y="0" width="800" height="30" fill="#0D0E20" opacity="0.45"/>
  <text x="400" y="20" fill="#FFFFFF" font-family="Playfair Display, serif" font-size="13" font-style="italic" text-anchor="middle" opacity="0.95">
    Social bonds across generations — the quiet infrastructure of a long life.
  </text>
</svg>
