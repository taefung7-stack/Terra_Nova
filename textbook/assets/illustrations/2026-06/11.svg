<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" role="img" aria-label="Apple falling from tree, Moon orbiting Earth, and Newton figure — illustrating universal gravitation">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2D1C7F"/>
      <stop offset="55%" stop-color="#4A28B0"/>
      <stop offset="100%" stop-color="#7546E8"/>
    </linearGradient>
    <radialGradient id="earthGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#7546E8"/>
      <stop offset="100%" stop-color="#2D1C7F"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8B3F6"/>
    </radialGradient>
    <radialGradient id="appleGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C8B3F6"/>
    </radialGradient>
    <filter id="glow11">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="800" height="350" fill="url(#bg11)"/>

  <!-- stars -->
  <g fill="#FFFFFF" opacity="0.22">
    <circle cx="30"  cy="25"  r="1"/>
    <circle cx="95"  cy="60"  r="0.8"/>
    <circle cx="170" cy="18"  r="1.1"/>
    <circle cx="240" cy="45"  r="0.7"/>
    <circle cx="340" cy="28"  r="1"/>
    <circle cx="430" cy="15"  r="0.9"/>
    <circle cx="510" cy="50"  r="1"/>
    <circle cx="590" cy="22"  r="0.8"/>
    <circle cx="660" cy="40"  r="1.1"/>
    <circle cx="750" cy="12"  r="0.9"/>
    <circle cx="780" cy="70"  r="0.7"/>
    <circle cx="55"  cy="300" r="0.8"/>
    <circle cx="120" cy="330" r="1"/>
    <circle cx="200" cy="315" r="0.7"/>
    <circle cx="710" cy="310" r="0.8"/>
    <circle cx="760" cy="295" r="1"/>
  </g>

  <!-- ===================== LEFT PANEL: Tree + Apple ===================== -->
  <!-- Tree trunk -->
  <rect x="82" y="160" width="16" height="110" rx="4" fill="#C8B3F6" opacity="0.55"/>
  <!-- Tree branches -->
  <line x1="90" y1="175" x2="55" y2="130" stroke="#C8B3F6" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <line x1="90" y1="185" x2="128" y2="148" stroke="#C8B3F6" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <line x1="90" y1="200" x2="58" y2="195" stroke="#C8B3F6" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Tree foliage -->
  <ellipse cx="68"  cy="115" rx="30" ry="24" fill="#7546E8" opacity="0.6"/>
  <ellipse cx="115" cy="128" rx="26" ry="22" fill="#7546E8" opacity="0.55"/>
  <ellipse cx="90"  cy="105" rx="28" ry="20" fill="#5032C0" opacity="0.65"/>
  <ellipse cx="55"  cy="130" rx="18" ry="14" fill="#7546E8" opacity="0.5"/>

  <!-- Apple on branch -->
  <circle cx="122" cy="140" r="9" fill="url(#appleGrad)" filter="url(#glow11)"/>
  <line x1="122" y1="131" x2="122" y2="127" stroke="#C8B3F6" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Falling apple (lower, with motion trail) -->
  <line x1="122" y1="160" x2="122" y2="235" stroke="#C8B3F6" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>
  <circle cx="122" cy="248" r="8" fill="url(#appleGrad)" opacity="0.85" filter="url(#glow11)"/>
  <!-- Down arrow -->
  <line x1="122" y1="258" x2="122" y2="278" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <polygon points="122,285 117,275 127,275" fill="#FFFFFF" opacity="0.7"/>

  <!-- Label -->
  <text x="90" y="305" text-anchor="middle" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="10" opacity="0.9">Apple falls</text>
  <text x="90" y="318" text-anchor="middle" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="9" opacity="0.75">F ∝ 1/r²</text>

  <!-- Divider -->
  <line x1="190" y1="60" x2="190" y2="310" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ===================== CENTRE: Earth + Moon orbit ===================== -->
  <!-- Orbit ellipse -->
  <ellipse cx="440" cy="190" rx="180" ry="110" fill="none" stroke="#C8B3F6" stroke-width="1.2" stroke-dasharray="6 5" opacity="0.45"/>

  <!-- Earth -->
  <circle cx="440" cy="190" r="42" fill="url(#earthGrad)" filter="url(#softglow)"/>
  <!-- Earth continents (schematic) -->
  <ellipse cx="430" cy="182" rx="14" ry="10" fill="#C8B3F6" opacity="0.35" transform="rotate(-20 430 182)"/>
  <ellipse cx="452" cy="200" rx="10" ry="7" fill="#C8B3F6" opacity="0.28" transform="rotate(15 452 200)"/>
  <ellipse cx="425" cy="202" rx="8" ry="5" fill="#C8B3F6" opacity="0.22"/>
  <!-- Earth highlight -->
  <ellipse cx="425" cy="175" rx="16" ry="10" fill="#FFFFFF" opacity="0.1"/>

  <!-- Gravity field rings -->
  <circle cx="440" cy="190" r="65"  fill="none" stroke="#7546E8" stroke-width="0.8" opacity="0.3"/>
  <circle cx="440" cy="190" r="95"  fill="none" stroke="#7546E8" stroke-width="0.6" opacity="0.2"/>
  <circle cx="440" cy="190" r="125" fill="none" stroke="#7546E8" stroke-width="0.5" opacity="0.15"/>

  <!-- Moon on orbit (upper right position) -->
  <circle cx="590" cy="110" r="18" fill="url(#moonGrad)" filter="url(#glow11)"/>
  <!-- Moon craters -->
  <circle cx="583" cy="106" r="3.5" fill="#C8B3F6" opacity="0.35"/>
  <circle cx="595" cy="117" r="2.5" fill="#C8B3F6" opacity="0.25"/>
  <circle cx="587" cy="118" r="2" fill="#C8B3F6" opacity="0.2"/>

  <!-- Moon velocity arrow (tangent) -->
  <line x1="600" y1="98" x2="628" y2="82" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" filter="url(#glow11)" opacity="0.85"/>
  <polygon points="633,79 621,80 626,90" fill="#FFFFFF" opacity="0.85"/>
  <text x="638" y="79" fill="#FFFFFF" font-family="Axiforma, sans-serif" font-size="9" opacity="0.8">v</text>

  <!-- Gravity pull arrow (Moon toward Earth) -->
  <line x1="574" y1="118" x2="498" y2="155" stroke="#C8B3F6" stroke-width="1.8" stroke-dasharray="5 3" stroke-linecap="round" opacity="0.7"/>
  <polygon points="492,158 504,150 500,162" fill="#C8B3F6" opacity="0.7"/>
  <text x="524" y="132" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="9" font-style="italic" opacity="0.85">g</text>

  <!-- Labels -->
  <text x="440" y="196" text-anchor="middle" fill="#FFFFFF" font-family="Playfair Display, serif" font-size="11" opacity="0.9">Earth</text>
  <text x="590" y="108" text-anchor="middle" fill="#2D1C7F" font-family="Axiforma, sans-serif" font-size="8.5" font-weight="bold" opacity="0.85">Moon</text>
  <text x="440" y="292" text-anchor="middle" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="10" opacity="0.9">Orbiting = falling sideways</text>

  <!-- Divider -->
  <line x1="670" y1="60" x2="670" y2="310" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ===================== RIGHT PANEL: Newton figure + equation ===================== -->
  <!-- Newton silhouette (simple schematic) -->
  <!-- Head -->
  <circle cx="728" cy="128" r="16" fill="#C8B3F6" opacity="0.7"/>
  <!-- Wig curl lines -->
  <path d="M714 118 Q710 108 716 100" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M742 118 Q746 108 740 100" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="712" y="144" width="32" height="50" rx="6" fill="#7546E8" opacity="0.65"/>
  <!-- Arms -->
  <line x1="712" y1="155" x2="692" y2="178" stroke="#C8B3F6" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
  <line x1="744" y1="155" x2="764" y2="175" stroke="#C8B3F6" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
  <!-- Legs -->
  <line x1="722" y1="194" x2="718" y2="230" stroke="#C8B3F6" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="738" y1="194" x2="742" y2="230" stroke="#C8B3F6" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <!-- Thought bubble / apple above Newton -->
  <circle cx="728" cy="95" r="7" fill="url(#appleGrad)" filter="url(#glow11)" opacity="0.9"/>
  <line x1="728" y1="88" x2="728" y2="84" stroke="#C8B3F6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Dotted line apple to head -->
  <line x1="728" y1="100" x2="728" y2="110" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="2 3" opacity="0.45"/>

  <!-- Equation box -->
  <rect x="688" y="240" width="94" height="44" rx="6" fill="#2D1C7F" opacity="0.55" stroke="#C8B3F6" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="735" y="258" text-anchor="middle" fill="#FFFFFF" font-family="Axiforma, sans-serif" font-size="10" font-style="italic" filter="url(#glow11)">F = G m₁m₂</text>
  <line x1="698" y1="263" x2="772" y2="263" stroke="#C8B3F6" stroke-width="0.8" opacity="0.6"/>
  <text x="735" y="276" text-anchor="middle" fill="#FFFFFF" font-family="Axiforma, sans-serif" font-size="10" font-style="italic">r²</text>
  <text x="735" y="295" text-anchor="middle" fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="9" opacity="0.75">Newton, 1687</text>

  <!-- caption ribbon -->
  <rect x="0" y="0" width="800" height="30" fill="#0D0E20" opacity="0.45"/>
  <text x="400" y="20" fill="#FFFFFF" font-family="Playfair Display, serif" font-size="13" font-style="italic" text-anchor="middle" opacity="0.95">
    Apple, Moon, and Earth: one law of universal gravitation connects them all.
  </text>
</svg>
