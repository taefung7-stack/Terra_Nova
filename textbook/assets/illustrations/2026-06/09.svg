<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e0a2e"/>
      <stop offset="100%" stop-color="#2d1060"/>
    </linearGradient>
    <linearGradient id="snowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="tropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="dryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg)"/>

  <!-- Subtle world-map grid lines -->
  <line x1="0" y1="175" x2="800" y2="175" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <line x1="400" y1="0" x2="400" y2="350" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="400" cy="175" rx="380" ry="130" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.25"/>
  <ellipse cx="400" cy="175" rx="250" ry="130" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="400" cy="175" rx="110" ry="130" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.15"/>

  <!-- ===== PANEL 1: Cold / Northern ===== -->
  <!-- Panel background -->
  <rect x="30" y="40" width="210" height="270" rx="14" fill="#2d1060" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  <!-- Snowflakes -->
  <g fill="#c4b5fd" opacity="0.8" filter="url(#glow)">
    <text x="55" y="80" font-size="28">❄️</text>
    <text x="200" y="72" font-size="18">❄️</text>
    <text x="175" y="100" font-size="13">❄️</text>
    <text x="80" y="65" font-size="12">❄️</text>
  </g>
  <!-- Bowl of kimchi / fermented food icon -->
  <ellipse cx="135" cy="175" rx="52" ry="20" fill="#4c1d95" stroke="#a78bfa" stroke-width="2"/>
  <path d="M83 175 Q135 230 187 175" fill="#5b21b6" stroke="#a78bfa" stroke-width="2"/>
  <!-- wavy food surface -->
  <path d="M90 175 Q110 163 130 170 Q150 177 170 165 Q182 160 187 170" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.9"/>
  <!-- label tag -->
  <rect x="72" y="200" width="126" height="22" rx="6" fill="#6d28d9" opacity="0.85"/>
  <text x="135" y="216" font-family="Georgia, serif" font-size="12" fill="#ede9fe" text-anchor="middle">Kimchi · Sauerkraut</text>
  <!-- climate label -->
  <rect x="72" y="228" width="126" height="22" rx="6" fill="#4c1d95" opacity="0.8"/>
  <text x="135" y="244" font-family="Georgia, serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Cold Climate</text>
  <!-- technique label -->
  <text x="135" y="290" font-family="Georgia, serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-style="italic">→ Fermentation</text>

  <!-- Panel title -->
  <text x="135" y="295" font-family="Georgia, serif" font-size="0" fill="none"/>
  <rect x="72" y="270" width="126" height="24" rx="6" fill="#3b0764" opacity="0.7"/>
  <text x="135" y="286" font-family="Georgia, serif" font-size="11" fill="#ddd6fe" text-anchor="middle" font-weight="bold">Fermentation</text>

  <!-- ===== PANEL 2: Tropical ===== -->
  <rect x="295" y="40" width="210" height="270" rx="14" fill="#2d1060" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>
  <!-- Sun -->
  <circle cx="400" cy="85" r="28" fill="#fbbf24" opacity="0.85" filter="url(#glow)"/>
  <g stroke="#fbbf24" stroke-width="2" opacity="0.7">
    <line x1="400" y1="48" x2="400" y2="38"/>
    <line x1="420" y1="55" x2="428" y2="47"/>
    <line x1="427" y1="75" x2="437" y2="75"/>
    <line x1="420" y1="95" x2="428" y2="103"/>
    <line x1="400" y1="102" x2="400" y2="112"/>
    <line x1="380" y1="95" x2="372" y2="103"/>
    <line x1="373" y1="75" x2="363" y2="75"/>
    <line x1="380" y1="55" x2="372" y2="47"/>
  </g>
  <!-- Spice icons: chili, mortar -->
  <text x="368" y="155" font-size="30" filter="url(#glow)">🌶️</text>
  <text x="408" y="155" font-size="28" filter="url(#glow)">🫚</text>
  <!-- plate with spices -->
  <ellipse cx="400" cy="188" rx="48" ry="16" fill="#4c1d95" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="385" cy="182" r="7" fill="#dc2626" opacity="0.9"/>
  <circle cx="400" cy="180" r="6" fill="#ca8a04" opacity="0.9"/>
  <circle cx="414" cy="183" r="6" fill="#16a34a" opacity="0.9"/>
  <!-- labels -->
  <rect x="337" y="203" width="126" height="22" rx="6" fill="#6d28d9" opacity="0.85"/>
  <text x="400" y="219" font-family="Georgia, serif" font-size="12" fill="#ede9fe" text-anchor="middle">Chili · Turmeric</text>
  <rect x="337" y="228" width="126" height="22" rx="6" fill="#4c1d95" opacity="0.8"/>
  <text x="400" y="244" font-family="Georgia, serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Tropical Climate</text>
  <rect x="337" y="270" width="126" height="24" rx="6" fill="#3b0764" opacity="0.7"/>
  <text x="400" y="286" font-family="Georgia, serif" font-size="11" fill="#ddd6fe" text-anchor="middle" font-weight="bold">Spices</text>

  <!-- ===== PANEL 3: Dry / Grassland ===== -->
  <rect x="560" y="40" width="210" height="270" rx="14" fill="#2d1060" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
  <!-- Rain drops / wheat sketch -->
  <g opacity="0.75">
    <!-- wheat stalks -->
    <line x1="620" y1="155" x2="620" y2="100" stroke="#d97706" stroke-width="2"/>
    <ellipse cx="620" cy="97" rx="6" ry="14" fill="#d97706" opacity="0.8"/>
    <line x1="640" y1="158" x2="640" y2="103" stroke="#d97706" stroke-width="2"/>
    <ellipse cx="640" cy="100" rx="6" ry="14" fill="#d97706" opacity="0.8"/>
    <line x1="660" y1="153" x2="660" y2="98" stroke="#d97706" stroke-width="2"/>
    <ellipse cx="660" cy="95" rx="6" ry="14" fill="#d97706" opacity="0.8"/>
    <line x1="680" y1="155" x2="680" y2="100" stroke="#d97706" stroke-width="2"/>
    <ellipse cx="680" cy="97" rx="6" ry="14" fill="#d97706" opacity="0.8"/>
    <line x1="700" y1="157" x2="700" y2="102" stroke="#d97706" stroke-width="2"/>
    <ellipse cx="700" cy="99" rx="6" ry="14" fill="#d97706" opacity="0.8"/>
  </g>
  <!-- flatbread -->
  <ellipse cx="665" cy="182" rx="48" ry="12" fill="#92400e" stroke="#d97706" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="665" cy="180" rx="44" ry="9" fill="#b45309" opacity="0.85"/>
  <path d="M625 180 Q645 173 665 177 Q685 181 705 175" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.6"/>
  <!-- labels -->
  <rect x="602" y="203" width="126" height="22" rx="6" fill="#6d28d9" opacity="0.85"/>
  <text x="665" y="219" font-family="Georgia, serif" font-size="12" fill="#ede9fe" text-anchor="middle">Wheat · Barley</text>
  <rect x="602" y="228" width="126" height="22" rx="6" fill="#4c1d95" opacity="0.8"/>
  <text x="665" y="244" font-family="Georgia, serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Dry Climate</text>
  <rect x="602" y="270" width="126" height="24" rx="6" fill="#3b0764" opacity="0.7"/>
  <text x="665" y="286" font-family="Georgia, serif" font-size="11" fill="#ddd6fe" text-anchor="middle" font-weight="bold">Flatbread</text>

  <!-- ===== Arrows between panels ===== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8b5cf6"/>
    </marker>
  </defs>
  <line x1="242" y1="175" x2="293" y2="175" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="507" y1="175" x2="558" y2="175" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Main title -->
  <text x="400" y="26" font-family="Georgia, serif" font-size="15" fill="#ede9fe" text-anchor="middle" letter-spacing="3" font-weight="bold" opacity="0.9">CLIMATE  ·  CUISINE  ·  CULTURE</text>
</svg>
