<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <!-- Purple palette background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
    <!-- Ground surface gradient -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2d7a"/>
      <stop offset="100%" stop-color="#2a1550"/>
    </linearGradient>
    <!-- Board gradient -->
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <!-- Action arrow gradient -->
    <linearGradient id="arrowAction" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <!-- Reaction arrow gradient -->
    <linearGradient id="arrowReact" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <!-- Wheel gradient -->
    <radialGradient id="wheel" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b21a8"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    <!-- Subtle noise overlay -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowheadAction" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowheadReact" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d946ef"/>
    </marker>
    <marker id="arrowheadForward" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg)"/>

  <!-- Subtle grid lines for depth -->
  <g stroke="#4a2d7a" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="350"/>
    <line x1="400" y1="0" x2="400" y2="350"/>
    <line x1="600" y1="0" x2="600" y2="350"/>
  </g>

  <!-- Ground / pavement surface -->
  <rect x="0" y="290" width="800" height="60" fill="url(#ground)"/>
  <!-- Pavement texture lines -->
  <line x1="0" y1="295" x2="800" y2="295" stroke="#6b21a8" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="290" x2="100" y2="350" stroke="#6b21a8" stroke-width="0.5" opacity="0.3"/>
  <line x1="300" y1="290" x2="300" y2="350" stroke="#6b21a8" stroke-width="0.5" opacity="0.3"/>
  <line x1="500" y1="290" x2="500" y2="350" stroke="#6b21a8" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="290" x2="700" y2="350" stroke="#6b21a8" stroke-width="0.5" opacity="0.3"/>

  <!-- ═══════════════════════════════ -->
  <!-- SKATEBOARDER (mid-ollie, ~x=380) -->
  <!-- ═══════════════════════════════ -->

  <!-- Skateboard deck (tilted upward for ollie) -->
  <g transform="translate(310, 235) rotate(-12)">
    <rect x="0" y="0" width="130" height="14" rx="6" fill="url(#board)" stroke="#e9d5ff" stroke-width="1.5"/>
    <!-- Board bolts -->
    <circle cx="22" cy="7" r="2.5" fill="#7c3aed"/>
    <circle cx="108" cy="7" r="2.5" fill="#7c3aed"/>
    <!-- Board graphic stripe -->
    <rect x="40" y="3" width="50" height="8" rx="2" fill="#7c3aed" opacity="0.5"/>
    <!-- Wheels -->
    <circle cx="22" cy="16" r="9" fill="url(#wheel)" stroke="#c084fc" stroke-width="1.5"/>
    <circle cx="108" cy="16" r="9" fill="url(#wheel)" stroke="#c084fc" stroke-width="1.5"/>
    <!-- Wheel hub details -->
    <circle cx="22" cy="16" r="4" fill="#4a1d96"/>
    <circle cx="108" cy="16" r="4" fill="#4a1d96"/>
  </g>

  <!-- Rider body (simplified stick-figure style, dynamic ollie pose) -->
  <!-- Back leg (extended downward stomp direction) -->
  <line x1="390" y1="200" x2="415" y2="240" stroke="#e9d5ff" stroke-width="5" stroke-linecap="round"/>
  <!-- Front leg (bent, pulling up) -->
  <line x1="360" y1="205" x2="350" y2="240" stroke="#e9d5ff" stroke-width="5" stroke-linecap="round"/>
  <!-- Torso -->
  <line x1="375" y1="165" x2="380" y2="205" stroke="#e9d5ff" stroke-width="6" stroke-linecap="round"/>
  <!-- Arms (spread for balance) -->
  <line x1="375" y1="175" x2="340" y2="185" stroke="#e9d5ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="380" y1="175" x2="415" y2="180" stroke="#e9d5ff" stroke-width="4" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="375" cy="150" r="18" fill="#c084fc" stroke="#e9d5ff" stroke-width="2"/>
  <!-- Helmet strap / visor -->
  <path d="M357 145 Q375 136 393 145" stroke="#7c3aed" stroke-width="3" fill="none"/>
  <!-- Face dots (eyes) -->
  <circle cx="369" cy="150" r="2" fill="#1a0a2e"/>
  <circle cx="381" cy="150" r="2" fill="#1a0a2e"/>

  <!-- Shoes -->
  <ellipse cx="410" cy="243" rx="10" ry="6" fill="#7c3aed" stroke="#c084fc" stroke-width="1.5"/>
  <ellipse cx="348" cy="242" rx="10" ry="6" fill="#7c3aed" stroke="#c084fc" stroke-width="1.5"/>

  <!-- Motion lines (speed streaks) -->
  <line x1="290" y1="160" x2="250" y2="162" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="290" y1="175" x2="245" y2="178" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="290" y1="190" x2="255" y2="192" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- FORCE ARROWS                                    -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- ACTION FORCE arrow: foot → ground (downward, orange) -->
  <line x1="410" y1="252" x2="410" y2="282" stroke="#f97316" stroke-width="3.5"
        marker-end="url(#arrowheadAction)" stroke-linecap="round"/>
  <!-- Action force label -->
  <rect x="422" y="255" width="120" height="22" rx="4" fill="#7c2d12" opacity="0.75"/>
  <text x="482" y="270" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11"
        fill="#fed7aa" text-anchor="middle" font-weight="700">Action Force ↓</text>

  <!-- REACTION FORCE arrow: ground → board (upward, purple) -->
  <line x1="350" y1="282" x2="350" y2="228" stroke="#d946ef" stroke-width="3.5"
        marker-end="url(#arrowheadReact)" stroke-linecap="round"/>
  <!-- Reaction force label -->
  <rect x="160" y="240" width="130" height="22" rx="4" fill="#581c87" opacity="0.8"/>
  <text x="225" y="255" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11"
        fill="#f0abfc" text-anchor="middle" font-weight="700">Reaction Force ↑</text>
  <!-- Connecting dashed line from label to arrow -->
  <line x1="290" y1="251" x2="343" y2="262" stroke="#d946ef" stroke-width="1"
        stroke-dasharray="3,3" opacity="0.6"/>

  <!-- FORWARD MOTION arrow (green, horizontal) -->
  <line x1="440" y1="200" x2="520" y2="200" stroke="#34d399" stroke-width="3"
        marker-end="url(#arrowheadForward)" stroke-linecap="round"/>
  <rect x="528" y="189" width="110" height="22" rx="4" fill="#064e3b" opacity="0.8"/>
  <text x="583" y="204" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11"
        fill="#a7f3d0" text-anchor="middle" font-weight="700">Net Motion →</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- NEWTON'S 3RD LAW LABEL (top-left badge)        -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="20" y="18" width="240" height="52" rx="10" fill="#3b0764" stroke="#a855f7" stroke-width="1.5" opacity="0.92"/>
  <text x="140" y="42" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13"
        fill="#e9d5ff" text-anchor="middle" font-weight="700" letter-spacing="0.5">Newton's Third Law</text>
  <text x="140" y="60" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10"
        fill="#c084fc" text-anchor="middle">Action = Equal &amp; Opposite Reaction</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- FORMULA BADGE (top-right)                       -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="580" y="18" width="200" height="52" rx="10" fill="#3b0764" stroke="#a855f7" stroke-width="1.5" opacity="0.92"/>
  <text x="680" y="40" font-family="'Courier New', monospace" font-size="15"
        fill="#f0abfc" text-anchor="middle" font-weight="700">F_action = −F_reaction</text>
  <text x="680" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9"
        fill="#c084fc" text-anchor="middle">Equal magnitude · Opposite direction</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- GROUND LABEL                                    -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="60" y="315" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11"
        fill="#c084fc" opacity="0.8">Pavement (ground)</text>

  <!-- Decorative star specks (purple palette) -->
  <circle cx="70" cy="50" r="1.5" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="155" cy="90" r="1" fill="#c084fc" opacity="0.4"/>
  <circle cx="540" cy="70" r="1.5" fill="#e9d5ff" opacity="0.4"/>
  <circle cx="740" cy="40" r="1" fill="#c084fc" opacity="0.5"/>
  <circle cx="680" cy="120" r="1" fill="#e9d5ff" opacity="0.3"/>
  <circle cx="120" cy="260" r="1" fill="#c084fc" opacity="0.3"/>
</svg>
