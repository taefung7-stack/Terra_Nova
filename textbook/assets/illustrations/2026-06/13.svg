<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e0a3c"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b59f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9b59f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-f">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg)"/>

  <!-- === LEFT: Bacterial Doubling Tree === -->
  <!-- Glow halo -->
  <ellipse cx="175" cy="175" rx="130" ry="130" fill="url(#glow1)" opacity="0.6"/>

  <!-- Title label -->
  <text x="175" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c084fc" letter-spacing="1">BACTERIAL DOUBLING</text>

  <!-- Gen 0: 1 cell -->
  <circle cx="175" cy="55" r="11" fill="#7c3aed" stroke="#c084fc" stroke-width="1.5" filter="url(#glow-f)"/>
  <text x="175" y="59.5" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e9d5ff">1</text>

  <!-- Branches Gen 0 → Gen 1 -->
  <line x1="175" y1="66" x2="127" y2="100" stroke="#a855f7" stroke-width="1.2" opacity="0.8"/>
  <line x1="175" y1="66" x2="223" y2="100" stroke="#a855f7" stroke-width="1.2" opacity="0.8"/>

  <!-- Gen 1: 2 cells -->
  <circle cx="127" cy="111" r="10" fill="#7c3aed" stroke="#c084fc" stroke-width="1.4" filter="url(#glow-f)"/>
  <text x="127" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e9d5ff">2</text>
  <circle cx="223" cy="111" r="10" fill="#7c3aed" stroke="#c084fc" stroke-width="1.4" filter="url(#glow-f)"/>
  <text x="223" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e9d5ff">2</text>

  <!-- Branches Gen 1 → Gen 2 -->
  <line x1="127" y1="121" x2="95"  y2="155" stroke="#a855f7" stroke-width="1.0" opacity="0.7"/>
  <line x1="127" y1="121" x2="155" y2="155" stroke="#a855f7" stroke-width="1.0" opacity="0.7"/>
  <line x1="223" y1="121" x2="197" y2="155" stroke="#a855f7" stroke-width="1.0" opacity="0.7"/>
  <line x1="223" y1="121" x2="255" y2="155" stroke="#a855f7" stroke-width="1.0" opacity="0.7"/>

  <!-- Gen 2: 4 cells -->
  <circle cx="95"  cy="164" r="9" fill="#6d28d9" stroke="#d8b4fe" stroke-width="1.2" filter="url(#glow-f)"/>
  <circle cx="155" cy="164" r="9" fill="#6d28d9" stroke="#d8b4fe" stroke-width="1.2" filter="url(#glow-f)"/>
  <circle cx="197" cy="164" r="9" fill="#6d28d9" stroke="#d8b4fe" stroke-width="1.2" filter="url(#glow-f)"/>
  <circle cx="255" cy="164" r="9" fill="#6d28d9" stroke="#d8b4fe" stroke-width="1.2" filter="url(#glow-f)"/>

  <!-- Branches Gen 2 → Gen 3 -->
  <line x1="95"  y1="173" x2="72"  y2="202" stroke="#a855f7" stroke-width="0.8" opacity="0.6"/>
  <line x1="95"  y1="173" x2="112" y2="202" stroke="#a855f7" stroke-width="0.8" opacity="0.6"/>
  <line x1="155" y1="173" x2="140" y2="202" stroke="#a855f7" stroke-width="0.8" opacity="0.6"/>
  <line x1="155" y1="173" x2="170" y2="202" stroke="#a855f7" stroke-width="0.8" opacity="0.6"/>
  <line x1="197" y1="173" x2="184" y2="202" stroke="#a855f7" stroke-width="0.8" opacity="0.6"/>
  <line x1="197" y1="173" x2="210" y2="202" stroke="#a855f7" stroke-width="0.8" opacity="0.6"/>
  <line x1="255" y1="173" x2="240" y2="202" stroke="#a855f7" stroke-width="0.8" opacity="0.6"/>
  <line x1="255" y1="173" x2="272" y2="202" stroke="#a855f7" stroke-width="0.8" opacity="0.6"/>

  <!-- Gen 3: 8 cells (smaller) -->
  <circle cx="72"  cy="209" r="7" fill="#5b21b6" stroke="#c084fc" stroke-width="1" filter="url(#glow-f)"/>
  <circle cx="112" cy="209" r="7" fill="#5b21b6" stroke="#c084fc" stroke-width="1" filter="url(#glow-f)"/>
  <circle cx="140" cy="209" r="7" fill="#5b21b6" stroke="#c084fc" stroke-width="1" filter="url(#glow-f)"/>
  <circle cx="170" cy="209" r="7" fill="#5b21b6" stroke="#c084fc" stroke-width="1" filter="url(#glow-f)"/>
  <circle cx="184" cy="209" r="7" fill="#5b21b6" stroke="#c084fc" stroke-width="1" filter="url(#glow-f)"/>
  <circle cx="210" cy="209" r="7" fill="#5b21b6" stroke="#c084fc" stroke-width="1" filter="url(#glow-f)"/>
  <circle cx="240" cy="209" r="7" fill="#5b21b6" stroke="#c084fc" stroke-width="1" filter="url(#glow-f)"/>
  <circle cx="272" cy="209" r="7" fill="#5b21b6" stroke="#c084fc" stroke-width="1" filter="url(#glow-f)"/>

  <!-- Generation labels -->
  <text x="305" y="58"  font-family="sans-serif" font-size="10" fill="#a78bfa">×1</text>
  <text x="305" y="114" font-family="sans-serif" font-size="10" fill="#a78bfa">×2</text>
  <text x="305" y="167" font-family="sans-serif" font-size="10" fill="#a78bfa">×4</text>
  <text x="305" y="212" font-family="sans-serif" font-size="10" fill="#a78bfa">×8</text>

  <!-- Divider -->
  <line x1="330" y1="20" x2="330" y2="330" stroke="#4c1d95" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>

  <!-- === RIGHT: Exponential vs Logistic graph === -->
  <ellipse cx="570" cy="175" rx="180" ry="130" fill="url(#glow2)" opacity="0.4"/>

  <text x="565" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c084fc" letter-spacing="1">POPULATION CURVE</text>

  <!-- Graph axes -->
  <line x1="370" y1="310" x2="760" y2="310" stroke="#6d28d9" stroke-width="1.5"/>
  <line x1="370" y1="310" x2="370" y2="45"  stroke="#6d28d9" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="565" y="330" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a78bfa">Time</text>
  <text x="355" y="180" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a78bfa" transform="rotate(-90,355,180)">Population</text>

  <!-- Exponential curve (purple, dashed) -->
  <path d="M 370 308
             C 400 305, 430 298, 460 280
             C 490 258, 510 220, 530 170
             C 545 130, 560 85,  575 50"
        fill="none" stroke="#9b59f7" stroke-width="2" stroke-dasharray="6 3" opacity="0.85"/>

  <!-- Logistic / S-curve (bright purple, solid) -->
  <path d="M 370 306
             C 400 304, 430 298, 460 280
             C 490 255, 515 210, 545 165
             C 570 125, 610 85,  650 72
             C 690 64,  730 62,  760 61"
        fill="none" stroke="#c084fc" stroke-width="2.5" filter="url(#glow-f)"/>

  <!-- Carrying capacity line -->
  <line x1="370" y1="61" x2="760" y2="61" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>
  <text x="762" y="65" font-family="sans-serif" font-size="9" fill="#a78bfa">K</text>

  <!-- Labels on curves -->
  <text x="580" y="44" font-family="sans-serif" font-size="10" fill="#9b59f7">exponential</text>
  <text x="665" y="76" font-family="sans-serif" font-size="10" fill="#c084fc">logistic</text>

  <!-- Annotations -->
  <text x="460" y="268" font-family="sans-serif" font-size="9" fill="#ddd6fe">rapid</text>
  <text x="455" y="279" font-family="sans-serif" font-size="9" fill="#ddd6fe">doubling</text>
  <line x1="470" y1="281" x2="462" y2="296" stroke="#a78bfa" stroke-width="0.8"/>

  <text x="625" y="95" font-family="sans-serif" font-size="9" fill="#ddd6fe">resources</text>
  <text x="627" y="106" font-family="sans-serif" font-size="9" fill="#ddd6fe">run out</text>
  <line x1="648" y1="100" x2="665" y2="75" stroke="#a78bfa" stroke-width="0.8"/>

  <!-- Bottom caption strip -->
  <rect x="0" y="335" width="800" height="15" fill="#0d0520" opacity="0.8"/>
  <text x="400" y="346" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7c3aed" letter-spacing="0.5">1 → 2 → 4 → 8 → … until the curve bends</text>
</svg>
