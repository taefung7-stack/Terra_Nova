<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" role="img" aria-label="Two curves on a grid: a straight linear line and a sharply rising exponential curve">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2D1C7F"/>
      <stop offset="55%" stop-color="#5032C0"/>
      <stop offset="100%" stop-color="#7546E8"/>
    </linearGradient>
    <linearGradient id="expoStroke" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"  stop-color="#C8B3F6" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="350" fill="url(#bg2)"/>

  <!-- faint background scatter -->
  <g fill="#FFFFFF" opacity="0.18">
    <circle cx="70"  cy="40"  r="1"/>
    <circle cx="180" cy="60"  r="0.8"/>
    <circle cx="320" cy="35"  r="1.1"/>
    <circle cx="470" cy="55"  r="0.9"/>
    <circle cx="620" cy="35"  r="1"/>
    <circle cx="740" cy="65"  r="0.9"/>
  </g>

  <!-- grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="0.6">
    <line x1="60"  y1="60"  x2="760" y2="60"/>
    <line x1="60"  y1="120" x2="760" y2="120"/>
    <line x1="60"  y1="180" x2="760" y2="180"/>
    <line x1="60"  y1="240" x2="760" y2="240"/>
    <line x1="60"  y1="300" x2="760" y2="300"/>
    <line x1="160" y1="40"  x2="160" y2="310"/>
    <line x1="290" y1="40"  x2="290" y2="310"/>
    <line x1="420" y1="40"  x2="420" y2="310"/>
    <line x1="550" y1="40"  x2="550" y2="310"/>
    <line x1="680" y1="40"  x2="680" y2="310"/>
  </g>

  <!-- axes -->
  <g stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="1.2">
    <line x1="60" y1="310" x2="760" y2="310"/>
    <line x1="60" y1="40"  x2="60"  y2="310"/>
  </g>
  <!-- axis ticks + labels -->
  <g fill="#C8B3F6" font-family="Axiforma, sans-serif" font-size="9">
    <text x="60"  y="325" text-anchor="middle">0</text>
    <text x="290" y="325" text-anchor="middle">10</text>
    <text x="550" y="325" text-anchor="middle">20</text>
    <text x="420" y="340" text-anchor="middle" font-style="italic" opacity="0.85">day</text>
    <text x="40"  y="310" text-anchor="end" font-size="8">1</text>
    <text x="40"  y="180" text-anchor="end" font-size="8">10⁴</text>
    <text x="40"  y="60"  text-anchor="end" font-size="8">10⁶</text>
  </g>

  <!-- Linear line: y = x · slow slope -->
  <g filter="url(#glow)">
    <line x1="60" y1="308" x2="760" y2="235" stroke="#C8B3F6" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="6 4"/>
  </g>

  <!-- Exponential curve: flat then shoots up -->
  <path d="M 60 308 Q 300 305 460 280 C 560 260 620 200 670 110 C 695 68 715 50 760 40"
        stroke="url(#expoStroke)" stroke-width="3.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- data points on exponential -->
  <g fill="#FFFFFF">
    <circle cx="160" cy="306" r="3.5"/>
    <circle cx="290" cy="300" r="3.5"/>
    <circle cx="420" cy="287" r="3.5"/>
    <circle cx="550" cy="230" r="3.5"/>
    <circle cx="680" cy="90"  r="4"/>
  </g>
  <g fill="#C8B3F6">
    <circle cx="160" cy="301" r="3"/>
    <circle cx="290" cy="284" r="3"/>
    <circle cx="420" cy="268" r="3"/>
    <circle cx="550" cy="255" r="3"/>
    <circle cx="680" cy="244" r="3"/>
  </g>

  <!-- Labels -->
  <g font-family="Playfair Display, serif" font-style="italic" font-size="16" fill="#FFFFFF">
    <text x="690" y="60" text-anchor="end" filter="url(#glow)">Exponential ×2</text>
  </g>
  <g font-family="Playfair Display, serif" font-style="italic" font-size="13" fill="#C8B3F6" opacity="0.9">
    <text x="720" y="228" text-anchor="end">Linear +1</text>
  </g>

  <!-- Gap annotation at day 20 -->
  <g stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="1" stroke-dasharray="2 2">
    <line x1="550" y1="230" x2="550" y2="255"/>
  </g>
  <text x="560" y="246" fill="#FFFFFF" font-family="Axiforma, sans-serif" font-size="9" opacity="0.9">gap grows →</text>

  <!-- caption ribbon -->
  <rect x="0" y="0" width="800" height="30" fill="#0D0E20" opacity="0.45"/>
  <text x="400" y="20" fill="#FFFFFF" font-family="Playfair Display, serif" font-size="13" font-style="italic" text-anchor="middle" opacity="0.95">
    When a straight line meets a curve that never stops rising.
  </text>
</svg>
