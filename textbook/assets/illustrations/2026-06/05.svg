<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" role="img" aria-label="RNA strand folding and enclosing inside a lipid membrane to form a primitive cell">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1A0A5E"/>
      <stop offset="50%" stop-color="#3B1990"/>
      <stop offset="100%" stop-color="#6932CC"/>
    </linearGradient>
    <linearGradient id="membraneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#C8A8F0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7040C8" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="cellGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#9B6EE0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#4A1FA0" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="rnaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#E8D8FF"/>
      <stop offset="100%" stop-color="#B07FEF"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#C8A8F0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9060D8" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softBloom">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg5)"/>

  <!-- Faint star scatter -->
  <g fill="#FFFFFF" opacity="0.12">
    <circle cx="45"  cy="25"  r="1"/>
    <circle cx="120" cy="55"  r="0.8"/>
    <circle cx="200" cy="20"  r="1.1"/>
    <circle cx="320" cy="38"  r="0.9"/>
    <circle cx="480" cy="22"  r="1"/>
    <circle cx="610" cy="42"  r="0.8"/>
    <circle cx="720" cy="18"  r="1.2"/>
    <circle cx="760" cy="60"  r="0.9"/>
    <circle cx="55"  cy="300" r="0.9"/>
    <circle cx="170" cy="320" r="1"/>
    <circle cx="380" cy="308" r="0.8"/>
    <circle cx="530" cy="325" r="1.1"/>
    <circle cx="680" cy="312" r="0.9"/>
    <circle cx="745" cy="295" r="1"/>
  </g>

  <!-- ═══════════════════════════════════════════════════
       STAGE 1 — RNA strand (left panel, x≈50–230)
       ═══════════════════════════════════════════════════ -->

  <!-- Panel background wash -->
  <rect x="30" y="55" width="205" height="240" rx="14" fill="#2A1270" opacity="0.40"/>

  <!-- RNA backbone — sinusoidal ribbon -->
  <path d="M75,85 C95,95 115,75 135,85 C155,95 175,75 195,85 C215,95 220,100 220,115
            C220,130 215,140 195,145 C175,150 155,140 135,145 C115,150 95,145 75,148
            C60,150 52,162 55,178 C58,194 75,200 95,198 C115,196 135,188 155,192
            C175,196 195,195 210,205"
        fill="none" stroke="url(#rnaGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.90" filter="url(#glow5)"/>

  <!-- Base-pair rungs (horizontal dashes across backbone) -->
  <g stroke="#D4B8FF" stroke-width="1.4" opacity="0.70">
    <line x1="82"  y1="88"  x2="82"  y2="102"/>
    <line x1="100" y1="78"  x2="100" y2="92"/>
    <line x1="118" y1="83"  x2="118" y2="97"/>
    <line x1="136" y1="87"  x2="136" y2="101"/>
    <line x1="154" y1="78"  x2="154" y2="92"/>
    <line x1="172" y1="83"  x2="172" y2="97"/>
    <line x1="190" y1="87"  x2="190" y2="101"/>
    <line x1="210" y1="98"  x2="210" y2="112"/>
    <line x1="205" y1="118" x2="205" y2="132"/>
    <line x1="188" y1="143" x2="188" y2="157"/>
    <line x1="170" y1="137" x2="170" y2="151"/>
    <line x1="152" y1="142" x2="152" y2="156"/>
    <line x1="134" y1="147" x2="134" y2="161"/>
    <line x1="116" y1="146" x2="116" y2="160"/>
    <line x1="98"  y1="145" x2="98"  y2="159"/>
    <line x1="80"  y1="148" x2="80"  y2="162"/>
  </g>

  <!-- Nucleotide dots along backbone -->
  <g fill="#E8D8FF" opacity="0.85" filter="url(#glow5)">
    <circle cx="75"  cy="85"  r="3.5"/>
    <circle cx="115" cy="75"  r="3.5"/>
    <circle cx="155" cy="78"  r="3.5"/>
    <circle cx="195" cy="85"  r="3.5"/>
    <circle cx="135" cy="145" r="3.5"/>
    <circle cx="95"  cy="148" r="3.5"/>
    <circle cx="155" cy="192" r="3.5"/>
    <circle cx="210" cy="205" r="3.5"/>
  </g>

  <!-- Stage label -->
  <text x="132" y="270" font-family="Georgia, serif" font-size="12" font-weight="bold"
        fill="#D4B8FF" text-anchor="middle" opacity="0.90">RNA Strand</text>
  <text x="132" y="285" font-family="sans-serif" font-size="9.5"
        fill="#B09ACC" text-anchor="middle" opacity="0.75" font-style="italic">self-copying molecule</text>

  <!-- ═══════════════════════════════════════════════════
       ARROW 1 → 2  (x≈245–310)
       ═══════════════════════════════════════════════════ -->
  <line x1="252" y1="175" x2="308" y2="175" stroke="url(#arrowGrad)" stroke-width="2.2" opacity="0.80"/>
  <polygon points="308,175 298,170 298,180" fill="#C8A8F0" opacity="0.80"/>
  <text x="280" y="163" font-family="sans-serif" font-size="8.5" fill="#B09ACC"
        text-anchor="middle" opacity="0.70" font-style="italic">copies &amp; varies</text>

  <!-- ═══════════════════════════════════════════════════
       STAGE 2 — RNA coiling / folding (centre, x≈315–485)
       ═══════════════════════════════════════════════════ -->

  <!-- Panel wash -->
  <rect x="315" y="55" width="170" height="240" rx="14" fill="#2A1270" opacity="0.40"/>

  <!-- Coiling RNA ribbon — tighter spiral suggesting folding/complexity -->
  <path d="M340,100 C360,88 385,96 395,112 C405,128 398,148 382,158
            C366,168 345,165 335,150 C325,135 330,115 345,108
            C360,101 378,105 385,118 C392,131 386,148 374,155
            C362,162 348,158 342,147"
        fill="none" stroke="url(#rnaGrad)" stroke-width="3" stroke-linecap="round" opacity="0.88" filter="url(#glow5)"/>

  <!-- Protein helper dots (small coloured circles approaching the coil) -->
  <g filter="url(#glow5)">
    <circle cx="430" cy="118" r="5.5" fill="#F0C060" opacity="0.82"/>
    <circle cx="445" cy="140" r="5"   fill="#F0C060" opacity="0.78"/>
    <circle cx="428" cy="162" r="5.5" fill="#F0C060" opacity="0.82"/>
    <circle cx="412" cy="178" r="4.5" fill="#EAA840" opacity="0.72"/>
  </g>
  <!-- "protein" label -->
  <text x="458" y="148" font-family="sans-serif" font-size="9" fill="#F0D890"
        text-anchor="start" opacity="0.80" font-style="italic">protein</text>
  <text x="458" y="159" font-family="sans-serif" font-size="9" fill="#F0D890"
        text-anchor="start" opacity="0.80" font-style="italic">helpers</text>

  <!-- Dotted lines from protein to coil -->
  <line x1="426" y1="118" x2="410" y2="123" stroke="#F0C060" stroke-width="1" stroke-dasharray="3,2" opacity="0.55"/>
  <line x1="440" y1="140" x2="420" y2="138" stroke="#F0C060" stroke-width="1" stroke-dasharray="3,2" opacity="0.55"/>
  <line x1="424" y1="162" x2="404" y2="155" stroke="#F0C060" stroke-width="1" stroke-dasharray="3,2" opacity="0.55"/>

  <!-- Stage label -->
  <text x="395" y="270" font-family="Georgia, serif" font-size="12" font-weight="bold"
        fill="#D4B8FF" text-anchor="middle" opacity="0.90">RNA World</text>
  <text x="395" y="285" font-family="sans-serif" font-size="9.5"
        fill="#B09ACC" text-anchor="middle" opacity="0.75" font-style="italic">selection &amp; complexity</text>

  <!-- ═══════════════════════════════════════════════════
       ARROW 2 → 3  (x≈498–558)
       ═══════════════════════════════════════════════════ -->
  <line x1="500" y1="175" x2="556" y2="175" stroke="url(#arrowGrad)" stroke-width="2.2" opacity="0.80"/>
  <polygon points="556,175 546,170 546,180" fill="#C8A8F0" opacity="0.80"/>
  <text x="528" y="163" font-family="sans-serif" font-size="8.5" fill="#B09ACC"
        text-anchor="middle" opacity="0.70" font-style="italic">enclosed</text>

  <!-- ═══════════════════════════════════════════════════
       STAGE 3 — Primitive Cell (right, x≈565–770)
       ═══════════════════════════════════════════════════ -->

  <!-- Panel wash -->
  <rect x="565" y="55" width="210" height="240" rx="14" fill="#2A1270" opacity="0.40"/>

  <!-- Outer lipid membrane — double ring -->
  <ellipse cx="672" cy="175" rx="88" ry="82"
           fill="url(#cellGrad)" stroke="#C8A8F0" stroke-width="2.8" opacity="0.92" filter="url(#softBloom)"/>
  <ellipse cx="672" cy="175" rx="76" ry="70"
           fill="none" stroke="#A888E0" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.50"/>

  <!-- Lipid tails — short lines radiating outward from outer membrane -->
  <g stroke="#9060C8" stroke-width="1.2" opacity="0.55">
    <line x1="672" y1="93"  x2="672" y2="80"/>
    <line x1="712" y1="100" x2="722" y2="89"/>
    <line x1="745" y1="130" x2="757" y2="122"/>
    <line x1="755" y1="170" x2="768" y2="170"/>
    <line x1="745" y1="215" x2="757" y2="224"/>
    <line x1="712" y1="245" x2="722" y2="257"/>
    <line x1="672" y1="257" x2="672" y2="270"/>
    <line x1="632" y1="248" x2="622" y2="258"/>
    <line x1="600" y1="218" x2="588" y2="226"/>
    <line x1="588" y1="175" x2="574" y2="175"/>
    <line x1="600" y1="132" x2="588" y2="122"/>
    <line x1="632" y1="102" x2="622" y2="91"/>
  </g>

  <!-- RNA inside the cell — small coil shape -->
  <path d="M648,162 C658,154 672,158 678,168 C684,178 678,192 668,196
            C658,200 646,194 644,183 C642,172 650,164 660,163"
        fill="none" stroke="#E8D8FF" stroke-width="2.5" stroke-linecap="round" opacity="0.85" filter="url(#glow5)"/>

  <!-- Glow dot at RNA centre -->
  <circle cx="663" cy="178" r="4.5" fill="#E8D8FF" opacity="0.75" filter="url(#glow5)"/>

  <!-- "RNA" label inside cell -->
  <text x="693" y="180" font-family="Georgia, serif" font-size="10" font-style="italic"
        fill="#E8D8FF" text-anchor="start" opacity="0.85">RNA</text>

  <!-- "membrane" pointer label -->
  <line x1="756" y1="138" x2="740" y2="150" stroke="#C8A8F0" stroke-width="1" opacity="0.60"/>
  <text x="762" y="136" font-family="sans-serif" font-size="9" fill="#C8A8F0"
        text-anchor="start" opacity="0.75" font-style="italic">lipid</text>
  <text x="762" y="147" font-family="sans-serif" font-size="9" fill="#C8A8F0"
        text-anchor="start" opacity="0.75" font-style="italic">membrane</text>

  <!-- Stage label -->
  <text x="672" y="270" font-family="Georgia, serif" font-size="12" font-weight="bold"
        fill="#D4B8FF" text-anchor="middle" opacity="0.90">Primitive Cell</text>
  <text x="672" y="285" font-family="sans-serif" font-size="9.5"
        fill="#B09ACC" text-anchor="middle" opacity="0.75" font-style="italic">RNA enclosed &amp; protected</text>

  <!-- ═══════════════════════════════════════════════════
       Bottom label strip
       ═══════════════════════════════════════════════════ -->
  <rect x="0" y="326" width="800" height="24" fill="#080618" opacity="0.50"/>
  <text x="400" y="342" font-family="Georgia, serif" font-size="10"
        fill="#E8D8FF" text-anchor="middle" opacity="0.78" letter-spacing="2">RNA  ·  SELF-REPLICATION  ·  ORIGIN OF LIFE</text>
</svg>
