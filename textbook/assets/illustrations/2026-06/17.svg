<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d1155;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pagodaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="buddhaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d8b4fe;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bgGrad)"/>

  <!-- Subtle ground line -->
  <rect x="0" y="295" width="800" height="55" fill="#0d0620" opacity="0.6"/>

  <!-- Stars background -->
  <circle cx="60" cy="30" r="1.2" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="140" cy="55" r="0.8" fill="#e9d5ff" opacity="0.4"/>
  <circle cx="220" cy="20" r="1" fill="#c084fc" opacity="0.5"/>
  <circle cx="330" cy="40" r="0.9" fill="#e9d5ff" opacity="0.3"/>
  <circle cx="450" cy="15" r="1.2" fill="#c084fc" opacity="0.4"/>
  <circle cx="570" cy="45" r="0.8" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="670" cy="22" r="1" fill="#c084fc" opacity="0.4"/>
  <circle cx="760" cy="55" r="0.9" fill="#e9d5ff" opacity="0.3"/>
  <circle cx="100" cy="80" r="0.7" fill="#c084fc" opacity="0.3"/>
  <circle cx="500" cy="70" r="0.7" fill="#e9d5ff" opacity="0.3"/>
  <circle cx="720" cy="80" r="0.8" fill="#c084fc" opacity="0.4"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEFT: PAGODA SILHOUETTE (x≈100, centred)  -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(110, 295)" filter="url(#glow)">
    <!-- Base platform -->
    <rect x="-42" y="-10" width="84" height="10" rx="2" fill="url(#pagodaGrad)"/>
    <!-- Story 1 -->
    <rect x="-34" y="-30" width="68" height="20" rx="1" fill="url(#pagodaGrad)"/>
    <polygon points="-42,-30 42,-30 34,-40 -34,-40" fill="#a855f7"/>
    <!-- Story 2 -->
    <rect x="-26" y="-52" width="52" height="18" rx="1" fill="url(#pagodaGrad)"/>
    <polygon points="-34,-52 34,-52 26,-61 -26,-61" fill="#9333ea"/>
    <!-- Story 3 -->
    <rect x="-18" y="-72" width="36" height="18" rx="1" fill="url(#pagodaGrad)"/>
    <polygon points="-26,-72 26,-72 18,-81 -18,-81" fill="#7c3aed"/>
    <!-- Story 4 -->
    <rect x="-10" y="-92" width="20" height="17" rx="1" fill="url(#pagodaGrad)"/>
    <polygon points="-18,-92 18,-92 10,-100 -10,-100" fill="#6d28d9"/>
    <!-- Spire -->
    <line x1="0" y1="-100" x2="0" y2="-130" stroke="#c084fc" stroke-width="2.5"/>
    <circle cx="0" cy="-133" r="4" fill="#e9d5ff" filter="url(#glow)"/>
    <!-- Eave decorations (small lines) -->
    <line x1="-42" y1="-30" x2="-50" y2="-26" stroke="#c084fc" stroke-width="1.2" opacity="0.7"/>
    <line x1="42" y1="-30" x2="50" y2="-26" stroke="#c084fc" stroke-width="1.2" opacity="0.7"/>
    <line x1="-34" y1="-52" x2="-42" y2="-48" stroke="#c084fc" stroke-width="1.2" opacity="0.7"/>
    <line x1="34" y1="-52" x2="42" y2="-48" stroke="#c084fc" stroke-width="1.2" opacity="0.7"/>
    <line x1="-26" y1="-72" x2="-33" y2="-68" stroke="#c084fc" stroke-width="1.2" opacity="0.6"/>
    <line x1="26" y1="-72" x2="33" y2="-68" stroke="#c084fc" stroke-width="1.2" opacity="0.6"/>
    <line x1="-18" y1="-92" x2="-24" y2="-88" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
    <line x1="18" y1="-92" x2="24" y2="-88" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Label: Pagoda -->
  <text x="110" y="326" text-anchor="middle" font-family="serif" font-size="12" fill="#d8b4fe" opacity="0.85">석탑 Pagoda</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CENTER: SEATED BUDDHA SILHOUETTE (x≈400)  -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(400, 295)" filter="url(#softGlow)">
    <!-- Lotus base -->
    <ellipse cx="0" cy="-6" rx="52" ry="10" fill="#6d28d9" opacity="0.8"/>
    <!-- Lotus petals -->
    <ellipse cx="-36" cy="-10" rx="16" ry="7" fill="#a855f7" opacity="0.7" transform="rotate(-18, -36, -10)"/>
    <ellipse cx="-18" cy="-14" rx="16" ry="6" fill="#9333ea" opacity="0.8" transform="rotate(-8, -18, -14)"/>
    <ellipse cx="0" cy="-16" rx="16" ry="6" fill="#a855f7" opacity="0.9"/>
    <ellipse cx="18" cy="-14" rx="16" ry="6" fill="#9333ea" opacity="0.8" transform="rotate(8, 18, -14)"/>
    <ellipse cx="36" cy="-10" rx="16" ry="7" fill="#a855f7" opacity="0.7" transform="rotate(18, 36, -10)"/>
    <!-- Body / robe -->
    <ellipse cx="0" cy="-55" rx="34" ry="40" fill="url(#buddhaGrad)" opacity="0.95"/>
    <!-- Arms folded (mudra) -->
    <ellipse cx="-22" cy="-30" rx="14" ry="7" fill="#c084fc" opacity="0.8" transform="rotate(15,-22,-30)"/>
    <ellipse cx="22" cy="-30" rx="14" ry="7" fill="#c084fc" opacity="0.8" transform="rotate(-15,22,-30)"/>
    <!-- Hands joining -->
    <ellipse cx="0" cy="-26" rx="14" ry="5" fill="#d8b4fe" opacity="0.9"/>
    <!-- Neck -->
    <rect x="-8" y="-97" width="16" height="10" rx="4" fill="#e9d5ff"/>
    <!-- Head -->
    <ellipse cx="0" cy="-112" rx="22" ry="24" fill="url(#buddhaGrad)"/>
    <!-- Ushnisha (topknot) -->
    <ellipse cx="0" cy="-136" rx="10" ry="9" fill="#c084fc"/>
    <circle cx="0" cy="-145" r="4" fill="#e9d5ff" filter="url(#glow)"/>
    <!-- Face features -->
    <ellipse cx="-7" cy="-110" rx="2.5" ry="1.5" fill="#7c3aed" opacity="0.8"/>
    <ellipse cx="7" cy="-110" rx="2.5" ry="1.5" fill="#7c3aed" opacity="0.8"/>
    <path d="M -5 -100 Q 0 -97 5 -100" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.8"/>
    <!-- Halo ring -->
    <circle cx="0" cy="-112" r="34" fill="none" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>
    <circle cx="0" cy="-112" r="40" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Label: Buddha -->
  <text x="400" y="326" text-anchor="middle" font-family="serif" font-size="12" fill="#d8b4fe" opacity="0.85">석불 Buddha</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- RIGHT: TEMPLE BELL (Bongmunjong) (x≈660) -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(660, 295)" filter="url(#glow)">
    <!-- Hanging beam -->
    <rect x="-6" y="-195" width="12" height="18" rx="3" fill="#6d28d9"/>
    <!-- Dragon loop (simplified) -->
    <ellipse cx="0" cy="-185" rx="14" ry="8" fill="none" stroke="#c084fc" stroke-width="2.5"/>
    <ellipse cx="0" cy="-185" rx="8" ry="5" fill="#7c3aed" opacity="0.8"/>
    <!-- Bell top cap -->
    <ellipse cx="0" cy="-175" rx="26" ry="9" fill="#7c3aed"/>
    <!-- Bell body -->
    <path d="M -26 -175 C -38 -140 -42 -100 -38 -60 Q -26 -20 0 -14 Q 26 -20 38 -60 C 42 -100 38 -140 26 -175 Z" fill="url(#bellGrad)"/>
    <!-- Horizontal band decorations -->
    <line x1="-36" y1="-140" x2="36" y2="-140" stroke="#6d28d9" stroke-width="2" opacity="0.7"/>
    <line x1="-38" y1="-110" x2="38" y2="-110" stroke="#6d28d9" stroke-width="2" opacity="0.7"/>
    <!-- Lotus panel on bell -->
    <circle cx="0" cy="-90" r="14" fill="none" stroke="#9333ea" stroke-width="1.5" opacity="0.7"/>
    <circle cx="0" cy="-90" r="6" fill="#9333ea" opacity="0.5"/>
    <!-- Sound waves (emanating left) -->
    <path d="M -42 -90 Q -58 -80 -56 -60" stroke="#c084fc" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M -44 -90 Q -65 -75 -62 -50" stroke="#c084fc" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Bottom rim -->
    <ellipse cx="0" cy="-14" rx="38" ry="5" fill="#6d28d9" opacity="0.8"/>
  </g>

  <!-- Label: Bell -->
  <text x="660" y="326" text-anchor="middle" font-family="serif" font-size="12" fill="#d8b4fe" opacity="0.85">범종 Bell</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LOTUS MOTIFS — decorative bottom strip     -->
  <!-- ═══════════════════════════════════════════ -->
  <!-- Lotus group left-center -->
  <g transform="translate(255, 295)" opacity="0.55">
    <ellipse cx="0" cy="-18" rx="10" ry="5" fill="#a855f7"/>
    <ellipse cx="-12" cy="-12" rx="9" ry="4" fill="#7c3aed" transform="rotate(-30,-12,-12)"/>
    <ellipse cx="12" cy="-12" rx="9" ry="4" fill="#7c3aed" transform="rotate(30,12,-12)"/>
    <ellipse cx="-20" cy="-5" rx="8" ry="4" fill="#6d28d9" transform="rotate(-50,-20,-5)"/>
    <ellipse cx="20" cy="-5" rx="8" ry="4" fill="#6d28d9" transform="rotate(50,20,-5)"/>
    <line x1="0" y1="-13" x2="0" y2="0" stroke="#9333ea" stroke-width="2"/>
    <ellipse cx="0" cy="2" rx="14" ry="4" fill="#4c1d95" opacity="0.6"/>
  </g>
  <!-- Lotus group right-center -->
  <g transform="translate(540, 295)" opacity="0.55">
    <ellipse cx="0" cy="-18" rx="10" ry="5" fill="#a855f7"/>
    <ellipse cx="-12" cy="-12" rx="9" ry="4" fill="#7c3aed" transform="rotate(-30,-12,-12)"/>
    <ellipse cx="12" cy="-12" rx="9" ry="4" fill="#7c3aed" transform="rotate(30,12,-12)"/>
    <ellipse cx="-20" cy="-5" rx="8" ry="4" fill="#6d28d9" transform="rotate(-50,-20,-5)"/>
    <ellipse cx="20" cy="-5" rx="8" ry="4" fill="#6d28d9" transform="rotate(50,20,-5)"/>
    <line x1="0" y1="-13" x2="0" y2="0" stroke="#9333ea" stroke-width="2"/>
    <ellipse cx="0" cy="2" rx="14" ry="4" fill="#4c1d95" opacity="0.6"/>
  </g>

  <!-- Divider lines between sections -->
  <line x1="210" y1="60" x2="210" y2="290" stroke="#4c1d95" stroke-width="1" opacity="0.4"/>
  <line x1="590" y1="60" x2="590" y2="290" stroke="#4c1d95" stroke-width="1" opacity="0.4"/>

  <!-- Title text top-center -->
  <text x="400" y="28" text-anchor="middle" font-family="serif" font-size="15" font-style="italic" fill="#e9d5ff" opacity="0.75" letter-spacing="2">Three Kingdoms · Buddhism · 삼국시대 불교</text>
</svg>
