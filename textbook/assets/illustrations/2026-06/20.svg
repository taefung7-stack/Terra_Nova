<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg20" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0520"/>
      <stop offset="100%" stop-color="#1e0a3c"/>
    </linearGradient>
    <linearGradient id="screen20" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0636"/>
      <stop offset="100%" stop-color="#2d1056"/>
    </linearGradient>
    <linearGradient id="nodeGrad20" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="glow20">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowViolet" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 Z" fill="#c4b5fd"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg20)"/>

  <!-- Subtle grid pattern suggesting code environment -->
  <g opacity="0.06" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="350"/><line x1="200" y1="0" x2="200" y2="350"/>
    <line x1="300" y1="0" x2="300" y2="350"/><line x1="400" y1="0" x2="400" y2="350"/>
    <line x1="500" y1="0" x2="500" y2="350"/><line x1="600" y1="0" x2="600" y2="350"/>
    <line x1="700" y1="0" x2="700" y2="350"/>
  </g>

  <!-- ===== LEFT PANEL: Code window ===== -->
  <!-- Window frame -->
  <rect x="28" y="30" width="310" height="290" rx="10" ry="10" fill="#0d0225" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="28" y="30" width="310" height="28" rx="10" ry="10" fill="#2d1056"/>
  <rect x="28" y="44" width="310" height="14" fill="#2d1056"/>
  <!-- Window dots -->
  <circle cx="48" cy="44" r="5" fill="#7c3aed"/>
  <circle cx="64" cy="44" r="5" fill="#6d28d9"/>
  <circle cx="80" cy="44" r="5" fill="#5b21b6"/>
  <!-- File name -->
  <text x="188" y="50" fill="#c4b5fd" font-size="11" font-family="monospace" text-anchor="middle">food_web.py</text>

  <!-- Code lines -->
  <g font-family="monospace" font-size="11" fill="#a78bfa">
    <text x="42" y="80"><tspan fill="#6d28d9">01</tspan>  <tspan fill="#c4b5fd">class</tspan> <tspan fill="#e9d5ff">Producer</tspan>:</text>
    <text x="42" y="96"><tspan fill="#6d28d9">02</tspan>    population = <tspan fill="#ddd6fe">100</tspan></text>
    <text x="42" y="112"><tspan fill="#6d28d9">03</tspan>    growth_rate = <tspan fill="#ddd6fe">0.05</tspan></text>
    <text x="42" y="128"><tspan fill="#6d28d9">04</tspan>  </text>
    <text x="42" y="144"><tspan fill="#6d28d9">05</tspan>  <tspan fill="#c4b5fd">class</tspan> <tspan fill="#e9d5ff">Consumer</tspan>:</text>
    <text x="42" y="160"><tspan fill="#6d28d9">06</tspan>    population = <tspan fill="#ddd6fe">20</tspan></text>
    <text x="42" y="176"><tspan fill="#6d28d9">07</tspan>    feed_rate = <tspan fill="#ddd6fe">0.10</tspan></text>
    <text x="42" y="192"><tspan fill="#6d28d9">08</tspan>  </text>
    <text x="42" y="208"><tspan fill="#6d28d9">09</tspan>  <tspan fill="#c4b5fd">class</tspan> <tspan fill="#e9d5ff">Decomposer</tspan>:</text>
    <text x="42" y="224"><tspan fill="#6d28d9">10</tspan>    recycle_rate = <tspan fill="#ddd6fe">0.08</tspan></text>
    <text x="42" y="240"><tspan fill="#6d28d9">11</tspan>  </text>
    <text x="42" y="256"><tspan fill="#6d28d9">12</tspan>  <tspan fill="#c4b5fd">def</tspan> <tspan fill="#f0abfc">tick</tspan>(web):</text>
    <text x="42" y="272"><tspan fill="#6d28d9">13</tspan>    web.update_all()</text>
    <text x="42" y="288"><tspan fill="#6d28d9">14</tspan>    <tspan fill="#c4b5fd">if</tspan> web.collapsed: <tspan fill="#f0abfc">alert</tspan>()</text>
    <text x="42" y="305"><tspan fill="#6d28d9">15</tspan>  <tspan fill="#7c3aed">█</tspan>  <tspan fill="#7c3aed" opacity="0.5">(cursor)</tspan></text>
  </g>

  <!-- ===== RIGHT PANEL: Food-web diagram ===== -->
  <!-- Panel background -->
  <rect x="365" y="30" width="410" height="290" rx="10" ry="10" fill="url(#screen20)" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Panel title bar -->
  <rect x="365" y="30" width="410" height="28" rx="10" ry="10" fill="#2d1056"/>
  <rect x="365" y="44" width="410" height="14" fill="#2d1056"/>
  <text x="570" y="50" fill="#c4b5fd" font-size="11" font-family="monospace" text-anchor="middle">food_web_visualizer</text>

  <!-- ===== FOOD WEB NODES ===== -->

  <!-- SUN (energy source) -->
  <circle cx="570" cy="95" r="22" fill="#4c1d95" stroke="#f0abfc" stroke-width="2" filter="url(#glow20)"/>
  <text x="570" y="91" fill="#f0abfc" font-size="18" text-anchor="middle">☀️</text>
  <text x="570" y="106" fill="#e9d5ff" font-size="9" font-family="sans-serif" text-anchor="middle">Sun</text>

  <!-- PRODUCER (plant) -->
  <circle cx="460" cy="185" r="28" fill="url(#nodeGrad20)" stroke="#a78bfa" stroke-width="2" filter="url(#softglow)"/>
  <text x="460" y="181" fill="#e9d5ff" font-size="20" text-anchor="middle">🌿</text>
  <text x="460" y="197" fill="#e9d5ff" font-size="9" font-family="sans-serif" text-anchor="middle">Producer</text>

  <!-- HERBIVORE (primary consumer) -->
  <circle cx="570" cy="215" r="28" fill="url(#nodeGrad20)" stroke="#a78bfa" stroke-width="2" filter="url(#softglow)"/>
  <text x="570" y="211" fill="#e9d5ff" font-size="20" text-anchor="middle">🐇</text>
  <text x="570" y="227" fill="#e9d5ff" font-size="9" font-family="sans-serif" text-anchor="middle">Herbivore</text>

  <!-- PREDATOR (secondary consumer) -->
  <circle cx="680" cy="185" r="28" fill="url(#nodeGrad20)" stroke="#a78bfa" stroke-width="2" filter="url(#softglow)"/>
  <text x="680" y="181" fill="#e9d5ff" font-size="20" text-anchor="middle">🦊</text>
  <text x="680" y="197" fill="#e9d5ff" font-size="9" font-family="sans-serif" text-anchor="middle">Predator</text>

  <!-- DECOMPOSER -->
  <circle cx="570" cy="295" r="24" fill="#3b0764" stroke="#c4b5fd" stroke-width="2" filter="url(#softglow)"/>
  <text x="570" y="291" fill="#c4b5fd" font-size="18" text-anchor="middle">🍄</text>
  <text x="570" y="307" fill="#c4b5fd" font-size="9" font-family="sans-serif" text-anchor="middle">Decomposer</text>

  <!-- ===== ARROWS between nodes ===== -->
  <!-- Sun → Producer (energy) -->
  <line x1="553" y1="112" x2="473" y2="160" stroke="#f0abfc" stroke-width="2" marker-end="url(#arrowViolet)" opacity="0.9"/>

  <!-- Producer → Herbivore (feeding) -->
  <line x1="488" y1="185" x2="542" y2="207" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Herbivore → Predator (feeding) -->
  <line x1="598" y1="207" x2="652" y2="192" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Herbivore → Decomposer (death) -->
  <line x1="570" y1="243" x2="570" y2="271" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>

  <!-- Predator → Decomposer (death) -->
  <line x1="663" y1="210" x2="592" y2="278" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>

  <!-- Producer → Decomposer (litter) -->
  <line x1="460" y1="213" x2="547" y2="278" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>

  <!-- Decomposer → Producer (nutrient recycling, curved) -->
  <path d="M546,285 Q400,270 440,213" stroke="#c4b5fd" stroke-width="2" fill="none" marker-end="url(#arrowViolet)" opacity="0.8"/>

  <!-- Edge labels -->
  <text x="498" y="145" fill="#f0abfc" font-size="9" font-family="sans-serif" text-anchor="middle">energy</text>
  <text x="510" y="200" fill="#ddd6fe" font-size="9" font-family="sans-serif">feeds</text>
  <text x="626" y="196" fill="#ddd6fe" font-size="9" font-family="sans-serif">feeds</text>
  <text x="583" y="260" fill="#a78bfa" font-size="9" font-family="sans-serif">dies→</text>
  <text x="400" y="250" fill="#c4b5fd" font-size="9" font-family="sans-serif">nutrients</text>

  <!-- ===== TICK counter ===== -->
  <rect x="375" y="40" width="80" height="18" rx="4" fill="#1a0636" stroke="#6d28d9" stroke-width="1"/>
  <text x="415" y="53" fill="#a78bfa" font-size="10" font-family="monospace" text-anchor="middle">tick: 247</text>

  <!-- Population badges on nodes -->
  <rect x="440" y="155" width="40" height="14" rx="3" fill="#1e0a3c" stroke="#7c3aed" stroke-width="1"/>
  <text x="460" y="165" fill="#e9d5ff" font-size="8" font-family="monospace" text-anchor="middle">pop:84</text>

  <rect x="550" y="183" width="40" height="14" rx="3" fill="#1e0a3c" stroke="#7c3aed" stroke-width="1"/>
  <text x="570" y="193" fill="#e9d5ff" font-size="8" font-family="monospace" text-anchor="middle">pop:18</text>

  <rect x="660" y="153" width="40" height="14" rx="3" fill="#1e0a3c" stroke="#7c3aed" stroke-width="1"/>
  <text x="680" y="163" fill="#e9d5ff" font-size="8" font-family="monospace" text-anchor="middle">pop:9</text>

  <rect x="550" y="260" width="40" height="14" rx="3" fill="#1e0a3c" stroke="#7c3aed" stroke-width="1"/>
  <text x="570" y="270" fill="#c4b5fd" font-size="8" font-family="monospace" text-anchor="middle">pop:31</text>

  <!-- Divider between panels -->
  <rect x="343" y="30" width="20" height="290" rx="5" fill="url(#bg20)"/>
  <line x1="353" y1="30" x2="353" y2="320" stroke="#5b21b6" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Title -->
  <text x="400" y="18" fill="#e9d5ff" font-size="13" font-family="serif" font-weight="bold" text-anchor="middle" filter="url(#glow20)">Food Web Simulator — Code · Visualize · Observe</text>
</svg>
