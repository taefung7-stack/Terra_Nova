<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a3c"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </radialGradient>
    <radialGradient id="earthGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3b82c4"/>
      <stop offset="60%" stop-color="#1d5fa8"/>
      <stop offset="100%" stop-color="#0e3a6e"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#d4c5f0"/>
      <stop offset="60%" stop-color="#a78fd4"/>
      <stop offset="100%" stop-color="#7a5fa8"/>
    </radialGradient>
    <radialGradient id="sunGrad" cx="40%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fff4a0"/>
      <stop offset="100%" stop-color="#e8a020"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <circle cx="30" cy="20" r="1" fill="#c9b8e8" opacity="0.7"/>
  <circle cx="90" cy="45" r="1.5" fill="#e0d4f8" opacity="0.6"/>
  <circle cx="150" cy="15" r="1" fill="#b8a8d8" opacity="0.5"/>
  <circle cx="220" cy="60" r="1" fill="#d0c4ec" opacity="0.6"/>
  <circle cx="300" cy="25" r="1.2" fill="#e8dcfc" opacity="0.7"/>
  <circle cx="50" cy="100" r="0.8" fill="#c4b4e4" opacity="0.5"/>
  <circle cx="120" cy="80" r="1" fill="#d8ccf4" opacity="0.6"/>
  <circle cx="500" cy="18" r="1.2" fill="#c8b8e8" opacity="0.6"/>
  <circle cx="620" cy="35" r="1" fill="#dccef6" opacity="0.5"/>
  <circle cx="700" cy="15" r="1.5" fill="#e4d8f8" opacity="0.7"/>
  <circle cx="760" cy="55" r="0.9" fill="#cabae8" opacity="0.6"/>
  <circle cx="740" cy="100" r="1" fill="#d4c8f0" opacity="0.5"/>
  <circle cx="680" cy="80" r="1.2" fill="#beaedc" opacity="0.6"/>
  <circle cx="50" cy="280" r="1" fill="#c8b8e8" opacity="0.4"/>
  <circle cx="130" cy="320" r="0.8" fill="#d4c4ec" opacity="0.5"/>
  <circle cx="660" cy="290" r="1" fill="#d0c0e8" opacity="0.4"/>
  <circle cx="750" cy="310" r="1.2" fill="#dcd0f4" opacity="0.5"/>

  <!-- Sun (small, top-left) -->
  <circle cx="72" cy="175" r="28" fill="url(#sunGrad)" filter="url(#softGlow)" opacity="0.92"/>
  <text x="72" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#f5e080" opacity="0.9">SUN</text>
  <!-- Sun rays -->
  <line x1="72" y1="140" x2="72" y2="132" stroke="#f5d060" stroke-width="2" opacity="0.6"/>
  <line x1="99" y1="148" x2="104" y2="141" stroke="#f5d060" stroke-width="2" opacity="0.6"/>
  <line x1="109" y1="175" x2="117" y2="175" stroke="#f5d060" stroke-width="2" opacity="0.6"/>
  <line x1="99" y1="202" x2="104" y2="209" stroke="#f5d060" stroke-width="2" opacity="0.6"/>
  <line x1="72" y1="210" x2="72" y2="218" stroke="#f5d060" stroke-width="2" opacity="0.6"/>
  <line x1="44" y1="202" x2="40" y2="209" stroke="#f5d060" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="175" x2="27" y2="175" stroke="#f5d060" stroke-width="2" opacity="0.6"/>
  <line x1="44" y1="148" x2="40" y2="141" stroke="#f5d060" stroke-width="2" opacity="0.6"/>

  <!-- Earth (center) — with tidal bulges as water ovals -->
  <!-- Far-side water bulge (left) -->
  <ellipse cx="327" cy="175" rx="22" ry="46" fill="#4aa8e0" opacity="0.55"/>
  <!-- Near-side water bulge (right) -->
  <ellipse cx="473" cy="175" rx="22" ry="46" fill="#4aa8e0" opacity="0.55"/>
  <!-- Earth body -->
  <circle cx="400" cy="175" r="72" fill="url(#earthGrad)" filter="url(#glow)"/>
  <!-- Earth landmass hints -->
  <ellipse cx="385" cy="155" rx="20" ry="14" fill="#2d8a4e" opacity="0.6"/>
  <ellipse cx="420" cy="185" rx="15" ry="10" fill="#2d8a4e" opacity="0.5"/>
  <ellipse cx="395" cy="200" rx="10" ry="7" fill="#2d8a4e" opacity="0.4"/>
  <ellipse cx="375" cy="180" rx="7" ry="5" fill="#2d8a4e" opacity="0.35"/>
  <!-- Earth label -->
  <text x="400" y="179" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#e8f4ff">EARTH</text>
  <text x="400" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#b8d8f8">self-rotation →</text>

  <!-- Bulge labels -->
  <text x="327" y="242" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80d0f8" opacity="0.9">far-side</text>
  <text x="327" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80d0f8" opacity="0.9">bulge</text>
  <text x="473" y="242" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80d0f8" opacity="0.9">near-side</text>
  <text x="473" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80d0f8" opacity="0.9">bulge</text>

  <!-- HIGH TIDE labels on bulges -->
  <text x="327" y="162" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c8ecff" opacity="0.85">HIGH</text>
  <text x="327" y="172" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c8ecff" opacity="0.85">TIDE</text>
  <text x="473" y="162" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c8ecff" opacity="0.85">HIGH</text>
  <text x="473" y="172" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c8ecff" opacity="0.85">TIDE</text>

  <!-- Moon -->
  <circle cx="650" cy="175" r="42" fill="url(#moonGrad)" filter="url(#glow)"/>
  <circle cx="638" cy="162" r="6" fill="#8a70b8" opacity="0.4"/>
  <circle cx="658" cy="180" r="4" fill="#8a70b8" opacity="0.3"/>
  <circle cx="643" cy="190" r="5" fill="#8a70b8" opacity="0.35"/>
  <text x="650" y="179" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a0840">MOON</text>

  <!-- Gravity pull arrow from Moon to Earth -->
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a870f0"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#50b8f0"/>
    </marker>
  </defs>

  <!-- Moon gravity arrow pointing to Earth near side -->
  <line x1="606" y1="168" x2="497" y2="168" stroke="#a870f0" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)" opacity="0.85"/>
  <line x1="606" y1="182" x2="497" y2="182" stroke="#a870f0" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)" opacity="0.85"/>
  <text x="550" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#c898ff">gravity pull</text>

  <!-- Earth rotation arrow (curved) -->
  <path d="M 358 120 A 55 55 0 0 1 442 120" fill="none" stroke="#80c8f0" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arrowBlue)"/>

  <!-- 24h labels top and bottom -->
  <text x="400" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80c8f0" opacity="0.8">↻ 24 hrs</text>

  <!-- Low tide indicators (top and bottom of Earth) -->
  <text x="400" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c0d8f0" opacity="0.0">LOW</text>
  <text x="400" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c0d8f0" opacity="0.7">LOW TIDE</text>
  <text x="400" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c0d8f0" opacity="0.7">LOW TIDE</text>

  <!-- Spring / Neap note area (bottom) -->
  <rect x="160" y="298" width="480" height="42" rx="8" fill="#2a1060" opacity="0.7"/>
  <!-- Spring tide label -->
  <text x="255" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#f0e070">SPRING TIDE</text>
  <text x="255" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#d4c8f0">Sun + Moon aligned → strongest</text>
  <!-- divider -->
  <line x1="400" y1="302" x2="400" y2="336" stroke="#6a50a8" stroke-width="1" opacity="0.6"/>
  <!-- Neap tide label -->
  <text x="545" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#a0d8f8">NEAP TIDE</text>
  <text x="545" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#d4c8f0">Sun ⊥ Moon → weakest</text>
</svg>
