<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0040"/>
      <stop offset="100%" stop-color="#3b006e"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a1a6e"/>
      <stop offset="100%" stop-color="#2a0850"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d003a"/>
      <stop offset="100%" stop-color="#1b005c"/>
    </linearGradient>
    <linearGradient id="cloud1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#c084fc"/>
    </marker>
    <marker id="arrowViolet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#a855f7"/>
    </marker>
    <marker id="arrowWarm" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#e879f9"/>
    </marker>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="350" fill="url(#sky)"/>

  <!-- Ocean (left side) -->
  <ellipse cx="110" cy="280" rx="130" ry="60" fill="url(#ocean)" opacity="0.9"/>
  <text x="110" y="284" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a78bfa" opacity="0.8">Indian Ocean</text>

  <!-- Landmass Asia (center-right) -->
  <path d="M280,120 Q340,100 420,115 Q520,105 610,130 Q670,145 700,180 Q720,220 690,260 Q650,285 580,290 Q500,298 420,285 Q340,275 285,255 Q255,230 260,190 Q265,155 280,120 Z" fill="url(#land)" opacity="0.9"/>

  <!-- Southeast Asian peninsula -->
  <path d="M480,275 Q490,300 475,330 Q465,345 460,348 L455,348 Q458,335 462,318 Q468,298 480,275 Z" fill="#3b0764" opacity="0.85"/>

  <!-- India subcontinent shape -->
  <path d="M335,220 Q325,245 340,275 Q355,300 365,310 L360,312 Q343,300 328,272 Q312,240 322,215 Z" fill="#3b0764" opacity="0.85"/>

  <!-- Rice paddies (terraced, center-left of landmass) -->
  <g transform="translate(340,210)">
    <!-- Paddy terraces -->
    <rect x="0" y="30" width="70" height="8" rx="2" fill="#6d28d9" opacity="0.7"/>
    <rect x="5" y="20" width="60" height="8" rx="2" fill="#7c3aed" opacity="0.7"/>
    <rect x="10" y="10" width="50" height="8" rx="2" fill="#8b5cf6" opacity="0.7"/>
    <!-- Water shimmer on paddies -->
    <rect x="2" y="31" width="66" height="3" rx="1" fill="#a78bfa" opacity="0.4"/>
    <rect x="7" y="21" width="56" height="3" rx="1" fill="#a78bfa" opacity="0.4"/>
    <rect x="12" y="11" width="46" height="3" rx="1" fill="#a78bfa" opacity="0.4"/>
    <!-- Rice stalks -->
    <line x1="15" y1="10" x2="15" y2="2" stroke="#86efac" stroke-width="1.5"/>
    <line x1="25" y1="10" x2="25" y2="1" stroke="#86efac" stroke-width="1.5"/>
    <line x1="35" y1="10" x2="35" y2="3" stroke="#86efac" stroke-width="1.5"/>
    <line x1="45" y1="10" x2="45" y2="1" stroke="#86efac" stroke-width="1.5"/>
    <line x1="55" y1="10" x2="55" y2="2" stroke="#86efac" stroke-width="1.5"/>
    <ellipse cx="15" cy="2" rx="3" ry="2" fill="#4ade80" opacity="0.8"/>
    <ellipse cx="25" cy="1" rx="3" ry="2" fill="#4ade80" opacity="0.8"/>
    <ellipse cx="35" cy="3" rx="3" ry="2" fill="#4ade80" opacity="0.8"/>
    <ellipse cx="45" cy="1" rx="3" ry="2" fill="#4ade80" opacity="0.8"/>
    <ellipse cx="55" cy="2" rx="3" ry="2" fill="#4ade80" opacity="0.8"/>
  </g>

  <!-- Monsoon clouds (top center) -->
  <g filter="url(#glow)">
    <ellipse cx="490" cy="65" rx="70" ry="28" fill="url(#cloud1)" opacity="0.85"/>
    <ellipse cx="530" cy="55" rx="45" ry="22" fill="#c084fc" opacity="0.75"/>
    <ellipse cx="455" cy="60" rx="40" ry="20" fill="#9333ea" opacity="0.7"/>
    <ellipse cx="580" cy="72" rx="55" ry="24" fill="#a855f7" opacity="0.7"/>
    <ellipse cx="615" cy="62" rx="38" ry="18" fill="#c084fc" opacity="0.65"/>
  </g>

  <!-- Rain drops from clouds -->
  <g stroke="#818cf8" stroke-width="1.5" opacity="0.7">
    <line x1="460" y1="85" x2="455" y2="100"/>
    <line x1="475" y1="88" x2="470" y2="103"/>
    <line x1="490" y1="90" x2="485" y2="105"/>
    <line x1="505" y1="88" x2="500" y2="103"/>
    <line x1="520" y1="85" x2="515" y2="100"/>
    <line x1="535" y1="87" x2="530" y2="102"/>
    <line x1="550" y1="88" x2="545" y2="103"/>
    <line x1="565" y1="86" x2="560" y2="101"/>
    <line x1="585" y1="90" x2="580" y2="105"/>
    <line x1="600" y1="88" x2="595" y2="103"/>
  </g>

  <!-- WIND ARROWS: from ocean toward land (summer monsoon) -->
  <!-- Main large arrow from ocean to land -->
  <path d="M175,240 Q230,200 278,175" stroke="#c084fc" stroke-width="3" fill="none" stroke-dasharray="none" marker-end="url(#arrowPurple)" opacity="0.9"/>
  <path d="M155,270 Q215,240 270,210" stroke="#a855f7" stroke-width="2.5" fill="none" marker-end="url(#arrowViolet)" opacity="0.8"/>
  <path d="M140,300 Q200,270 265,240" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrowViolet)" opacity="0.7"/>

  <!-- Wind arrow curving up toward clouds -->
  <path d="M280,175 Q360,130 445,85" stroke="#e879f9" stroke-width="2.5" fill="none" marker-end="url(#arrowWarm)" opacity="0.8"/>
  <path d="M295,195 Q380,150 460,100" stroke="#c084fc" stroke-width="2" fill="none" marker-end="url(#arrowPurple)" opacity="0.7"/>

  <!-- Wind arrow sweeping further east -->
  <path d="M580,90 Q650,110 700,150" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrowViolet)" opacity="0.7"/>

  <!-- WIND LABEL -->
  <text x="185" y="220" font-family="Georgia, serif" font-size="11" fill="#e9d5ff" opacity="0.9" transform="rotate(-30,185,220)">Summer</text>
  <text x="178" y="233" font-family="Georgia, serif" font-size="11" fill="#e9d5ff" opacity="0.9" transform="rotate(-30,178,233)">Monsoon</text>

  <!-- Map label: ASIA -->
  <text x="530" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#ddd6fe" opacity="0.5" letter-spacing="4">ASIA</text>

  <!-- Regional labels -->
  <text x="368" y="170" font-family="Georgia, serif" font-size="9" fill="#c4b5fd" opacity="0.85">South</text>
  <text x="365" y="180" font-family="Georgia, serif" font-size="9" fill="#c4b5fd" opacity="0.85">Asia</text>

  <text x="490" y="175" font-family="Georgia, serif" font-size="9" fill="#c4b5fd" opacity="0.85">Southeast</text>
  <text x="490" y="185" font-family="Georgia, serif" font-size="9" fill="#c4b5fd" opacity="0.85">Asia</text>

  <text x="600" y="165" font-family="Georgia, serif" font-size="9" fill="#c4b5fd" opacity="0.85">East</text>
  <text x="597" y="175" font-family="Georgia, serif" font-size="9" fill="#c4b5fd" opacity="0.85">Asia</text>

  <!-- Rice paddy label -->
  <text x="405" y="255" font-family="Georgia, serif" font-size="9" fill="#86efac" opacity="0.9">Rice Paddies</text>

  <!-- Sun heating land indicator -->
  <circle cx="710" cy="40" r="20" fill="#fbbf24" opacity="0.15"/>
  <circle cx="710" cy="40" r="14" fill="#fcd34d" opacity="0.25"/>
  <circle cx="710" cy="40" r="8" fill="#fde68a" opacity="0.5"/>
  <g stroke="#fcd34d" stroke-width="1.5" opacity="0.4">
    <line x1="710" y1="18" x2="710" y2="12"/>
    <line x1="710" y1="62" x2="710" y2="68"/>
    <line x1="688" y1="40" x2="682" y2="40"/>
    <line x1="732" y1="40" x2="738" y2="40"/>
    <line x1="694" y1="24" x2="690" y2="20"/>
    <line x1="726" y1="56" x2="730" y2="60"/>
    <line x1="726" y1="24" x2="730" y2="20"/>
    <line x1="694" y1="56" x2="690" y2="60"/>
  </g>
  <text x="710" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#fde68a" opacity="0.6">Land heats</text>

  <!-- Heat rising arrow from land -->
  <path d="M660,200 Q665,170 670,140" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.4" marker-end="url(#arrowWarm)"/>

  <!-- Border frame -->
  <rect x="2" y="2" width="796" height="346" rx="6" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>

  <!-- Caption area accent line -->
  <line x1="20" y1="338" x2="780" y2="338" stroke="#6d28d9" stroke-width="1" opacity="0.4"/>
</svg>
