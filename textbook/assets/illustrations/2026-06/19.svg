<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="sky19" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e0a3c"/>
      <stop offset="100%" stop-color="#3b1373"/>
    </linearGradient>
    <linearGradient id="terrace19" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="water19" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="mountain19" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <filter id="glow19">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="350" fill="url(#sky19)"/>

  <!-- Distant mountain silhouette -->
  <polygon points="0,220 120,80 240,150 360,60 480,130 600,40 720,110 800,70 800,350 0,350"
           fill="url(#mountain19)" opacity="0.5"/>

  <!-- Main terraced hillside — slope from bottom-right to top-left -->
  <!-- Terrace 1 (lowest, widest) -->
  <polygon points="80,310 520,310 500,275 100,275" fill="#6d28d9"/>
  <rect x="100" y="270" width="400" height="5" fill="url(#water19)" rx="2"/>
  <!-- Terrace wall 1 -->
  <rect x="80" y="275" width="20" height="35" fill="#4c1d95"/>
  <rect x="500" y="275" width="20" height="35" fill="#4c1d95"/>

  <!-- Terrace 2 -->
  <polygon points="150,275 470,275 450,240 170,240" fill="#7c3aed"/>
  <rect x="170" y="235" width="280" height="5" fill="url(#water19)" rx="2"/>
  <!-- Terrace wall 2 -->
  <rect x="150" y="240" width="20" height="35" fill="#5b21b6"/>
  <rect x="450" y="240" width="20" height="35" fill="#5b21b6"/>

  <!-- Terrace 3 -->
  <polygon points="210,240 430,240 410,205 230,205" fill="#8b5cf6"/>
  <rect x="230" y="200" width="180" height="5" fill="url(#water19)" rx="2"/>
  <!-- Terrace wall 3 -->
  <rect x="210" y="205" width="20" height="35" fill="#6d28d9"/>
  <rect x="410" y="205" width="20" height="35" fill="#6d28d9"/>

  <!-- Terrace 4 -->
  <polygon points="265,205 395,205 375,172 285,172" fill="#a78bfa"/>
  <rect x="285" y="167" width="90" height="5" fill="url(#water19)" rx="2"/>
  <!-- Terrace wall 4 -->
  <rect x="265" y="172" width="20" height="33" fill="#7c3aed"/>
  <rect x="375" y="172" width="20" height="33" fill="#7c3aed"/>

  <!-- Terrace 5 (top, smallest) -->
  <polygon points="310,172 360,172 345,142 325,142" fill="#c4b5fd"/>
  <rect x="325" y="137" width="20" height="5" fill="url(#water19)" rx="2"/>
  <rect x="310" y="142" width="15" height="30" fill="#8b5cf6"/>
  <rect x="345" y="142" width="15" height="30" fill="#8b5cf6"/>

  <!-- Rice plant dashes on terraces -->
  <!-- Terrace 1 plants -->
  <g fill="#a78bfa" opacity="0.9">
    <rect x="140" y="266" width="3" height="8" rx="1"/>
    <rect x="180" y="266" width="3" height="8" rx="1"/>
    <rect x="220" y="266" width="3" height="8" rx="1"/>
    <rect x="260" y="266" width="3" height="8" rx="1"/>
    <rect x="300" y="266" width="3" height="8" rx="1"/>
    <rect x="340" y="266" width="3" height="8" rx="1"/>
    <rect x="380" y="266" width="3" height="8" rx="1"/>
    <rect x="420" y="266" width="3" height="8" rx="1"/>
    <rect x="460" y="266" width="3" height="8" rx="1"/>
  </g>
  <!-- Terrace 2 plants -->
  <g fill="#c4b5fd" opacity="0.9">
    <rect x="200" y="231" width="3" height="7" rx="1"/>
    <rect x="240" y="231" width="3" height="7" rx="1"/>
    <rect x="280" y="231" width="3" height="7" rx="1"/>
    <rect x="320" y="231" width="3" height="7" rx="1"/>
    <rect x="360" y="231" width="3" height="7" rx="1"/>
    <rect x="400" y="231" width="3" height="7" rx="1"/>
  </g>
  <!-- Terrace 3 plants -->
  <g fill="#ede9fe" opacity="0.9">
    <rect x="250" y="196" width="3" height="6" rx="1"/>
    <rect x="290" y="196" width="3" height="6" rx="1"/>
    <rect x="330" y="196" width="3" height="6" rx="1"/>
    <rect x="370" y="196" width="3" height="6" rx="1"/>
  </g>

  <!-- Valley floor at bottom -->
  <rect x="0" y="315" width="800" height="35" fill="#2e1065" opacity="0.8"/>
  <!-- Stream in valley -->
  <path d="M0,328 Q200,322 400,330 Q600,338 800,326" stroke="#a78bfa" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- Labels -->
  <!-- Elevation arrow -->
  <line x1="60" y1="310" x2="60" y2="140" stroke="#c4b5fd" stroke-width="2" marker-end="url(#arr19)"/>
  <defs>
    <marker id="arr19" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c4b5fd"/>
    </marker>
  </defs>
  <text x="48" y="230" fill="#c4b5fd" font-size="11" font-family="sans-serif" text-anchor="middle" transform="rotate(-90,48,230)">ELEVATION</text>

  <!-- Terrace labels -->
  <text x="540" y="298" fill="#e9d5ff" font-size="12" font-family="sans-serif">Terraced</text>
  <text x="540" y="313" fill="#e9d5ff" font-size="12" font-family="sans-serif">rice paddies</text>
  <line x1="520" y1="295" x2="490" y2="290" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- Valley label -->
  <text x="30" y="337" fill="#c4b5fd" font-size="11" font-family="sans-serif">Valley floor (alluvial soil)</text>

  <!-- Summit label -->
  <text x="335" y="130" fill="#ede9fe" font-size="11" font-family="sans-serif" text-anchor="middle">Summit</text>

  <!-- Pastoral slope label -->
  <text x="680" y="155" fill="#d8b4fe" font-size="11" font-family="sans-serif" text-anchor="middle">Pastoral</text>
  <text x="680" y="168" fill="#d8b4fe" font-size="11" font-family="sans-serif" text-anchor="middle">slopes</text>

  <!-- Small sheep icons on distant slope -->
  <ellipse cx="630" cy="135" rx="8" ry="5" fill="#f5f3ff" opacity="0.8"/>
  <circle cx="637" cy="130" r="4" fill="#f5f3ff" opacity="0.8"/>
  <ellipse cx="670" cy="125" rx="8" ry="5" fill="#f5f3ff" opacity="0.8"/>
  <circle cx="677" cy="120" r="4" fill="#f5f3ff" opacity="0.8"/>

  <!-- Title -->
  <text x="400" y="32" fill="#ede9fe" font-size="16" font-family="serif" font-weight="bold" text-anchor="middle" filter="url(#glow19)">Terraced Agriculture — Vertical Land Use</text>
</svg>
