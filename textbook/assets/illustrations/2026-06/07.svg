<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d1557"/>
    </linearGradient>
    <!-- Trunk gradient -->
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b3fa0"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Coin gradient -->
    <radialGradient id="coinGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="100%" stop-color="#c9920a"/>
    </radialGradient>
    <!-- Leaf cluster gradients -->
    <radialGradient id="leaf1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9f5ef0"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.85"/>
    </radialGradient>
    <radialGradient id="leaf2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.85"/>
    </radialGradient>
    <radialGradient id="leaf3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.85"/>
    </radialGradient>
    <!-- Curve glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle glow for coins -->
    <filter id="coinGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg)"/>

  <!-- Stars / grid dots -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="50" cy="40" r="1.2"/><circle cx="130" cy="80" r="1"/><circle cx="210" cy="20" r="1.4"/>
    <circle cx="720" cy="30" r="1.2"/><circle cx="760" cy="90" r="1"/><circle cx="680" cy="60" r="1.3"/>
    <circle cx="600" cy="20" r="1"/><circle cx="510" cy="50" r="1.4"/><circle cx="460" cy="15" r="1"/>
  </g>

  <!-- ── LEFT SIDE: Compound Growth Curve ── -->

  <!-- Axis lines -->
  <line x1="80" y1="300" x2="420" y2="300" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="300" x2="80"  y2="60"  stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>

  <!-- Axis labels -->
  <text x="90" y="318" fill="#c4b5fd" font-family="Georgia,serif" font-size="11" opacity="0.8">Time →</text>
  <text x="30" y="180" fill="#c4b5fd" font-family="Georgia,serif" font-size="11" opacity="0.8" transform="rotate(-90,30,180)">Balance →</text>

  <!-- Simple interest line (straight, dashed) -->
  <line x1="80" y1="280" x2="415" y2="120" stroke="#a78bfa" stroke-width="1.8" stroke-dasharray="6,4" opacity="0.55"/>
  <text x="395" y="115" fill="#a78bfa" font-family="Georgia,serif" font-size="10" opacity="0.75">Simple</text>

  <!-- Compound interest curve (exponential) — cubic bezier -->
  <path d="M80,280 C120,275 180,260 230,235 C280,208 320,170 370,120 C385,103 400,85 415,68"
        fill="none" stroke="#c4b5fd" stroke-width="2.8" filter="url(#glow)" opacity="0.95"/>
  <text x="418" y="65" fill="#e9d5ff" font-family="Georgia,serif" font-size="10" opacity="0.9" font-weight="bold">Compound</text>

  <!-- Dot markers on curve -->
  <g fill="#f5d76e" filter="url(#coinGlow)">
    <circle cx="80"  cy="280" r="4"/>
    <circle cx="180" cy="255" r="4"/>
    <circle cx="280" cy="210" r="4.5"/>
    <circle cx="370" cy="120" r="5.5"/>
    <circle cx="415" cy="68"  r="6"/>
  </g>

  <!-- Label: time markers -->
  <g fill="#9ca3af" font-family="Georgia,serif" font-size="10" text-anchor="middle" opacity="0.7">
    <text x="80"  y="314">0</text>
    <text x="180" y="314">n</text>
    <text x="280" y="314">2n</text>
    <text x="370" y="314">3n</text>
    <text x="415" y="314">4n</text>
  </g>

  <!-- Formula label -->
  <rect x="85" y="68" width="130" height="26" rx="5" fill="#3b0764" opacity="0.75"/>
  <text x="150" y="86" fill="#e9d5ff" font-family="Georgia,serif" font-size="13" text-anchor="middle" font-style="italic">
    P · r ⁿ
  </text>

  <!-- ── RIGHT SIDE: Money Tree ── -->

  <!-- Pot -->
  <ellipse cx="620" cy="316" rx="52" ry="12" fill="#4c1d95" opacity="0.8"/>
  <path d="M572,316 Q568,290 576,280 L664,280 Q672,290 668,316 Z" fill="#5b21b6"/>
  <ellipse cx="620" cy="280" rx="44" ry="9" fill="#6d28d9"/>
  <!-- Pot rim highlight -->
  <ellipse cx="620" cy="280" rx="44" ry="9" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <!-- Coin in pot -->
  <ellipse cx="620" cy="278" rx="18" ry="5" fill="url(#coinGrad)" opacity="0.85"/>

  <!-- Trunk -->
  <rect x="612" y="175" width="16" height="106" rx="6" fill="url(#trunk)"/>

  <!-- Branch left -->
  <path d="M618,230 Q585,215 565,195" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
  <!-- Branch right -->
  <path d="M622,215 Q655,198 672,180" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
  <!-- Branch top-left -->
  <path d="M618,195 Q598,175 585,155" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  <!-- Branch top-right -->
  <path d="M622,200 Q645,178 658,160" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>

  <!-- Leaf clusters — size grows toward top, suggesting compounding -->
  <!-- Bottom small clusters -->
  <circle cx="558" cy="190" r="22" fill="url(#leaf1)" opacity="0.88"/>
  <circle cx="678" cy="174" r="24" fill="url(#leaf2)" opacity="0.88"/>

  <!-- Mid clusters -->
  <circle cx="578" cy="150" r="28" fill="url(#leaf2)" opacity="0.90"/>
  <circle cx="660" cy="152" r="30" fill="url(#leaf1)" opacity="0.88"/>

  <!-- Top large cluster (the exponential crown) -->
  <circle cx="620" cy="118" r="42" fill="url(#leaf3)" opacity="0.92"/>
  <circle cx="596" cy="105" r="26" fill="url(#leaf2)" opacity="0.82"/>
  <circle cx="645" cy="108" r="28" fill="url(#leaf1)" opacity="0.82"/>

  <!-- Coins hanging from branches -->
  <g filter="url(#coinGlow)">
    <!-- Coin on left branch -->
    <ellipse cx="563" cy="195" rx="10" ry="5" fill="url(#coinGrad)" opacity="0.9"/>
    <line x1="563" y1="190" x2="563" y2="183" stroke="#c9920a" stroke-width="1.5"/>
    <text x="563" y="182" fill="#f5d76e" font-size="9" text-anchor="middle" font-family="Georgia,serif">$</text>

    <!-- Coin on right branch -->
    <ellipse cx="677" cy="179" rx="11" ry="5" fill="url(#coinGrad)" opacity="0.9"/>
    <line x1="677" y1="174" x2="677" y2="167" stroke="#c9920a" stroke-width="1.5"/>
    <text x="677" y="166" fill="#f5d76e" font-size="9" text-anchor="middle" font-family="Georgia,serif">$</text>

    <!-- Larger coin top -->
    <ellipse cx="620" cy="80" rx="14" ry="6" fill="url(#coinGrad)" opacity="0.95"/>
    <line x1="620" y1="74" x2="620" y2="66" stroke="#c9920a" stroke-width="1.5"/>
    <text x="620" y="65" fill="#f5d76e" font-size="11" text-anchor="middle" font-family="Georgia,serif" font-weight="bold">$$</text>
  </g>

  <!-- ── Divider ── -->
  <line x1="445" y1="40" x2="445" y2="330" stroke="#6d28d9" stroke-width="1" stroke-dasharray="4,6" opacity="0.4"/>

  <!-- ── Title band at bottom ── -->
  <rect x="0" y="332" width="800" height="18" fill="#1a0a2e" opacity="0.7"/>
  <text x="400" y="345" fill="#d8b4fe" font-family="Georgia,serif" font-size="11" text-anchor="middle" letter-spacing="2" opacity="0.85">
    COMPOUND INTEREST · P·rⁿ · GEOMETRIC SEQUENCE
  </text>
</svg>
