<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" role="img" aria-label="A stylised mind with narrative threads binding scattered memory fragments into a coherent whole">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2D1C7F"/>
      <stop offset="55%" stop-color="#4A28A8"/>
      <stop offset="100%" stop-color="#7546E8"/>
    </linearGradient>
    <linearGradient id="mindGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#B0A9E5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7546E8" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="threadA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#E8E2FA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#B0A9E5" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="threadB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#C8B3F6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7546E8" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg4)"/>

  <!-- Faint star scatter -->
  <g fill="#FFFFFF" opacity="0.14">
    <circle cx="60"  cy="30"  r="1"/>
    <circle cx="140" cy="65"  r="0.8"/>
    <circle cx="290" cy="25"  r="1.1"/>
    <circle cx="420" cy="50"  r="0.9"/>
    <circle cx="570" cy="28"  r="1"/>
    <circle cx="680" cy="58"  r="0.8"/>
    <circle cx="750" cy="32"  r="1.2"/>
    <circle cx="80"  cy="310" r="0.9"/>
    <circle cx="210" cy="330" r="1"/>
    <circle cx="360" cy="318" r="0.8"/>
    <circle cx="510" cy="335" r="1.1"/>
    <circle cx="660" cy="322" r="0.9"/>
    <circle cx="740" cy="305" r="1"/>
  </g>

  <!-- Central mind / brain silhouette (stylised oval) -->
  <ellipse cx="400" cy="175" rx="105" ry="95" fill="url(#mindGrad)" stroke="#B0A9E5" stroke-width="1.5" opacity="0.9"/>
  <!-- inner fold lines suggesting brain convolutions -->
  <path d="M330,148 Q355,138 380,148 Q405,158 430,148 Q455,138 465,155" fill="none" stroke="#E8E2FA" stroke-width="1" opacity="0.4"/>
  <path d="M320,175 Q350,165 385,175 Q415,185 445,175 Q465,168 475,180" fill="none" stroke="#E8E2FA" stroke-width="1" opacity="0.35"/>
  <path d="M335,202 Q365,192 400,202 Q430,212 455,202" fill="none" stroke="#E8E2FA" stroke-width="1" opacity="0.3"/>

  <!-- Memory fragment nodes (scattered, irregular polygons) -->
  <!-- Fragment 1 — top-left -->
  <polygon points="110,72 145,58 162,80 148,102 112,98" fill="#4A28A8" stroke="#C8B3F6" stroke-width="1.5" opacity="0.88" filter="url(#softGlow)"/>
  <text x="136" y="83" font-family="serif" font-size="11" fill="#E8E2FA" text-anchor="middle" opacity="0.9">childhood</text>

  <!-- Fragment 2 — top-right -->
  <polygon points="638,58 675,50 692,72 670,90 635,85" fill="#4A28A8" stroke="#C8B3F6" stroke-width="1.5" opacity="0.88" filter="url(#softGlow)"/>
  <text x="663" y="73" font-family="serif" font-size="11" fill="#E8E2FA" text-anchor="middle" opacity="0.9">event</text>

  <!-- Fragment 3 — left mid -->
  <polygon points="68,175 108,162 122,182 108,202 66,198" fill="#4A28A8" stroke="#C8B3F6" stroke-width="1.5" opacity="0.85" filter="url(#softGlow)"/>
  <text x="95" y="184" font-family="serif" font-size="11" fill="#E8E2FA" text-anchor="middle" opacity="0.9">feeling</text>

  <!-- Fragment 4 — right mid -->
  <polygon points="678,162 718,155 732,178 718,200 676,196" fill="#4A28A8" stroke="#C8B3F6" stroke-width="1.5" opacity="0.85" filter="url(#softGlow)"/>
  <text x="704" y="181" font-family="serif" font-size="11" fill="#E8E2FA" text-anchor="middle" opacity="0.9">context</text>

  <!-- Fragment 5 — bottom-left -->
  <polygon points="98,265 138,255 155,275 138,295 96,292" fill="#4A28A8" stroke="#C8B3F6" stroke-width="1.5" opacity="0.85" filter="url(#softGlow)"/>
  <text x="126" y="278" font-family="serif" font-size="11" fill="#E8E2FA" text-anchor="middle" opacity="0.9">person</text>

  <!-- Fragment 6 — bottom-right -->
  <polygon points="648,262 688,255 704,275 688,296 646,292" fill="#4A28A8" stroke="#C8B3F6" stroke-width="1.5" opacity="0.85" filter="url(#softGlow)"/>
  <text x="675" y="278" font-family="serif" font-size="11" fill="#E8E2FA" text-anchor="middle" opacity="0.9">place</text>

  <!-- Fragment 7 — top-centre-left -->
  <polygon points="255,42 290,32 305,54 288,72 253,68" fill="#3D1F96" stroke="#B0A9E5" stroke-width="1.2" opacity="0.8"/>
  <text x="279" y="56" font-family="serif" font-size="10" fill="#E8E2FA" text-anchor="middle" opacity="0.85">image</text>

  <!-- Fragment 8 — top-centre-right -->
  <polygon points="508,38 543,30 558,52 541,70 506,66" fill="#3D1F96" stroke="#B0A9E5" stroke-width="1.2" opacity="0.8"/>
  <text x="532" y="54" font-family="serif" font-size="10" fill="#E8E2FA" text-anchor="middle" opacity="0.85">word</text>

  <!-- Narrative thread curves — glowing lines from fragments to mind centre -->
  <!-- Thread from fragment 1 to mind -->
  <path d="M148,82 C230,90 295,120 345,155" fill="none" stroke="url(#threadA)" stroke-width="1.8" stroke-dasharray="5,4" opacity="0.75" filter="url(#glow4)"/>

  <!-- Thread from fragment 2 to mind -->
  <path d="M648,72 C580,90 510,120 455,155" fill="none" stroke="url(#threadA)" stroke-width="1.8" stroke-dasharray="5,4" opacity="0.75" filter="url(#glow4)"/>

  <!-- Thread from fragment 3 to mind -->
  <path d="M118,182 C200,178 280,175 295,175" fill="none" stroke="url(#threadB)" stroke-width="1.6" stroke-dasharray="4,3" opacity="0.7" filter="url(#glow4)"/>

  <!-- Thread from fragment 4 to mind -->
  <path d="M682,178 C600,178 520,175 505,175" fill="none" stroke="url(#threadB)" stroke-width="1.6" stroke-dasharray="4,3" opacity="0.7" filter="url(#glow4)"/>

  <!-- Thread from fragment 5 to mind -->
  <path d="M138,265 C230,250 310,220 350,200" fill="none" stroke="url(#threadA)" stroke-width="1.8" stroke-dasharray="5,4" opacity="0.7" filter="url(#glow4)"/>

  <!-- Thread from fragment 6 to mind -->
  <path d="M658,268 C568,252 490,222 450,200" fill="none" stroke="url(#threadA)" stroke-width="1.8" stroke-dasharray="5,4" opacity="0.7" filter="url(#glow4)"/>

  <!-- Thread from fragment 7 to mind -->
  <path d="M282,60 C320,80 355,115 375,148" fill="none" stroke="#C8B3F6" stroke-width="1.4" stroke-dasharray="3,4" opacity="0.6"/>

  <!-- Thread from fragment 8 to mind -->
  <path d="M524,56 C485,78 445,114 428,148" fill="none" stroke="#C8B3F6" stroke-width="1.4" stroke-dasharray="3,4" opacity="0.6"/>

  <!-- Central label inside mind -->
  <text x="400" y="168" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.95" filter="url(#glow4)">NARRATIVE</text>
  <text x="400" y="188" font-family="Georgia, serif" font-size="10" fill="#E8E2FA" text-anchor="middle" opacity="0.75">reconsolidation</text>

  <!-- Small node dots at thread endpoints on mind surface -->
  <circle cx="345" cy="155" r="3.5" fill="#E8E2FA" opacity="0.8" filter="url(#glow4)"/>
  <circle cx="455" cy="155" r="3.5" fill="#E8E2FA" opacity="0.8" filter="url(#glow4)"/>
  <circle cx="295" cy="175" r="3" fill="#C8B3F6" opacity="0.75"/>
  <circle cx="505" cy="175" r="3" fill="#C8B3F6" opacity="0.75"/>
  <circle cx="350" cy="200" r="3.5" fill="#E8E2FA" opacity="0.8" filter="url(#glow4)"/>
  <circle cx="450" cy="200" r="3.5" fill="#E8E2FA" opacity="0.8" filter="url(#glow4)"/>
  <circle cx="375" cy="148" r="2.5" fill="#C8B3F6" opacity="0.7"/>
  <circle cx="428" cy="148" r="2.5" fill="#C8B3F6" opacity="0.7"/>

  <!-- Arrow motif (→ retelling loops back) — small curved arrow at mind right -->
  <path d="M490,160 Q530,140 520,175 Q510,205 480,200" fill="none" stroke="#B0A9E5" stroke-width="1.5" opacity="0.55"/>
  <polygon points="480,200 474,190 488,192" fill="#B0A9E5" opacity="0.55"/>

  <!-- Label: retelling -->
  <text x="545" y="172" font-family="sans-serif" font-size="9" fill="#B0A9E5" text-anchor="middle" opacity="0.7" font-style="italic">retelling</text>

  <!-- Bottom label strip -->
  <rect x="0" y="326" width="800" height="24" fill="#0D0E20" opacity="0.45"/>
  <text x="400" y="342" font-family="Georgia, serif" font-size="10" fill="#E8E2FA" text-anchor="middle" opacity="0.75" letter-spacing="2">MEMORY  ·  NARRATIVE  ·  RECONSOLIDATION</text>
</svg>
