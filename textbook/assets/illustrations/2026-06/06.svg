<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <!-- Sky gradient: deep purple to soft violet -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="60%" stop-color="#4a2d8a"/>
      <stop offset="100%" stop-color="#6b47b0"/>
    </linearGradient>
    <!-- Ground gradient -->
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6e3a"/>
      <stop offset="100%" stop-color="#2a4e2a"/>
    </linearGradient>
    <!-- Tree canopy gradient -->
    <radialGradient id="canopy1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#5cb85c"/>
      <stop offset="100%" stop-color="#2d6e2d"/>
    </radialGradient>
    <radialGradient id="canopy2" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6dcf6d"/>
      <stop offset="100%" stop-color="#357a35"/>
    </radialGradient>
    <radialGradient id="canopy3" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4db84d"/>
      <stop offset="100%" stop-color="#286028"/>
    </radialGradient>
    <!-- Path gradient -->
    <linearGradient id="pathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a87a"/>
      <stop offset="100%" stop-color="#a8885a"/>
    </linearGradient>
    <!-- Building gradient -->
    <linearGradient id="buildGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5ac4"/>
      <stop offset="100%" stop-color="#4a2d8a"/>
    </linearGradient>
    <!-- Glow filter for soft light -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Leaf pattern filter -->
    <filter id="leafShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1a3d1a" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="350" fill="url(#skyGrad)"/>

  <!-- Distant city silhouette (left background) -->
  <g opacity="0.45">
    <rect x="30" y="130" width="28" height="120" fill="url(#buildGrad)"/>
    <rect x="35" y="118" width="18" height="14" fill="#6b47b0"/>
    <rect x="62" y="145" width="22" height="105" fill="url(#buildGrad)"/>
    <rect x="88" y="120" width="32" height="130" fill="url(#buildGrad)"/>
    <rect x="93" y="108" width="22" height="14" fill="#6b47b0"/>
    <!-- windows -->
    <rect x="36" y="138" width="5" height="5" fill="#c9a8ff" opacity="0.7"/>
    <rect x="44" y="138" width="5" height="5" fill="#c9a8ff" opacity="0.5"/>
    <rect x="36" y="150" width="5" height="5" fill="#c9a8ff" opacity="0.6"/>
    <rect x="44" y="150" width="5" height="5" fill="#c9a8ff" opacity="0.4"/>
    <rect x="91" y="128" width="5" height="5" fill="#c9a8ff" opacity="0.7"/>
    <rect x="100" y="128" width="5" height="5" fill="#c9a8ff" opacity="0.5"/>
    <rect x="91" y="140" width="5" height="5" fill="#c9a8ff" opacity="0.6"/>
    <rect x="100" y="140" width="5" height="5" fill="#c9a8ff" opacity="0.4"/>
  </g>

  <!-- Distant city silhouette (right background) -->
  <g opacity="0.45">
    <rect x="660" y="140" width="30" height="110" fill="url(#buildGrad)"/>
    <rect x="694" y="125" width="26" height="125" fill="url(#buildGrad)"/>
    <rect x="699" y="113" width="16" height="14" fill="#6b47b0"/>
    <rect x="724" y="135" width="34" height="115" fill="url(#buildGrad)"/>
    <rect x="760" y="150" width="28" height="100" fill="url(#buildGrad)"/>
    <!-- windows -->
    <rect x="665" y="155" width="5" height="5" fill="#c9a8ff" opacity="0.6"/>
    <rect x="675" y="155" width="5" height="5" fill="#c9a8ff" opacity="0.5"/>
    <rect x="700" y="133" width="5" height="5" fill="#c9a8ff" opacity="0.7"/>
    <rect x="710" y="133" width="5" height="5" fill="#c9a8ff" opacity="0.5"/>
    <rect x="730" y="148" width="5" height="5" fill="#c9a8ff" opacity="0.6"/>
    <rect x="740" y="148" width="5" height="5" fill="#c9a8ff" opacity="0.4"/>
  </g>

  <!-- Ground / park lawn -->
  <ellipse cx="400" cy="320" rx="500" ry="70" fill="#2a4e2a"/>
  <rect x="0" y="290" width="800" height="60" fill="url(#groundGrad)"/>

  <!-- Lawn highlights -->
  <ellipse cx="200" cy="295" rx="120" ry="15" fill="#3e7a3e" opacity="0.6"/>
  <ellipse cx="580" cy="298" rx="100" ry="12" fill="#3e7a3e" opacity="0.5"/>
  <ellipse cx="400" cy="293" rx="160" ry="14" fill="#4a8c4a" opacity="0.4"/>

  <!-- Park path (winding) -->
  <path d="M 160 350 Q 280 310 400 305 Q 520 300 640 350" stroke="url(#pathGrad)" stroke-width="28" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 160 350 Q 280 310 400 305 Q 520 300 640 350" stroke="#e0c898" stroke-width="3" fill="none" stroke-dasharray="12,8" opacity="0.5"/>

  <!-- Bench (left side) -->
  <rect x="168" y="278" width="48" height="7" rx="3" fill="#8B6914"/>
  <rect x="168" y="270" width="48" height="6" rx="3" fill="#a07820"/>
  <rect x="172" y="285" width="5" height="14" rx="2" fill="#6b5010"/>
  <rect x="208" y="285" width="5" height="14" rx="2" fill="#6b5010"/>

  <!-- TREE 1 — large left center -->
  <rect x="230" y="205" width="18" height="90" rx="5" fill="#5a3a1a"/>
  <!-- canopy layers -->
  <ellipse cx="239" cy="185" rx="62" ry="52" fill="url(#canopy1)" filter="url(#leafShadow)"/>
  <ellipse cx="225" cy="200" rx="42" ry="36" fill="#4aaa4a" opacity="0.7"/>
  <ellipse cx="255" cy="195" rx="40" ry="32" fill="#55bb55" opacity="0.6"/>
  <ellipse cx="239" cy="170" rx="38" ry="30" fill="#66cc66" opacity="0.5"/>

  <!-- TREE 2 — tall center-left -->
  <rect x="348" y="185" width="16" height="110" rx="5" fill="#4a3010"/>
  <ellipse cx="356" cy="165" rx="55" ry="48" fill="url(#canopy2)" filter="url(#leafShadow)"/>
  <ellipse cx="340" cy="178" rx="38" ry="32" fill="#4ab04a" opacity="0.65"/>
  <ellipse cx="370" cy="175" rx="36" ry="28" fill="#5dc85d" opacity="0.6"/>
  <ellipse cx="356" cy="152" rx="34" ry="28" fill="#70d870" opacity="0.5"/>

  <!-- TREE 3 — large right center -->
  <rect x="518" y="198" width="18" height="97" rx="5" fill="#5a3a1a"/>
  <ellipse cx="527" cy="178" rx="64" ry="54" fill="url(#canopy3)" filter="url(#leafShadow)"/>
  <ellipse cx="512" cy="195" rx="44" ry="36" fill="#45a845" opacity="0.7"/>
  <ellipse cx="544" cy="190" rx="42" ry="32" fill="#58bc58" opacity="0.6"/>
  <ellipse cx="527" cy="163" rx="40" ry="30" fill="#68cc68" opacity="0.5"/>

  <!-- TREE 4 — small right -->
  <rect x="630" y="220" width="13" height="75" rx="4" fill="#4a3010"/>
  <ellipse cx="636" cy="205" rx="44" ry="38" fill="url(#canopy1)" opacity="0.9" filter="url(#leafShadow)"/>
  <ellipse cx="636" cy="192" rx="30" ry="24" fill="#5cc85c" opacity="0.55"/>

  <!-- TREE 5 — small left edge -->
  <rect x="110" y="225" width="12" height="70" rx="4" fill="#4a3010"/>
  <ellipse cx="116" cy="210" rx="40" ry="34" fill="url(#canopy2)" opacity="0.85" filter="url(#leafShadow)"/>
  <ellipse cx="116" cy="198" rx="28" ry="22" fill="#5ec85e" opacity="0.5"/>

  <!-- Dappled light spots on ground -->
  <ellipse cx="280" cy="296" rx="22" ry="7" fill="#5aac5a" opacity="0.35"/>
  <ellipse cx="380" cy="300" rx="18" ry="6" fill="#5aac5a" opacity="0.3"/>
  <ellipse cx="490" cy="298" rx="20" ry="7" fill="#5aac5a" opacity="0.33"/>

  <!-- PERSON 1 — walking couple left (woman) -->
  <g transform="translate(295, 260)">
    <!-- body -->
    <ellipse cx="0" cy="-22" rx="6" ry="8" fill="#f5c5a3"/><!-- head -->
    <rect x="-5" y="-14" width="10" height="18" rx="3" fill="#c084e0"/><!-- shirt purple -->
    <rect x="-4" y="4" width="4" height="16" rx="2" fill="#7a4aaa"/><!-- left leg -->
    <rect x="0" y="4" width="4" height="14" rx="2" fill="#7a4aaa"/><!-- right leg (stride) -->
    <!-- arms -->
    <line x1="-5" y1="-10" x2="-12" y2="-2" stroke="#f5c5a3" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="-10" x2="10" y2="-3" stroke="#f5c5a3" stroke-width="3" stroke-linecap="round"/>
    <!-- hair -->
    <ellipse cx="0" cy="-27" rx="6" ry="4" fill="#3d1f00"/>
  </g>

  <!-- PERSON 2 — walking couple left (man, beside woman) -->
  <g transform="translate(315, 258)">
    <ellipse cx="0" cy="-24" rx="7" ry="8" fill="#f0b890"/>
    <rect x="-6" y="-16" width="12" height="20" rx="3" fill="#5a8adb"/>
    <rect x="-5" y="4" width="5" height="18" rx="2" fill="#3a5a9a"/>
    <rect x="1" y="4" width="5" height="16" rx="2" fill="#3a5a9a"/>
    <line x1="-6" y1="-12" x2="-13" y2="-3" stroke="#f0b890" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="6" y1="-12" x2="12" y2="-5" stroke="#f0b890" stroke-width="3.5" stroke-linecap="round"/>
    <ellipse cx="0" cy="-30" rx="7" ry="4" fill="#1a0a00"/>
  </g>

  <!-- PERSON 3 — solo walker right, relaxed -->
  <g transform="translate(470, 262)">
    <ellipse cx="0" cy="-22" rx="6" ry="7.5" fill="#f5d0b0"/>
    <rect x="-5" y="-15" width="10" height="17" rx="3" fill="#e07850"/>
    <rect x="-4" y="2" width="4" height="15" rx="2" fill="#804020"/>
    <rect x="1" y="2" width="4" height="17" rx="2" fill="#804020"/>
    <line x1="-5" y1="-11" x2="-11" y2="-1" stroke="#f5d0b0" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="-11" x2="9" y2="-4" stroke="#f5d0b0" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="0" cy="-27" rx="6" ry="4" fill="#2a1800"/>
  </g>

  <!-- PERSON 4 — child running -->
  <g transform="translate(430, 271)">
    <ellipse cx="0" cy="-16" rx="5" ry="5.5" fill="#f8d8b0"/>
    <rect x="-4" y="-11" width="8" height="13" rx="3" fill="#e84d9a"/>
    <rect x="-3" y="2" width="3" height="10" rx="2" fill="#b0306a"/>
    <rect x="1" y="2" width="3" height="12" rx="2" fill="#b0306a"/>
    <line x1="-4" y1="-8" x2="-9" y2="-2" stroke="#f8d8b0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="-8" x2="10" y2="-4" stroke="#f8d8b0" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="0" cy="-20" rx="5" ry="3" fill="#3d1f00"/>
  </g>

  <!-- Floating leaves (suggest wind/nature) -->
  <g opacity="0.75">
    <ellipse cx="310" cy="230" rx="8" ry="5" fill="#66cc44" transform="rotate(-25, 310, 230)"/>
    <ellipse cx="450" cy="215" rx="7" ry="4" fill="#55bb33" transform="rotate(20, 450, 215)"/>
    <ellipse cx="385" cy="245" rx="6" ry="3.5" fill="#77dd55" transform="rotate(-40, 385, 245)"/>
    <ellipse cx="560" cy="228" rx="7" ry="4" fill="#66bb44" transform="rotate(15, 560, 228)"/>
  </g>

  <!-- Soft purple light rays from canopy -->
  <g opacity="0.12">
    <line x1="239" y1="185" x2="200" y2="295" stroke="#c084ff" stroke-width="18"/>
    <line x1="356" y1="165" x2="330" y2="295" stroke="#c084ff" stroke-width="14"/>
    <line x1="527" y1="178" x2="500" y2="295" stroke="#c084ff" stroke-width="16"/>
  </g>

  <!-- Soft glow halos around tree canopies -->
  <ellipse cx="239" cy="185" rx="70" ry="58" fill="#66dd44" opacity="0.07"/>
  <ellipse cx="356" cy="165" rx="64" ry="55" fill="#55cc33" opacity="0.07"/>
  <ellipse cx="527" cy="178" rx="72" ry="60" fill="#66cc44" opacity="0.07"/>

  <!-- Title label (subtle) -->
  <text x="400" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#e8d4ff" opacity="0.85" letter-spacing="1">How Green Spaces Lower Stress</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#c9a8ff" stroke-width="0.8" opacity="0.5"/>
</svg>
