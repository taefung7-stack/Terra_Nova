<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terra Nova Textbook</title>
<link rel="stylesheet" href="styles/tokens.css" />
<link rel="stylesheet" href="styles/layout.css" />
<link rel="stylesheet" href="styles/print.css" />
</head>
<body>

<template id="tpl-passage">
  <article class="passage" data-slot="root">

    <!-- Page 1 — Passage -->
    <section class="page page-1" data-page="1">
      <header class="page-head">
        <span class="section-label">PASSAGE</span>
        <span class="chapter-tag" data-slot="chapter-tag"></span>
      </header>
      <div class="page-body">
        <div class="p1-meta">
          <span class="chip" data-slot="subject"></span>
          <span class="chip part" data-slot="part"></span>
          <span class="chip level" data-slot="lexile"></span>
          <span class="chip level" data-slot="ar"></span>
        </div>
        <h1 class="p1-title" data-slot="title"></h1>
        <p class="p1-subtitle" data-slot="subtitle"></p>
        <div class="p1-body" data-slot="body"></div>
        <figure class="p1-illustration">
          <img data-slot="illustration" alt="" />
        </figure>
        <figcaption class="p1-caption" data-slot="illustration-caption"></figcaption>
      </div>
      <footer class="page-foot">
        <span class="foot-day"></span>
        <span class="page-num" data-slot="page-num-1"></span>
        <span class="brand">TERRA<span class="brand-dot">·</span>NOVA</span>
      </footer>
    </section>

    <!-- Page 2 — Practice + Tieback -->
    <section class="page page-2" data-page="2">
      <header class="page-head">
        <span class="section-label">PRACTICE</span>
        <span class="chapter-tag" data-slot="chapter-tag-2"></span>
      </header>
      <div class="page-body">
        <div class="p2-questions" data-slot="questions"></div>
        <aside class="tieback">
          <div class="unit-label" data-slot="tieback-unit"></div>
          <div class="body-ko" data-slot="tieback-body"></div>
          <div class="tags" data-slot="tieback-tags"></div>
          <div class="visual-aid-wrap" data-slot="tieback-visual"></div>
        </aside>
      </div>
      <footer class="page-foot">
        <span class="foot-day"></span>
        <span class="page-num" data-slot="page-num-2"></span>
        <span class="brand">TERRA<span class="brand-dot">·</span>NOVA</span>
      </footer>
    </section>

    <!-- Page 3 — Syntax Breakdown -->
    <section class="page page-3" data-page="3">
      <header class="page-head">
        <span class="section-label">SYNTAX</span>
        <span class="chapter-tag" data-slot="chapter-tag-3"></span>
      </header>
      <div class="page-body">
        <div class="p3-legend">
          <span class="legend-item"><span class="role-badge" style="background: var(--role-S); color: var(--role-S-ink);">S</span>주어</span>
          <span class="legend-item"><span class="role-badge" style="background: var(--role-V); color: var(--role-V-ink);">V</span>동사</span>
          <span class="legend-item"><span class="role-badge" style="background: var(--role-O); color: var(--role-O-ink);">O</span>목적어</span>
          <span class="legend-item"><span class="role-badge" style="background: var(--role-C); color: var(--role-C-ink);">C</span>보어</span>
          <span class="legend-item"><span class="role-badge" style="background: var(--role-M); color: var(--role-M-ink);">M</span>수식어</span>
          <span class="legend-item"><span class="role-badge" style="background: var(--role-CONJ); color: var(--role-CONJ-ink);">접</span>접속사</span>
          <span class="legend-item"><span class="role-badge" style="background: var(--role-REL); color: var(--role-REL-ink);">관</span>관계사</span>
        </div>
        <div class="p3-sentences" data-slot="sentences"></div>
        <div class="p3-translation">
          <h4>📖 우리말 해석</h4>
          <div class="body" data-slot="translation"></div>
        </div>
      </div>
      <footer class="page-foot">
        <span class="foot-day"></span>
        <span class="page-num" data-slot="page-num-3"></span>
        <span class="brand">TERRA<span class="brand-dot">·</span>NOVA</span>
      </footer>
    </section>

    <!-- Page 4 — Vocabulary Lab -->
    <section class="page page-4" data-page="4">
      <header class="page-head">
        <span class="section-label">VOCAB</span>
        <span class="chapter-tag" data-slot="chapter-tag-4"></span>
      </header>
      <div class="page-body">
        <div class="p4-vocab" data-slot="vocab"></div>
      </div>
      <footer class="page-foot">
        <span class="foot-day"></span>
        <span class="page-num" data-slot="page-num-4"></span>
        <span class="brand">TERRA<span class="brand-dot">·</span>NOVA</span>
      </footer>
    </section>

  </article>
</template>

<main id="stage"></main>

<script type="module" src="scripts/render.js"></script>
</body>
</html>
