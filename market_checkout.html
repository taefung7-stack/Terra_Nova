<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마켓 결제 — TERRA NOVA ENGLISH</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<style>
  :root{
    --bg:#02021B; --bg2:#06302B; --card:#08453A; --card2:#095544;
    --accent:#00DF81; --accent2:#2CC295; --mint:#2FA98C;
    --txt:#F1F7F6; --dim:rgba(241,247,246,.7); --line:rgba(0,223,129,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}

  nav{display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:68px;border-bottom:1px solid var(--line);background:rgba(2,2,27,.92);backdrop-filter:blur(14px);}
  .logo-wrap{display:flex;flex-direction:column;gap:2px;text-decoration:none;}
  .logo-main{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:7px;color:#fff;font-weight:900;}
  .logo-eng{font-size:.5rem;font-weight:500;letter-spacing:5px;color:rgba(0,223,129,.5);text-transform:uppercase;}
  .nav-back{color:var(--accent);text-decoration:none;font-size:.82rem;font-weight:700;}
  .nav-back:hover{text-decoration:underline;}

  .checkout-banner{background:linear-gradient(90deg,rgba(0,223,129,.12) 0%,rgba(0,223,129,0) 100%);border-bottom:1px solid var(--line);padding:14px 5vw;text-align:center;font-size:.85rem;color:var(--accent);font-weight:700;letter-spacing:.5px;}
  .checkout-banner span{color:var(--dim);font-weight:400;margin-left:6px;}

  .wrap{flex:1;max-width:1000px;margin:0 auto;padding:40px 5vw 80px;width:100%;display:grid;grid-template-columns:1.3fr 1fr;gap:32px;}
  @media(max-width:880px){.wrap{grid-template-columns:1fr;}}

  h1{font-size:1.6rem;font-weight:900;margin-bottom:8px;}
  .sub{font-size:.85rem;color:var(--dim);margin-bottom:28px;}

  .panel{background:linear-gradient(145deg,var(--card) 0%,var(--bg2) 100%);border:1px solid var(--line);border-radius:14px;padding:26px;margin-bottom:20px;}
  .panel h2{font-size:1rem;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
  .panel h2 .num{background:var(--accent);color:#02021B;width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:900;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:7px;letter-spacing:.5px;}
  .field input, .field textarea, .field select{width:100%;background:rgba(2,2,27,.6);border:1px solid rgba(0,223,129,.15);border-radius:8px;padding:12px 14px;color:var(--txt);font-family:inherit;font-size:.88rem;outline:none;transition:border-color .18s;}
  .field input:focus, .field textarea:focus, .field select:focus{border-color:var(--accent);}
  .field input::placeholder{color:rgba(241,247,246,.3);}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:480px){.row{grid-template-columns:1fr;}}
  .addr-row{display:flex;gap:8px;}
  .addr-row input{flex:1;}
  .btn-search{background:var(--card2);color:var(--txt);border:1px solid rgba(0,223,129,.2);border-radius:8px;padding:0 16px;font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn-search:hover{background:var(--bg2);border-color:var(--accent);color:var(--accent);}

  /* Payment methods */
  .pay-methods{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
  .pay-method{background:rgba(2,2,27,.6);border:1.5px solid rgba(0,223,129,.15);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .18s;font-size:.82rem;font-weight:600;}
  .pay-method:hover{border-color:var(--accent);}
  .pay-method.active{border-color:var(--accent);background:rgba(0,223,129,.08);color:var(--accent);}

  /* Order summary */
  .summary{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px;position:sticky;top:90px;}
  .summary h2{font-size:1rem;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
  .items{border-bottom:1px dashed var(--line);padding-bottom:16px;margin-bottom:16px;max-height:300px;overflow-y:auto;}
  .item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;gap:10px;font-size:.85rem;border-bottom:1px solid rgba(0,223,129,.05);}
  .item:last-child{border-bottom:none;}
  .item-info{flex:1;min-width:0;}
  .item-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-meta{font-size:.72rem;color:var(--dim);margin-top:2px;}
  .item-price{font-weight:700;color:var(--accent);white-space:nowrap;font-size:.85rem;}
  .item-rm{background:none;border:none;color:rgba(241,247,246,.4);cursor:pointer;font-size:1rem;padding:2px 6px;}
  .item-rm:hover{color:#FF8A8A;}
  .qty-ctrl{display:inline-flex;align-items:center;gap:6px;margin-right:8px;}
  .qty-ctrl button{background:rgba(2,2,27,.6);border:1px solid var(--line);color:var(--txt);width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:.78rem;}
  .qty-val{min-width:20px;text-align:center;font-size:.8rem;}

  .sum-row{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:8px;color:var(--dim);}
  .sum-row.total{font-size:1.15rem;color:#fff;font-weight:900;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
  .sum-row.total .amt{color:var(--accent);}

  .btn-pay{width:100%;background:var(--accent);color:#02021B;border:none;border-radius:10px;padding:16px;font-family:inherit;font-size:1rem;font-weight:900;cursor:pointer;margin-top:20px;letter-spacing:.5px;transition:transform .15s,box-shadow .15s;}
  .btn-pay:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,223,129,.35);}
  .btn-pay:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

  .empty{text-align:center;padding:40px 20px;color:var(--dim);}
  .empty a{color:var(--accent);font-weight:700;text-decoration:none;}

  footer{padding:24px 5vw;border-top:1px solid var(--line);text-align:center;font-size:.7rem;color:rgba(241,247,246,.4);margin-top:auto;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo-wrap">
    <div class="logo-main">TERRA NOVA</div>
    <div class="logo-eng">ENGLISH</div>
  </a>
  <a href="market.html" class="nav-back">← 마켓으로</a>
</nav>

<div class="checkout-banner">
  🛒 마켓 단품 결제창 <span>· 월간 구독과 별도로 처리됩니다</span>
</div>

<div class="wrap">
  <div>
    <h1>마켓 결제</h1>
    <p class="sub">구매 정보를 입력하고 결제를 완료해주세요.</p>

    <div class="panel">
      <h2><span class="num">1</span> 주문자 정보</h2>
      <div class="row">
        <div class="field"><label>이름</label><input type="text" id="buyer-name" placeholder="홍길동" required></div>
        <div class="field"><label>연락처</label><input type="tel" id="buyer-phone" placeholder="010-0000-0000" required></div>
      </div>
      <div class="field"><label>이메일</label><input type="email" id="buyer-email" placeholder="example@email.com" required></div>
    </div>

    <div class="panel">
      <h2><span class="num">2</span> 배송 정보</h2>
      <div class="field">
        <label>우편번호</label>
        <div class="addr-row">
          <input type="text" id="addr-zip" placeholder="00000" readonly required>
          <button type="button" class="btn-search" onclick="searchAddress()">주소 검색</button>
        </div>
      </div>
      <div class="field"><label>기본 주소</label><input type="text" id="addr-main" placeholder="도로명/지번 주소" readonly required></div>
      <div class="field"><label>상세 주소</label><input type="text" id="addr-detail" placeholder="동·호수 등 상세주소" required></div>
      <div class="field"><label>배송 메모</label><input type="text" id="addr-memo" placeholder="부재 시 경비실에 맡겨주세요 (선택)"></div>
    </div>

    <div class="panel">
      <h2><span class="num">3</span> 결제 수단</h2>
      <div class="pay-methods">
        <div class="pay-method active" data-pay="card" onclick="selectPay(this)">💳 신용/체크카드</div>
        <div class="pay-method" data-pay="kakao" onclick="selectPay(this)">💛 카카오페이</div>
        <div class="pay-method" data-pay="naver" onclick="selectPay(this)">💚 네이버페이</div>
        <div class="pay-method" data-pay="bank" onclick="selectPay(this)">🏦 무통장입금</div>
      </div>
    </div>
  </div>

  <div>
    <div class="summary">
      <h2>🛒 주문 내역</h2>
      <div class="items" id="items"></div>
      <div class="sum-row"><span>상품 합계</span><span id="sum-sub">0원</span></div>
      <div class="sum-row"><span>배송비</span><span id="sum-ship">3,000원</span></div>
      <div class="sum-row total"><span>총 결제금액</span><span class="amt" id="sum-total">0원</span></div>
      <button class="btn-pay" id="btn-pay" onclick="doPay()">결제하기</button>
      <p style="font-size:.7rem;color:rgba(241,247,246,.4);text-align:center;margin-top:12px;line-height:1.6;">주문 시 결제 및 배송 정보 제공에 동의합니다.<br>이 결제는 구독 결제와 별도로 처리됩니다.</p>
    </div>
  </div>
</div>

<footer>© Terra Nova English · 마켓 결제 시스템</footer>

<script>
  const CART_KEY = 'tn_market_cart';
  const BUYNOW_KEY = 'tn_market_buynow';
  const SHIP_FEE = 3000;
  const FREE_SHIP_THRESHOLD = 30000;

  function getItems(){
    const params = new URLSearchParams(location.search);
    if (params.get('mode') === 'buynow') {
      try { return JSON.parse(sessionStorage.getItem(BUYNOW_KEY)||'[]'); } catch(e){ return []; }
    }
    try { return JSON.parse(localStorage.getItem(CART_KEY)||'[]'); } catch(e){ return []; }
  }
  function saveItems(items){
    const params = new URLSearchParams(location.search);
    if (params.get('mode') === 'buynow') {
      sessionStorage.setItem(BUYNOW_KEY, JSON.stringify(items));
    } else {
      localStorage.setItem(CART_KEY, JSON.stringify(items));
    }
  }
  function fmt(n){ return n.toLocaleString('ko-KR')+'원'; }

  function render(){
    const items = getItems();
    const box = document.getElementById('items');
    if (!items.length) {
      box.innerHTML = '<div class="empty">장바구니가 비어있습니다.<br><a href="market.html">마켓 둘러보기 →</a></div>';
      document.getElementById('btn-pay').disabled = true;
      document.getElementById('sum-sub').textContent = '0원';
      document.getElementById('sum-ship').textContent = '0원';
      document.getElementById('sum-total').textContent = '0원';
      return;
    }
    box.innerHTML = items.map((it,idx)=>`
      <div class="item">
        <div class="item-info">
          <div class="item-name">${it.name}</div>
          <div class="item-meta">
            <span class="qty-ctrl">
              <button onclick="chgQty(${idx},-1)">−</button>
              <span class="qty-val">${it.qty}</span>
              <button onclick="chgQty(${idx},1)">+</button>
            </span>
            단가 ${fmt(it.price)}
          </div>
        </div>
        <span class="item-price">${fmt(it.price*it.qty)}</span>
        <button class="item-rm" onclick="rmItem(${idx})" title="삭제">×</button>
      </div>
    `).join('');
    const sub = items.reduce((s,i)=>s+i.price*i.qty,0);
    const ship = sub >= FREE_SHIP_THRESHOLD ? 0 : SHIP_FEE;
    document.getElementById('sum-sub').textContent = fmt(sub);
    document.getElementById('sum-ship').textContent = ship===0 ? '무료 🎉' : fmt(ship);
    document.getElementById('sum-total').textContent = fmt(sub+ship);
    document.getElementById('btn-pay').disabled = false;
  }
  function chgQty(idx, delta){
    const items = getItems();
    items[idx].qty = Math.max(1, items[idx].qty + delta);
    saveItems(items); render();
  }
  function rmItem(idx){
    const items = getItems();
    items.splice(idx,1);
    saveItems(items); render();
  }
  function selectPay(el){
    document.querySelectorAll('.pay-method').forEach(m=>m.classList.remove('active'));
    el.classList.add('active');
  }
  function searchAddress(){
    if (typeof daum === 'undefined' || !daum.Postcode) {
      const zip = prompt('우편번호를 입력하세요 (예: 06234)');
      if (!zip) return;
      const addr = prompt('기본 주소를 입력하세요');
      if (!addr) return;
      document.getElementById('addr-zip').value = zip;
      document.getElementById('addr-main').value = addr;
      document.getElementById('addr-detail').focus();
      return;
    }
    new daum.Postcode({ oncomplete: function(data){
      document.getElementById('addr-zip').value = data.zonecode;
      document.getElementById('addr-main').value = data.roadAddress || data.jibunAddress;
      document.getElementById('addr-detail').focus();
    }}).open();
  }
  function doPay(){
    const name = document.getElementById('buyer-name').value.trim();
    const phone = document.getElementById('buyer-phone').value.trim();
    const email = document.getElementById('buyer-email').value.trim();
    const zip = document.getElementById('addr-zip').value.trim();
    const addr = document.getElementById('addr-main').value.trim();
    const detail = document.getElementById('addr-detail').value.trim();
    if (!name||!phone||!email){ alert('주문자 정보를 모두 입력해주세요.'); return; }
    if (!zip||!addr||!detail){ alert('배송 주소를 모두 입력해주세요.'); return; }
    const total = document.getElementById('sum-total').textContent;
    alert('마켓 단품 결제가 요청되었습니다.\n\n총 '+total+'\n\n※ 실제 결제 연동은 PG사 연결 후 활성화됩니다.\n(구독과 별도 결제창)');
    const params = new URLSearchParams(location.search);
    if (params.get('mode') !== 'buynow') localStorage.removeItem(CART_KEY);
    sessionStorage.removeItem(BUYNOW_KEY);
    location.href = 'market.html';
  }
  render();
</script>
</body>
</html>
