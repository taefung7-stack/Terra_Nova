<style>
  :root {
    --dark:#0A0A0A; --mid:#111111; --card:#1C1C1C; --card2:#222222;
    --accent:#2DD4BF; --txt:#F0F0F0; --dim:rgba(240,240,240,.72);
    --line:rgba(255,255,255,.07); --line2:rgba(45,212,191,.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--dark);color:var(--txt);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

  /* NAV */
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:68px;border-bottom:1px solid var(--line);}
  .logo-wrap{display:flex;flex-direction:column;gap:2px;text-decoration:none;}
  .logo-main{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:7px;color:#fff;}
  .logo-eng{font-size:.5rem;font-weight:500;letter-spacing:5px;color:rgba(45,212,191,.35);text-transform:uppercase;}
  .nav-right{display:flex;align-items:center;gap:16px;}
  .nav-link{color:var(--dim);text-decoration:none;font-size:.8rem;font-weight:500;transition:color .2s;}
  .nav-link:hover{color:#fff;}
  .nav-signup{color:var(--accent);text-decoration:none;font-size:.8rem;font-weight:700;border:1px solid rgba(45,212,191,.3);padding:7px 16px;border-radius:4px;transition:background .2s;}
  .nav-signup:hover{background:rgba(45,212,191,.08);}

  /* MAIN LAYOUT */
  .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 5vw;}
  .auth-box{width:100%;max-width:420px;}

  /* LOGO AREA */
  .auth-logo{text-align:center;margin-bottom:40px;}
  .auth-logo-main{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:8px;color:#fff;}
  .auth-logo-sub{font-size:.6rem;font-weight:700;letter-spacing:4px;color:rgba(45,212,191,.5);text-transform:uppercase;margin-top:4px;}
  .auth-title{font-size:1.4rem;font-weight:900;color:#fff;text-align:center;margin-bottom:6px;}
  .auth-sub{font-size:.82rem;color:var(--dim);text-align:center;margin-bottom:36px;}

  /* FORM */
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:7px;letter-spacing:.5px;}
  .form-group input{width:100%;background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:14px 16px;color:var(--txt);font-family:'Noto Sans KR',sans-serif;font-size:.92rem;outline:none;transition:border-color .18s;}
  .form-group input:focus{border-color:rgba(45,212,191,.5);}
  .form-group input::placeholder{color:rgba(255,255,255,.28);}
  .form-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .remember-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;}
  .remember-wrap input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);}
  .remember-wrap span{font-size:.75rem;color:var(--dim);}
  .forgot-link{font-size:.75rem;color:var(--accent);text-decoration:none;opacity:.8;transition:opacity .2s;}
  .forgot-link:hover{opacity:1;}

  /* BUTTONS */
  .btn-login{width:100%;background:var(--accent);color:#0A0A0A;border:none;padding:15px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.95rem;font-weight:900;letter-spacing:.5px;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-bottom:12px;}
  .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,212,191,.3);}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
  .divider-line{flex:1;height:1px;background:var(--line);}
  .divider-text{font-size:.72rem;color:var(--dim);white-space:nowrap;}
  .btn-kakao-login{width:100%;background:#FEE500;color:#181600;border:none;padding:14px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s,box-shadow .15s;margin-bottom:10px;}
  .btn-kakao-login:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(254,229,0,.3);}
  .btn-naver-login{width:100%;background:#03C75A;color:#fff;border:none;padding:14px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s;}
  .btn-naver-login:hover{transform:translateY(-2px);}
  .btn-google-login{width:100%;background:#fff;color:#3c4043;border:1.5px solid #dadce0;padding:13px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s,box-shadow .15s;margin-bottom:10px;}
  .btn-google-login:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.12);}

  /* SIGNUP LINK */
  .signup-link-wrap{text-align:center;margin-top:28px;padding-top:24px;border-top:1px solid var(--line);}
  .signup-link-text{font-size:.82rem;color:var(--dim);}
  .signup-link{color:var(--accent);text-decoration:none;font-weight:700;margin-left:6px;}
  .signup-link:hover{text-decoration:underline;}

  /* TRUST */
  .trust-note{text-align:center;margin-top:20px;font-size:.7rem;color:rgba(255,255,255,.3);line-height:1.7;}
  /* 폼 에러·접근성 */
  .field-err{color:#F87171;font-size:.72rem;margin-top:6px;min-height:1em;line-height:1.4;font-family:'Noto Sans KR',sans-serif;}
  .form-group input[aria-invalid="true"]{border-color:#F87171!important;}
  a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

  /* FOOTER */
  footer{padding:20px 5vw;border-top:1px solid var(--line);text-align:center;}
  .footer-links{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
  .footer-links a{font-size:.7rem;color:rgba(255,255,255,.3);text-decoration:none;transition:color .2s;}
  .footer-links a:hover{color:var(--dim);}
  /* FLOATING CIRCLES */
  .float-group{position:fixed;bottom:28px;right:24px;display:flex;flex-direction:column;gap:12px;z-index:200;}
  .float-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(0,0,0,.4);}

  .float-label{position:absolute;right:60px;background:rgba(0,0,0,.75);color:#fff;font-size:.68rem;font-weight:600;padding:4px 10px;border-radius:4px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;}
  .float-btn:hover .float-label{opacity:1;}
</style>

<script>
  function saveMockUser(email) {
    const existing = (function(){ try{ return JSON.parse(localStorage.getItem('tn_user')||'null'); }catch(e){ return null; } })();
    if (existing && existing.email === email) return existing;
    const user = {
      name: '홍길동',
      phone: '010-1234-5678',
      email: email || 'demo@terranova.co.kr',
      zip: '06236',
      addr: '서울특별시 강남구 테헤란로 123',
      addrDetail: '456동 789호'
    };
    localStorage.setItem('tn_user', JSON.stringify(user));
    return user;
  }
  function getRedirect() {
    return new URLSearchParams(location.search).get('redirect') || 'mypage.html';
  }
  function showFieldErr(id, msg) {
    const el = document.getElementById(id + '-err');
    const input = document.getElementById(id);
    if (el) el.textContent = msg || '';
    if (input) input.setAttribute('aria-invalid', msg ? 'true' : 'false');
  }
  function validEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
  }
  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const pw = document.getElementById('login-password').value;
    let ok = true;
    if (!email) { showFieldErr('login-email', '이메일을 입력해 주세요.'); ok = false; }
    else if (!validEmail(email)) { showFieldErr('login-email', '올바른 이메일 형식이 아닙니다.'); ok = false; }
    else showFieldErr('login-email', '');
    if (!pw) { showFieldErr('login-password', '비밀번호를 입력해 주세요.'); ok = false; }
    else if (pw.length < 8) { showFieldErr('login-password', '비밀번호는 8자 이상이어야 합니다.'); ok = false; }
    else showFieldErr('login-password', '');
    if (!ok) return;
    saveMockUser(email);
    alert('로그인되었습니다.\n(현재 UI 프로토타입 — 실제 인증은 백엔드 연동 후)');
    location.href = getRedirect();
  }
  function openForgotPassword(e) {
    e.preventDefault();
    const em = prompt('가입하신 이메일을 입력해 주세요. 비밀번호 재설정 링크를 보내드립니다.');
    if (em && validEmail(em)) {
      alert(em + ' 로 비밀번호 재설정 안내가 발송되었습니다.\n(현재 UI 프로토타입 — 실제 메일은 백엔드 연동 후)');
    } else if (em) {
      alert('올바른 이메일 주소가 아닙니다.');
    }
  }
  // 실시간 유효성 피드백 (입력 중 에러 지우기)
  ['login-email','login-password'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => showFieldErr(id, ''));
  });
  function socialLogin(provider) {
    saveMockUser(provider+'@terranova.co.kr');
    alert(provider + ' 로그인되었습니다.\n(현재 UI 프로토타입)');
    location.href = getRedirect();
  }
</script>
