<script type="module">
  import { supabase } from './supabase-client.js';

  function getRedirect() {
    return new URLSearchParams(location.search).get('redirect') || 'mypage.html';
  }
  function showFieldErr(id, msg) {
    const el = document.getElementById(id + '-err');
    const input = document.getElementById(id);
    if (el) el.textContent = msg || '';
    if (input) input.setAttribute('aria-invalid', msg ? 'true' : 'false');
  }
  function validEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
  }

  // 이미 로그인 상태면 리다이렉트
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) location.href = getRedirect();
  })();

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const pw = document.getElementById('login-password').value;
    const submitBtn = e.target.querySelector('button[type="submit"], .btn-login');
    let ok = true;
    if (!email) { showFieldErr('login-email', '이메일을 입력해 주세요.'); ok = false; }
    else if (!validEmail(email)) { showFieldErr('login-email', '올바른 이메일 형식이 아닙니다.'); ok = false; }
    else showFieldErr('login-email', '');
    if (!pw) { showFieldErr('login-password', '비밀번호를 입력해 주세요.'); ok = false; }
    else if (pw.length < 8) { showFieldErr('login-password', '비밀번호는 8자 이상이어야 합니다.'); ok = false; }
    else showFieldErr('login-password', '');
    if (!ok) return;

    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '로그인 중...'; }

    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pw });
    if (error) {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '로그인'; }
      if (error.message.includes('Invalid login credentials')) {
        showFieldErr('login-password', '이메일 또는 비밀번호가 일치하지 않습니다.');
      } else if (error.message.includes('Email not confirmed')) {
        alert('이메일 인증이 완료되지 않았습니다. 메일함을 확인해주세요.');
      } else {
        alert('로그인 실패: ' + error.message);
      }
      return;
    }
    location.href = getRedirect();
  }

  async function openForgotPassword(e) {
    e.preventDefault();
    const em = prompt('가입하신 이메일을 입력해 주세요. 비밀번호 재설정 링크를 보내드립니다.');
    if (!em) return;
    if (!validEmail(em)) { alert('올바른 이메일 주소가 아닙니다.'); return; }
    const { error } = await supabase.auth.resetPasswordForEmail(em, {
      redirectTo: location.origin + location.pathname.replace(/login\.html$/, 'login.html') + '?reset=1'
    });
    if (error) { alert('요청 실패: ' + error.message); return; }
    alert(em + ' 로 비밀번호 재설정 안내 메일이 발송되었습니다.');
  }

  async function socialLogin(provider) {
    // provider: 'google' | 'kakao' | 'naver'
    if (provider === 'naver') {
      // Naver는 Supabase 네이티브 미지원 → 커스텀 OAuth 흐름 (naver-callback.html + Edge Function)
      const clientId = window.NAVER_CLIENT_ID;
      if (!clientId || clientId.startsWith('REPLACE')) {
        alert('네이버 로그인은 현재 준비 중입니다. 구글/카카오 또는 이메일 로그인을 이용해주세요.');
        return;
      }
      const state = Math.random().toString(36).slice(2) + Date.now().toString(36);
      sessionStorage.setItem('naver_oauth_state', state);
      const redirectUri = location.origin + '/naver-callback.html';
      location.href = 'https://nid.naver.com/oauth2.0/authorize?response_type=code'
        + '&client_id=' + encodeURIComponent(clientId)
        + '&redirect_uri=' + encodeURIComponent(redirectUri)
        + '&state=' + encodeURIComponent(state);
      return;
    }
    // Google, Kakao: Supabase 내장 OAuth
    const { error } = await supabase.auth.signInWithOAuth({
      provider,
      options: {
        redirectTo: location.origin + location.pathname.replace(/login\.html$/, 'mypage.html')
      }
    });
    if (error) alert(provider + ' 로그인 실패: ' + error.message);
  }

  // 실시간 유효성 피드백
  ['login-email','login-password'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => showFieldErr(id, ''));
  });

  // 전역 노출 (HTML onclick 핸들러용)
  window.handleLogin = handleLogin;
  window.openForgotPassword = openForgotPassword;
  window.socialLogin = socialLogin;
  window.toggleNav = () => {
    document.getElementById('nav-hamburger').classList.toggle('open');
    document.querySelector('.nav-links').classList.toggle('open');
  };
</script>
<script type="module" src="./nav-auth.js"></script>
<script src="./footer.js" defer></script>
</body>
</html>
