<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050215"/>
      <stop offset="50%" stop-color="#0A0520"/>
      <stop offset="100%" stop-color="#080418"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(45,212,191,0.22)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- stars -->
  <g fill="#fff" opacity=".6">
    <circle cx="120" cy="80" r="1.5"/><circle cx="300" cy="140" r="1"/>
    <circle cx="520" cy="60" r="2"/><circle cx="720" cy="180" r="1"/>
    <circle cx="950" cy="100" r="1.5"/><circle cx="1100" cy="60" r="1"/>
    <circle cx="200" cy="500" r="1.5"/><circle cx="850" cy="540" r="1"/>
  </g>
  <!-- nebula -->
  <circle cx="900" cy="300" r="220" fill="url(#glow3)"/>
  <!-- badge -->
  <rect x="80" y="80" width="220" height="50" rx="8" fill="rgba(45,212,191,.08)" stroke="rgba(45,212,191,.35)"/>
  <text x="190" y="113" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#2DD4BF" letter-spacing="3" text-anchor="middle">FREE SAMPLE · PDF</text>
  <!-- title -->
  <text x="80" y="230" font-family="Bebas Neue, Impact, sans-serif" font-size="110" fill="#fff" letter-spacing="10">SAMPLE</text>
  <!-- headline -->
  <text x="80" y="310" font-family="'Noto Sans KR', sans-serif" font-size="44" font-weight="800" fill="#fff">결제 없이 <tspan fill="#2DD4BF">즉시 다운로드</tspan></text>
  <!-- content preview -->
  <g font-family="'Noto Sans KR', sans-serif">
    <rect x="80" y="370" width="580" height="150" rx="10" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.08)"/>
    <text x="110" y="405" font-size="15" fill="rgba(45,212,191,.9)" letter-spacing="3" font-weight="700">SCIENCE · 고2 물리</text>
    <text x="110" y="440" font-size="22" font-weight="700" fill="#fff">The Strange World of Quantum Mechanics</text>
    <text x="110" y="475" font-size="16" fill="rgba(255,255,255,.72)">Quantum mechanics describes matter and energy at the</text>
    <text x="110" y="497" font-size="16" fill="rgba(255,255,255,.72)">smallest scales of nature — particles act as both waves...</text>
  </g>
  <!-- tags -->
  <g font-family="'Noto Sans KR', sans-serif" font-size="14">
    <rect x="690" y="380" width="90" height="32" rx="4" fill="rgba(45,212,191,.1)" stroke="rgba(45,212,191,.3)"/>
    <text x="735" y="402" fill="#2DD4BF" text-anchor="middle" font-weight="700">10 레벨</text>
    <rect x="690" y="422" width="110" height="32" rx="4" fill="rgba(45,212,191,.1)" stroke="rgba(45,212,191,.3)"/>
    <text x="745" y="444" fill="#2DD4BF" text-anchor="middle" font-weight="700">초3 ~ 수능</text>
    <rect x="690" y="464" width="140" height="32" rx="4" fill="rgba(45,212,191,.1)" stroke="rgba(45,212,191,.3)"/>
    <text x="760" y="486" fill="#2DD4BF" text-anchor="middle" font-weight="700">교과 연계 독해</text>
  </g>
  <!-- URL -->
  <text x="80" y="600" font-family="'Noto Sans KR', sans-serif" font-size="18" fill="rgba(240,240,240,.38)" letter-spacing="2">terra-nova.kr/sample</text>
</svg>
