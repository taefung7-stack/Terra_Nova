<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050215"/>
      <stop offset="60%" stop-color="#0A0520"/>
      <stop offset="100%" stop-color="#04020E"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD8A8"/>
      <stop offset="25%" stop-color="#E8B078"/>
      <stop offset="55%" stop-color="#B47848"/>
      <stop offset="100%" stop-color="#4A2810"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,200,100,.2)"/>
      <stop offset="100%" stop-color="rgba(255,200,100,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- starfield -->
  <g fill="#fff">
    <circle cx="100" cy="60" r="1.5" opacity=".7"/>
    <circle cx="220" cy="140" r="1" opacity=".5"/>
    <circle cx="380" cy="80" r="2" opacity=".8"/>
    <circle cx="550" cy="200" r="1" opacity=".5"/>
    <circle cx="900" cy="90" r="1.5" opacity=".7"/>
    <circle cx="1100" cy="50" r="1" opacity=".6"/>
    <circle cx="130" cy="400" r="1" opacity=".5"/>
    <circle cx="280" cy="520" r="2" opacity=".8"/>
    <circle cx="450" cy="450" r="1" opacity=".5"/>
    <circle cx="1050" cy="450" r="1.5" opacity=".7"/>
    <circle cx="150" cy="300" r="1" opacity=".4"/>
    <circle cx="1150" cy="280" r="1.5" opacity=".6"/>
  </g>
  <!-- SUN orb (largest level) -->
  <circle cx="1000" cy="315" r="180" fill="url(#glow2)"/>
  <circle cx="1000" cy="315" r="140" fill="url(#orb)"/>
  <!-- planet dots (smaller levels) -->
  <g>
    <circle cx="220" cy="315" r="8" fill="#D0CCC5"/>
    <circle cx="280" cy="315" r="10" fill="#A89B8E"/>
    <circle cx="350" cy="315" r="14" fill="#C9522F"/>
    <circle cx="420" cy="315" r="16" fill="#E8B570"/>
    <circle cx="500" cy="315" r="20" fill="#3B82C4"/>
    <circle cx="590" cy="315" r="22" fill="#3A68D4"/>
    <circle cx="690" cy="315" r="26" fill="#E0DDE0"/>
    <circle cx="800" cy="315" r="30" fill="#C9A76E"/>
  </g>
  <line x1="220" y1="315" x2="820" y2="315" stroke="rgba(45,212,191,.3)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- tagline -->
  <text x="80" y="110" font-family="Bebas Neue, Impact, sans-serif" font-size="36" fill="rgba(255,255,255,.35)" letter-spacing="6">LEVEL TEST</text>
  <!-- headline -->
  <text x="80" y="200" font-family="'Noto Sans KR', sans-serif" font-size="68" font-weight="900" fill="#fff">내 영어 레벨,</text>
  <text x="80" y="275" font-family="'Noto Sans KR', sans-serif" font-size="68" font-weight="900" fill="#fff"><tspan fill="#2DD4BF">3분 만에</tspan> 진단</text>
  <!-- subtitle -->
  <text x="80" y="500" font-family="'Noto Sans KR', sans-serif" font-size="26" fill="rgba(240,240,240,.78)">20문항 · 어휘·독해·문법·논리 종합 분석</text>
  <text x="80" y="540" font-family="'Noto Sans KR', sans-serif" font-size="22" fill="rgba(45,212,191,.85)">MOON → SUN · 10단계 레벨 추천</text>
  <!-- URL -->
  <text x="80" y="600" font-family="'Noto Sans KR', sans-serif" font-size="18" fill="rgba(240,240,240,.38)" letter-spacing="2">terra-nova.kr/level-test</text>
</svg>
