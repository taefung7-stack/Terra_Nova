<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050215"/>
      <stop offset="50%" stop-color="#0A0520"/>
      <stop offset="100%" stop-color="#080418"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(45,212,191,0.18)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- stars -->
  <g fill="#fff" opacity=".7">
    <circle cx="100" cy="80" r="1.5"/><circle cx="280" cy="150" r="1"/>
    <circle cx="450" cy="60" r="2"/><circle cx="620" cy="120" r="1"/>
    <circle cx="800" cy="200" r="1.5"/><circle cx="980" cy="90" r="1"/>
    <circle cx="1120" cy="180" r="2"/><circle cx="150" cy="400" r="1"/>
    <circle cx="1050" cy="480" r="1.5"/><circle cx="900" cy="520" r="1"/>
    <circle cx="350" cy="540" r="1"/><circle cx="750" cy="560" r="2"/>
  </g>
  <!-- nebula glow -->
  <circle cx="950" cy="315" r="260" fill="url(#glow)"/>
  <!-- brand -->
  <text x="80" y="110" font-family="Bebas Neue, Impact, sans-serif" font-size="40" fill="rgba(255,255,255,.4)" letter-spacing="6">TERRA NOVA · ENGLISH</text>
  <!-- tagline -->
  <text x="80" y="200" font-family="'Noto Sans KR', sans-serif" font-size="30" font-weight="700" fill="#2DD4BF" letter-spacing="6">SUBSCRIPTION</text>
  <!-- headline -->
  <text x="80" y="290" font-family="'Noto Sans KR', sans-serif" font-size="72" font-weight="900" fill="#fff">매월 한 권,</text>
  <text x="80" y="380" font-family="'Noto Sans KR', sans-serif" font-size="72" font-weight="900" fill="#fff">10단계 <tspan fill="#2DD4BF">맞춤 레벨</tspan></text>
  <!-- subtitle -->
  <text x="80" y="450" font-family="'Noto Sans KR', sans-serif" font-size="28" fill="rgba(240,240,240,.78)">교과 연계 영어 독해 학습지</text>
  <!-- price chips -->
  <g font-family="'Noto Sans KR', sans-serif">
    <rect x="80" y="485" width="170" height="60" rx="8" fill="rgba(45,212,191,.1)" stroke="rgba(45,212,191,.4)" stroke-width="1"/>
    <text x="165" y="510" font-size="16" fill="rgba(240,240,240,.7)" text-anchor="middle">LIGHT</text>
    <text x="165" y="532" font-size="20" font-weight="800" fill="#2DD4BF" text-anchor="middle">월 11,900원</text>
    <rect x="270" y="485" width="190" height="60" rx="8" fill="rgba(255,213,79,.12)" stroke="rgba(255,213,79,.5)" stroke-width="1.5"/>
    <text x="365" y="505" font-size="13" fill="rgba(255,213,79,.75)" text-anchor="middle">★ POPULAR</text>
    <text x="365" y="527" font-size="16" fill="rgba(240,240,240,.8)" text-anchor="middle">STANDARD</text>
    <text x="365" y="545" font-size="18" font-weight="800" fill="#FFD54F" text-anchor="middle">월 24,900원</text>
    <rect x="480" y="485" width="170" height="60" rx="8" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
    <text x="565" y="510" font-size="16" fill="rgba(240,240,240,.6)" text-anchor="middle">PREMIUM</text>
    <text x="565" y="532" font-size="20" font-weight="800" fill="rgba(240,240,240,.8)" text-anchor="middle">월 38,900원</text>
  </g>
  <!-- URL -->
  <text x="80" y="600" font-family="'Noto Sans KR', sans-serif" font-size="18" fill="rgba(240,240,240,.38)" letter-spacing="2">terra-nova.kr/order</text>
</svg>
