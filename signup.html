<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 — TERRA NOVA ENGLISH</title>
<meta name="description" content="Terra Nova ENGLISH 회원가입 — 간단한 3단계 가입으로 무료 샘플·레벨 테스트·월간 구독 즉시 시작.">
<link rel="canonical" href="https://terranova.co.kr/signup.html">
<meta name="robots" content="noindex,follow">
<meta property="og:type" content="website"><meta property="og:site_name" content="TERRA NOVA ENGLISH"><meta property="og:locale" content="ko_KR">
<meta property="og:title" content="회원가입 · TERRA NOVA ENGLISH">
<meta property="og:description" content="간단 가입으로 Terra Nova 학습 서비스를 시작하세요.">
<meta property="og:url" content="https://terranova.co.kr/signup.html">
<meta property="og:image" content="https://terranova.co.kr/og-cover.svg">

<link rel="dns-prefetch" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="shared.css">

<!-- Daum Postcode: 클릭 시 lazy-load 하여 초기 페이지 로딩 속도 개선 -->
<style>
  :root {
    --dark:#0A0A0A; --mid:#111111; --card:#1C1C1C; --card2:#222222;
    --accent:#2DD4BF; --txt:#F0F0F0; --dim:rgba(240,240,240,.72);
    --line:rgba(255,255,255,.07); --line2:rgba(45,212,191,.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--dark);color:var(--txt);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

  /* NAV */
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:68px;border-bottom:1px solid var(--line);}
  .logo-wrap{display:flex;flex-direction:column;gap:2px;text-decoration:none;}
  .logo-main{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:7px;color:#fff;}
  .logo-eng{font-size:.5rem;font-weight:500;letter-spacing:5px;color:rgba(45,212,191,.35);text-transform:uppercase;}
  .nav-right{display:flex;align-items:center;gap:16px;}
  .nav-link{color:var(--dim);text-decoration:none;font-size:.8rem;font-weight:500;transition:color .2s;}
  .nav-link:hover{color:#fff;}
  .nav-login{color:var(--accent);text-decoration:none;font-size:.8rem;font-weight:700;border:1px solid rgba(45,212,191,.3);padding:7px 16px;border-radius:4px;transition:background .2s;}
  .nav-login:hover{background:rgba(45,212,191,.08);}

  /* MAIN */
  .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 5vw;}
  .auth-box{width:100%;max-width:460px;}

  /* LOGO */
  .auth-logo{text-align:center;margin-bottom:36px;}
  .auth-logo-main{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:8px;color:#fff;}
  .auth-logo-sub{font-size:.6rem;font-weight:700;letter-spacing:4px;color:rgba(45,212,191,.5);text-transform:uppercase;margin-top:4px;}
  .auth-title{font-size:1.4rem;font-weight:900;color:#fff;text-align:center;margin-bottom:6px;}
  .auth-sub{font-size:.82rem;color:var(--dim);text-align:center;margin-bottom:32px;}

  /* SOCIAL FIRST */
  .social-section{margin-bottom:20px;}
  .btn-kakao-signup{width:100%;background:#FEE500;color:#181600;border:none;padding:14px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s,box-shadow .15s;margin-bottom:10px;}
  .btn-kakao-signup:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(254,229,0,.3);}
  .btn-naver-signup{width:100%;background:#03C75A;color:#fff;border:none;padding:14px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s;}
  .btn-naver-signup:hover{transform:translateY(-2px);}
  .btn-google-signup{width:100%;background:#fff;color:#3c4043;border:1.5px solid #dadce0;padding:13px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s,box-shadow .15s;margin-bottom:10px;}
  .btn-google-signup:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.12);}

  /* DIVIDER */
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
  .divider-line{flex:1;height:1px;background:var(--line);}
  .divider-text{font-size:.72rem;color:var(--dim);white-space:nowrap;}

  /* FORM */
  .form-group{margin-bottom:14px;position:relative;}
  .form-group label{display:block;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:7px;letter-spacing:.5px;}
  .form-group input, .form-group select{width:100%;background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:13px 16px;color:var(--txt);font-family:'Noto Sans KR',sans-serif;font-size:.9rem;outline:none;transition:border-color .18s;}
  .form-group input:focus, .form-group select:focus{border-color:rgba(45,212,191,.5);}
  .form-group input::placeholder{color:rgba(255,255,255,.28);}
  .form-group select option{background:var(--card);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:480px){.form-row{grid-template-columns:1fr;}}
  .input-note{font-size:.68rem;color:var(--dim);margin-top:5px;}
  .input-ok{color:var(--accent);}
  .input-err{color:#F87171;}

  /* 비밀번호 강도 */
  .pw-strength{margin-top:6px;}
  .pw-strength-bar{display:flex;gap:4px;}
  .pw-bar-seg{flex:1;height:3px;border-radius:999px;background:rgba(255,255,255,.08);transition:background .3s;}
  .pw-bar-seg.weak{background:#F87171;}
  .pw-bar-seg.medium{background:#FCD34D;}
  .pw-bar-seg.strong{background:var(--accent);}
  .pw-label{font-size:.65rem;color:var(--dim);margin-top:4px;}

  /* 약관 동의 */
  .terms-section{margin:20px 0;}
  .terms-all{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--card);border-radius:8px;border:1px solid var(--line);margin-bottom:10px;cursor:pointer;}
  .terms-all input{width:16px;height:16px;accent-color:var(--accent);}
  .terms-all span{font-size:.85rem;font-weight:700;color:#fff;}
  .terms-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;}
  .terms-item input{width:14px;height:14px;accent-color:var(--accent);}
  .terms-item-text{font-size:.78rem;color:var(--dim);flex:1;}
  .terms-link{color:var(--accent);text-decoration:none;font-size:.72rem;opacity:.8;}
  .terms-link:hover{opacity:1;}

  /* SUBMIT */
  .btn-signup{width:100%;background:var(--accent);color:#0A0A0A;border:none;padding:15px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.95rem;font-weight:900;letter-spacing:.5px;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-top:8px;}
  .btn-signup:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,212,191,.3);}

  /* LOGIN LINK */
  .login-link-wrap{text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--line);}
  .login-link-text{font-size:.82rem;color:var(--dim);}
  .login-link{color:var(--accent);text-decoration:none;font-weight:700;margin-left:6px;}
  .login-link:hover{text-decoration:underline;}
  .trust-note{text-align:center;margin-top:16px;font-size:.7rem;color:rgba(255,255,255,.3);line-height:1.7;}

  /* FOOTER */
  footer{padding:20px 5vw;border-top:1px solid var(--line);text-align:center;}
  .footer-links{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
  .footer-links a{font-size:.7rem;color:rgba(255,255,255,.3);text-decoration:none;transition:color .2s;}
  .footer-links a:hover{color:var(--dim);}
  /* FLOATING CIRCLES */
  .float-group{position:fixed;bottom:28px;right:24px;display:flex;flex-direction:column;gap:12px;z-index:200;}
  .float-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(0,0,0,.4);}
  .float-btn:hover{transform:translateY(-3px);}
  .float-kakao{background:#FEE500;}
  .float-insta{background:radial-gradient(circle at 30% 107%,#fdf497 0%,#fd5949 45%,#d6249f 60%,#285AEB 90%);}
  .float-label{position:absolute;right:60px;background:rgba(0,0,0,.75);color:#fff;font-size:.68rem;font-weight:600;padding:4px 10px;border-radius:4px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;}
  .float-btn:hover .float-label{opacity:1;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo-wrap">
    <div class="logo-main">TERRA NOVA</div>
    <div class="logo-eng">ENGLISH</div>
  </a>
  <div class="nav-right">
    <a href="index.html" class="nav-link">홈으로</a>
    <a href="market.html" class="nav-link">마켓</a>
    <a href="login.html" class="nav-login">로그인</a>
  </div>
</nav>

<!-- MAIN -->
<div class="auth-wrap">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-main">TERRA NOVA</div>
      <div class="auth-logo-sub">English · 수능영어 학습지</div>
    </div>

    <h1 class="auth-title">회원가입</h1>
    <p class="auth-sub">Terra Nova와 함께 영어 실력을 키워보세요.</p>

    <!-- 소셜 가입 -->
    <div class="social-section">
      <button class="btn-google-signup" onclick="socialSignup('google')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        구글로 시작하기
      </button>
      <button class="btn-kakao-signup" onclick="socialSignup('kakao')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.477 2 10.5c0 2.624 1.608 4.934 4.063 6.297L5 21l4.938-2.656c.668.094 1.353.156 2.062.156 5.523 0 10-3.477 10-7.5S17.523 3 12 3z"/></svg>
        카카오로 시작하기
      </button>
      <button class="btn-naver-signup" onclick="socialSignup('naver')">
        <span style="font-family:sans-serif;font-weight:900;font-size:1rem;">N</span>
        네이버로 시작하기
      </button>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">이메일로 가입하기</span>
      <div class="divider-line"></div>
    </div>

    <!-- 이메일 가입 폼 -->
    <form onsubmit="handleSignup(event)">

      <div class="form-row">
        <div class="form-group">
          <label for="signup-name">학생 이름</label>
          <input type="text" id="signup-name" name="name" placeholder="홍길동" required minlength="2" autocomplete="name" aria-required="true">
        </div>
        <div class="form-group">
          <label for="signup-grade">학년</label>
          <select id="signup-grade" name="grade" required aria-required="true">
            <option value="">선택</option>
            <option>초등 3학년</option><option>초등 4학년</option>
            <option>초등 5학년</option><option>초등 6학년</option>
            <option>중학교 1학년</option><option>중학교 2학년</option>
            <option>중학교 3학년</option>
            <option>고등학교 1학년</option><option>고등학교 2학년</option>
            <option>고등학교 3학년</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="signup-phone">학부모 연락처</label>
        <input type="tel" id="signup-phone" name="phone" placeholder="010-0000-0000" required pattern="01[0-9]-?[0-9]{3,4}-?[0-9]{4}" autocomplete="tel" aria-required="true" aria-describedby="phone-note" oninput="formatPhone(this);checkPhone(this)">
        <div class="input-note" id="phone-note">학습 관련 안내 및 배송 정보를 받을 번호입니다.</div>
      </div>

      <!-- 배송 주소 -->
      <div class="form-group">
        <label>우편번호</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="addr-zip" placeholder="00000" readonly required style="flex:1;">
          <button type="button" onclick="searchAddress()" style="background:var(--card2);color:var(--txt);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:0 16px;font-family:'Noto Sans KR',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;">주소 검색</button>
        </div>
        <div class="input-note">실물 책 배송을 위한 주소 정보입니다.</div>
      </div>

      <div class="form-group">
        <label>기본 주소</label>
        <input type="text" id="addr-main" placeholder="도로명/지번 주소" readonly required>
      </div>

      <div class="form-group">
        <label>상세 주소</label>
        <input type="text" id="addr-detail" placeholder="동·호수 등 상세주소" required>
      </div>

      <div class="form-group">
        <label for="signup-email">이메일</label>
        <input type="email" id="signup-email" name="email" placeholder="example@email.com" required autocomplete="email" aria-required="true" aria-describedby="email-note" oninput="checkEmail(this)">
        <div class="input-note" id="email-note"></div>
      </div>

      <div class="form-group">
        <label for="signup-pw">비밀번호</label>
        <input type="password" id="signup-pw" name="password" placeholder="8자 이상 (영문+숫자 권장)" required minlength="8" autocomplete="new-password" aria-required="true" aria-describedby="pw-label" oninput="checkPw(this)">
        <div class="pw-strength">
          <div class="pw-strength-bar">
            <div class="pw-bar-seg" id="bar1"></div>
            <div class="pw-bar-seg" id="bar2"></div>
            <div class="pw-bar-seg" id="bar3"></div>
          </div>
          <div class="pw-label" id="pw-label">비밀번호를 입력해주세요</div>
        </div>
      </div>

      <div class="form-group">
        <label for="signup-pw2">비밀번호 확인</label>
        <input type="password" id="signup-pw2" name="password-confirm" placeholder="비밀번호 재입력" required autocomplete="new-password" aria-required="true" aria-describedby="pw-confirm-note" oninput="checkPwConfirm(this)">
        <div class="input-note" id="pw-confirm-note"></div>
      </div>

      <!-- 약관 동의 -->
      <div class="terms-section">
        <label class="terms-all">
          <input type="checkbox" id="all-agree" onchange="toggleAll(this)">
          <span>전체 동의</span>
        </label>
        <label class="terms-item">
          <input type="checkbox" class="term-check" required>
          <span class="terms-item-text">[필수] 이용약관에 동의합니다.</span>
          <a href="#" class="terms-link">보기</a>
        </label>
        <label class="terms-item">
          <input type="checkbox" class="term-check" required>
          <span class="terms-item-text">[필수] 개인정보 처리방침에 동의합니다.</span>
          <a href="#" class="terms-link">보기</a>
        </label>
        <label class="terms-item">
          <input type="checkbox" class="term-check">
          <span class="terms-item-text">[선택] 학습 관련 마케팅 정보 수신에 동의합니다.</span>

<script>
  function socialSignup(p) { alert(p+' 가입은 백엔드 연동 후 사용 가능합니다.'); }

  // Daum Postcode를 클릭 시 lazy-load (초기 페이지 속도 개선)
  let _daumLoading = null;
  function loadDaumPostcode(){
    if (window.daum && window.daum.Postcode) return Promise.resolve();
    if (_daumLoading) return _daumLoading;
    _daumLoading = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = '//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js';
      s.async = true;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
    return _daumLoading;
  }
  function openDaumPostcode(){
    new daum.Postcode({
      oncomplete: function(data) {
        document.getElementById('addr-zip').value = data.zonecode;
        document.getElementById('addr-main').value = data.roadAddress || data.jibunAddress;
        document.getElementById('addr-detail').focus();
      }
    }).open();
  }
  function searchAddress() {
    loadDaumPostcode().then(openDaumPostcode).catch(() => {
      // 네트워크 실패 시 수동 입력 폴백
      const zip = prompt('우편번호를 입력하세요 (예: 06234)');
      if (!zip) return;
      const addr = prompt('기본 주소를 입력하세요');
      if (!addr) return;
      document.getElementById('addr-zip').value = zip;
      document.getElementById('addr-main').value = addr;
      document.getElementById('addr-detail').focus();
    });
  }

  function checkEmail(inp) {
    const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(inp.value);
    const el = document.getElementById('email-note');
    el.textContent = inp.value ? (ok ? '✓ 사용 가능한 이메일입니다.' : '올바른 이메일 형식이 아닙니다.') : '';
    el.className = 'input-note ' + (ok ? 'input-ok' : 'input-err');
  }

  function checkPw(inp) {
    const v = inp.value;
    const b1 = document.getElementById('bar1');
    const b2 = document.getElementById('bar2');
    const b3 = document.getElementById('bar3');
    const lbl = document.getElementById('pw-label');
    let score = 0;
    if(v.length >= 8) score++;
    if(/[A-Za-z]/.test(v) && /[0-9]/.test(v)) score++;
    if(/[!@#$%^&*]/.test(v)) score++;
    const levels = ['weak','medium','strong'];
    const labels = ['약함 — 더 복잡한 비밀번호를 사용해주세요.','보통 — 특수문자를 추가하면 더 안전합니다.','강함 — 안전한 비밀번호입니다.'];
    [b1,b2,b3].forEach((b,i) => {b.className = 'pw-bar-seg' + (i < score ? ' '+levels[score-1] : '');});
    lbl.textContent = v ? labels[score-1] || labels[0] : '비밀번호를 입력해주세요';
  }

  function checkPwConfirm(inp) {
    const pw = document.getElementById('signup-pw').value;
    const el = document.getElementById('pw-confirm-note');
    if(!inp.value) { el.textContent = ''; return; }
    const match = pw === inp.value;
    el.textContent = match ? '✓ 비밀번호가 일치합니다.' : '비밀번호가 일치하지 않습니다.';
    el.className = 'input-note ' + (match ? 'input-ok' : 'input-err');
    inp.setAttribute('aria-invalid', match ? 'false' : 'true');
  }

  function formatPhone(inp) {
    let v = inp.value.replace(/\D/g,'');
    if(v.length > 11) v = v.slice(0,11);
    if(v.length >= 7) v = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
    else if(v.length >= 4) v = v.slice(0,3)+'-'+v.slice(3);
    inp.value = v;
  }
  function checkPhone(inp) {
    const ok = /^01[0-9]-\d{3,4}-\d{4}$/.test(inp.value);
    const el = document.getElementById('phone-note');
    if(!inp.value){ el.textContent='학습 관련 안내 및 배송 정보를 받을 번호입니다.'; el.className='input-note'; inp.setAttribute('aria-invalid','false'); return; }
    el.textContent = ok ? '✓ 올바른 번호 형식입니다.' : '휴대폰 번호 형식이 아닙니다 (예: 010-1234-5678).';
    el.className = 'input-note ' + (ok ? 'input-ok' : 'input-err');
    inp.setAttribute('aria-invalid', ok ? 'false' : 'true');
  }

  function toggleAll(cb) {
    document.querySelectorAll('.term-check').forEach(c => c.checked = cb.checked);
  }

  async function handleSignup(e) {
    e.preventDefault();
    const email = document.getElementById('signup-email').value.trim();
    const pw = document.getElementById('signup-pw').value;
    const pw2 = document.getElementById('signup-pw2').value;
    const phone = document.getElementById('signup-phone').value;
    const name = document.getElementById('signup-name').value.trim();
    const grade = document.getElementById('signup-grade').value;
    const zip = document.getElementById('addr-zip').value;
    const addrMain = document.getElementById('addr-main').value;
    const addrDetail = document.getElementById('addr-detail').value.trim();
    const requiredTerms = document.querySelectorAll('.term-check[required]');

    if(name.length < 2){ alert('학생 이름을 2자 이상 입력해 주세요.'); document.getElementById('signup-name').focus(); return; }
    if(!grade){ alert('학년을 선택해 주세요.'); document.getElementById('signup-grade').focus(); return; }
    if(!/^01[0-9]-\d{3,4}-\d{4}$/.test(phone)){ alert('올바른 휴대폰 번호를 입력해 주세요 (예: 010-1234-5678).'); document.getElementById('signup-phone').focus(); return; }
    if(!zip){ alert('주소 검색 버튼으로 주소를 입력해 주세요.'); return; }
    if(!addrDetail){ alert('상세 주소를 입력해 주세요.'); document.getElementById('addr-detail').focus(); return; }
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)){ alert('올바른 이메일 주소를 입력해 주세요.'); document.getElementById('signup-email').focus(); return; }
    if(pw.length < 8){ alert('비밀번호는 8자 이상이어야 합니다.'); document.getElementById('signup-pw').focus(); return; }
    if(pw !== pw2){ alert('비밀번호가 일치하지 않습니다.'); document.getElementById('signup-pw2').focus(); return; }
    const allTermsOk = Array.from(requiredTerms).every(cb => cb.checked);
    if(!allTermsOk){ alert('필수 약관에 모두 동의해 주세요.'); return; }

    const submitBtn = e.target.querySelector('button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '가입 중...'; }

    const { supabase } = await import('./supabase-client.js');

    const { data, error } = await supabase.auth.signUp({
      email,
      password: pw,
      options: {
        data: {
          display_name: name,
          phone,
          grade_label: grade,
          shipping_zipcode: zip,
          shipping_address: addrMain,
          shipping_detail: addrDetail
        },
        emailRedirectTo: location.origin + location.pathname.replace(/signup\.html$/, 'login.html')
      }
    });

    if (error) {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '회원가입'; }
      if (error.message.includes('already registered') || error.message.includes('User already')) {
        alert('이미 가입된 이메일입니다. 로그인 페이지로 이동합니다.');
        location.href = 'login.html';
      } else {
        alert('회원가입 실패: ' + error.message);
      }
      return;
    }

    // profile 기본 정보 업데이트 (grade_label은 auth.users.raw_user_meta_data에 보관)
    if (data.user) {
      await supabase.from('profiles').update({
        display_name: name,
        phone
      }).eq('id', data.user.id);
    }

    alert('회원가입이 완료되었습니다!\n\n입력하신 이메일로 인증 메일이 발송되었습니다.\n메일 인증 후 로그인해주세요.');
    window.location.href = 'login.html';
  }
</script>
