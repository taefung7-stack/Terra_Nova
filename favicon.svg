<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Terra Nova infinity mark">
  <!-- Dark rounded tile that matches the site canvas (#0A0A0A) so the mark
       stays legible in both light and dark browser chromes. -->
  <rect width="64" height="64" fill="#0A0A0A" rx="14" ry="14"/>
  <!-- Infinity (lemniscate) — two looped strokes crossing at center, mint
       (#00FFA3) to match the brand accent. Round caps + joins keep the
       silhouette crisp at favicon sizes (16px, 32px). -->
  <path d="M14 32 C 14 22, 24 22, 32 32 C 40 42, 50 42, 50 32 C 50 22, 40 22, 32 32 C 24 42, 14 42, 14 32 Z"
        fill="none" stroke="#00FFA3" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
